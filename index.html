<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЧЕБУРЧАТ — Социальная сеть</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; }
        
        body[data-theme="default"] { --bg-page: #f0f2f5; --bg-surface: white; --bg-element: #f0f2f5; --text: #1a1a1a; --text-secondary: #65676b; --accent: #ff7b2c; --accent-hover: #e6691a; --border: #e4e6eb; --my-msg: #ff7b2c; --my-msg-text: white; --other-msg: white; --other-msg-text: #1a1a1a; --verified: #3b82f6; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        body[data-theme="dark"] { --bg-page: #18191a; --bg-surface: #242526; --bg-element: #3a3b3c; --text: #e4e6eb; --text-secondary: #b0b3b8; --accent: #ff7b2c; --accent-hover: #e6691a; --border: #3e4042; --my-msg: #ff7b2c; --my-msg-text: white; --other-msg: #3e4042; --other-msg-text: #e4e6eb; --verified: #3b82f6; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        body[data-theme="purple"] { --bg-page: #f5f0ff; --bg-surface: white; --bg-element: #f0ebf8; --text: #2d1b4e; --text-secondary: #7c6b9e; --accent: #9b59b6; --accent-hover: #8e44ad; --border: #e8dfd5; --my-msg: #9b59b6; --my-msg-text: white; --other-msg: white; --other-msg-text: #2d1b4e; --verified: #3b82f6; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        body[data-theme="red"] { --bg-page: #1a0f0f; --bg-surface: #2a1a1a; --bg-element: #3d2525; --text: #f0d6d6; --text-secondary: #c4a0a0; --accent: #c0392b; --accent-hover: #e74c3c; --border: #4a2e2e; --my-msg: #c0392b; --my-msg-text: white; --other-msg: #3d2525; --other-msg-text: #f0d6d6; --verified: #3b82f6; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        body[data-theme="blue"] { --bg-page: #e8f0fe; --bg-surface: white; --bg-element: #e4edf7; --text: #1a3a5c; --text-secondary: #5a7a9e; --accent: #2d88ff; --accent-hover: #1a66cc; --border: #d4e0ec; --my-msg: #2d88ff; --my-msg-text: white; --other-msg: white; --other-msg-text: #1a3a5c; --verified: #fbbf24; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        body[data-theme="green"] { --bg-page: #eaf7ea; --bg-surface: white; --bg-element: #e2f0e2; --text: #1a4a1a; --text-secondary: #5a8a5a; --accent: #27ae60; --accent-hover: #219a52; --border: #d0e4d0; --my-msg: #27ae60; --my-msg-text: white; --other-msg: white; --other-msg-text: #1a4a1a; --verified: #3b82f6; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        
        body { background: var(--bg-page); color: var(--text); }
        
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-page); padding: 16px; }
        .auth-card { background: var(--bg-surface); padding: 32px 24px; border-radius: 28px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        .auth-card h1 { color: var(--accent); margin-bottom: 24px; font-size: 32px; }
        .auth-card input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); border-radius: 16px; font-size: 16px; background: var(--bg-element); color: var(--text); }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 16px; color: white; font-weight: 600; margin-top: 16px; cursor: pointer; }
        .toggle-auth { margin-top: 16px; color: var(--accent); cursor: pointer; }
        .verify-msg { background: #fff3cd; color: #856404; padding: 12px; border-radius: 16px; margin: 12px 0; font-size: 14px; }
        .hidden { display: none !important; }
        
        .app { display: flex; height: 100vh; background: var(--bg-page); }
        .sidebar { width: 280px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; }
        .logo { padding: 20px 20px 16px; font-size: 22px; font-weight: 800; color: var(--accent); border-bottom: 1px solid var(--border); }
        .sidebar-section { padding: 16px 0; }
        .nav-item { padding: 10px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); font-weight: 500; border-radius: 10px; margin: 0 8px; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--bg-element); color: var(--accent); }
        .nav-item i { width: 24px; font-size: 20px; }
        .logout-btn { margin: 10px 16px; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-page); }
        
        /* Профиль */
        .profile-view { height: 100%; overflow-y: auto; background: var(--bg-surface); padding-bottom: 80px; }
        .profile-header { position: relative; background: linear-gradient(135deg, var(--accent), var(--accent-hover)); height: 140px; flex-shrink: 0; }
        .profile-avatar-large { position: absolute; bottom: -50px; left: 20px; width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--bg-surface); background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 40px; cursor: pointer; }
        .profile-info { padding: 60px 20px 20px 20px; }
        .profile-name { font-size: 24px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .profile-email { color: var(--text-secondary); margin-top: 4px; font-size: 14px; }
        .profile-stats { display: flex; gap: 20px; margin-top: 16px; padding: 12px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .stat { text-align: center; cursor: pointer; }
        .stat-value { font-size: 20px; font-weight: 700; color: var(--text); }
        .stat-label { font-size: 12px; color: var(--text-secondary); }
        .profile-actions { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
        .profile-btn { padding: 8px 16px; border-radius: 24px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .profile-btn.primary { background: var(--accent); color: white; }
        .profile-btn.secondary { background: var(--bg-element); color: var(--text); }
        .profile-section { padding: 0 20px 20px 20px; }
        .section-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        
        /* Посты */
        .posts-feed { display: flex; flex-direction: column; gap: 16px; }
        .post-card { background: var(--bg-surface); border-radius: 20px; padding: 16px; border: 1px solid var(--border); }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; cursor: pointer; }
        .post-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; flex-shrink: 0; }
        .post-author-name { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .post-time { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .post-text { font-size: 15px; color: var(--text); margin-bottom: 12px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
        .post-actions { display: flex; gap: 24px; padding-top: 12px; border-top: 1px solid var(--border); }
        .post-action-btn { background: none; border: none; display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-secondary); cursor: pointer; padding: 6px 12px; border-radius: 20px; transition: 0.1s; }
        .post-action-btn:hover { background: var(--bg-element); }
        .post-action-btn.liked { color: #e74c3c; }
        .post-action-btn.liked i { color: #e74c3c; }
        .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .comment-item { display: flex; gap: 10px; padding: 8px 0; font-size: 13px; }
        .comment-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 12px; flex-shrink: 0; }
        .comment-content { flex: 1; }
        .comment-author { font-weight: 600; font-size: 12px; color: var(--text); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .comment-text { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .comment-footer { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
        .comment-time { font-size: 10px; color: var(--text-secondary); }
        .comment-like-btn { background: none; border: none; display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary); cursor: pointer; padding: 2px 6px; border-radius: 12px; }
        .comment-like-btn.liked { color: #e74c3c; }
        .add-comment { display: flex; gap: 10px; margin-top: 12px; }
        .add-comment input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 24px; background: var(--bg-element); color: var(--text); font-size: 13px; outline: none; }
        .add-comment button { background: var(--accent); border: none; padding: 8px 16px; border-radius: 24px; color: white; cursor: pointer; font-size: 13px; font-weight: 600; }
        
        .create-post-card { background: var(--bg-surface); border-radius: 20px; padding: 16px; border: 1px solid var(--border); margin-bottom: 16px; }
        .create-post-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg-element); color: var(--text); font-size: 14px; resize: vertical; font-family: inherit; margin-bottom: 12px; }
        .create-post-btn { background: var(--accent); border: none; padding: 8px 20px; border-radius: 24px; color: white; cursor: pointer; font-size: 14px; font-weight: 600; }
        
        /* Чаты */
        .chats-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); }
        .chats-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chats-header h2 { font-size: 24px; font-weight: 700; color: var(--text); }
        .create-group-btn { background: var(--accent); border: none; padding: 8px 16px; border-radius: 24px; color: white; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .chats-search { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .chats-search input { width: 100%; padding: 10px 16px; border: none; background: var(--bg-element); border-radius: 24px; font-size: 15px; outline: none; color: var(--text); }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .chat-item:hover { background: var(--bg-element); }
        .chat-avatar { width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0; position: relative; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 20px; }
        .group-avatar { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 16px; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .verified-icon { color: var(--verified); font-size: 14px; }
        .chat-last-msg { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
        .empty-chats { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        
        .chat-window { display: flex; flex-direction: column; height: 100%; background: var(--bg-page); }
        .chat-header { padding: 12px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text); }
        .chat-header-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; position: relative; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: 600; font-size: 17px; color: var(--text); display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .chat-header-name:hover { text-decoration: underline; }
        .chat-header-members { font-size: 12px; color: var(--text-secondary); cursor: pointer; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn 0.2s ease; margin-bottom: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.my { align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 18px; word-wrap: break-word; cursor: pointer; }
        .my .message-bubble { background: var(--my-msg); color: var(--my-msg-text); border-bottom-right-radius: 4px; }
        .other .message-bubble { background: var(--other-msg); color: var(--other-msg-text); border-bottom-left-radius: 4px; }
        .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 4px; margin-left: 6px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .message-sender:hover { text-decoration: underline; }
        .sender-avatar { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; }
        .message-footer { display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin-top: 4px; margin-right: 6px; }
        .message-time { font-size: 10px; color: var(--text-secondary); }
        .read-status { font-size: 10px; display: flex; align-items: center; gap: 2px; }
        .read-status.read i { color: var(--read-status-delivered); }
        .read-status.delivered i { color: var(--read-status); }
        
        .media-container { margin: 4px 0; border-radius: 16px; overflow: hidden; max-width: 280px; }
        .message-image { width: 100%; height: auto; max-height: 300px; object-fit: cover; cursor: pointer; border-radius: 16px; }
        .message-video { width: 100%; max-height: 280px; border-radius: 16px; background: #000; outline: none; }
        
        .reactions-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; margin-left: 6px; }
        .reaction-item { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-element); padding: 2px 8px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.1s; border: 1px solid var(--border); }
        .reaction-item:hover { background: var(--bg-element); transform: scale(1.05); }
        .reaction-item.my-reaction { background: var(--accent); color: white; border-color: var(--accent); }
        .reaction-emoji { font-size: 14px; }
        .reaction-count { font-size: 11px; font-weight: 500; }
        
        .context-menu { position: fixed; background: var(--bg-surface); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 1000; min-width: 180px; overflow: hidden; border: 1px solid var(--border); display: none; }
        .context-menu.active { display: block; }
        .context-menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.1s; color: var(--text); }
        .context-menu-item:hover { background: var(--bg-element); }
        .context-menu-item.delete { color: #dc3545; }
        
        .reactions-modal .modal { max-width: 350px; }
        .reactions-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; padding: 16px; }
        .reaction-option { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px; cursor: pointer; border-radius: 16px; transition: 0.1s; min-width: 60px; }
        .reaction-option:hover { background: var(--bg-element); transform: scale(1.05); }
        .reaction-emoji-big { font-size: 32px; }
        .reaction-name { font-size: 12px; color: var(--text-secondary); }
        
        .mobile-context-menu { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-surface); border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); z-index: 1001; display: none; flex-direction: column; padding: 16px; animation: slideUp 0.2s ease; }
        .mobile-context-menu.active { display: flex; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .mobile-context-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; }
        .mobile-context-overlay.active { display: block; }
        .mobile-context-title { font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--text-secondary); text-align: center; }
        .mobile-context-buttons { display: flex; flex-direction: column; gap: 8px; }
        .mobile-context-btn { padding: 14px; border-radius: 14px; background: var(--bg-element); border: none; font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text); }
        .mobile-context-btn.delete { color: #dc3545; background: rgba(220,53,69,0.1); }
        
        .input-area { padding: 12px 16px; background: var(--bg-surface); border-top: 1px solid var(--border); display: flex; gap: 12px; flex-shrink: 0; }
        .input-area input { flex: 1; padding: 12px 18px; border: none; background: var(--bg-element); border-radius: 28px; font-size: 16px; outline: none; color: var(--text); }
        .input-area button { background: var(--accent); border: none; width: 48px; height: 48px; border-radius: 50%; color: white; cursor: pointer; font-size: 18px; }
        .attach-btn { background: var(--bg-element); border: none; width: 48px; height: 48px; border-radius: 50%; color: var(--text); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .attach-btn:hover { background: var(--accent); color: white; }
        
        .people-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); }
        .people-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .people-header h2 { font-size: 24px; font-weight: 700; color: var(--text); }
        .people-search { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .people-search input { width: 100%; padding: 10px 16px; border: none; background: var(--bg-element); border-radius: 24px; font-size: 15px; outline: none; color: var(--text); }
        .people-list { flex: 1; overflow-y: auto; }
        .person-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .person-item:hover { background: var(--bg-element); }
        .person-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .person-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; position: relative; flex-shrink: 0; }
        .person-name { font-weight: 600; font-size: 16px; color: var(--text); display: flex; align-items: center; gap: 6px; }
        .action-btns { display: flex; gap: 8px; }
        .action-btn { background: none; border: none; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .action-btn.write { background: var(--accent); color: white; }
        .action-btn.add { background: var(--bg-element); color: var(--text); }
        .action-btn.remove { background: #dc3545; color: white; }
        .action-btn.pending { background: var(--bg-element); color: var(--text-secondary); cursor: default; }
        
        .settings-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); }
        .settings-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .settings-header h2 { font-size: 24px; font-weight: 700; color: var(--text); flex: 1; }
        .settings-list { padding: 16px; }
        .settings-section { margin-bottom: 24px; }
        .settings-section-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
        .theme-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .theme-option { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px; border-radius: 16px; cursor: pointer; border: 2px solid transparent; background: var(--bg-element); }
        .theme-option.active { border-color: var(--accent); }
        .theme-preview { width: 50px; height: 50px; border-radius: 25px; }
        .theme-preview.default { background: linear-gradient(135deg, #ff7b2c, #e6691a); }
        .theme-preview.dark { background: linear-gradient(135deg, #242526, #3a3b3c); }
        .theme-preview.purple { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .theme-preview.red { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        .theme-preview.blue { background: linear-gradient(135deg, #2d88ff, #1a66cc); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }

        .remove-member-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }

        .mobile-bottom-nav.hidden { transform: translateY(100%); }

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBx_koHusbH0CwiGvVj132nZ0rUpuPyqQw",
        authDomain: "msend-92718.firebaseapp.com",
        projectId: "msend-92718",
        storageBucket: "msend-92718.firebasestorage.app",
        messagingSenderId: "672219125451",
        appId: "1:672219125451:web:84871d4e136d0168076d4e"
    };

    const CLOUDINARY_CLOUD_NAME = 'dsf0w12ff';
    const CLOUDINARY_UPLOAD_PRESET = 'cheburchat_preset';

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let userData = null;
    let currentChat = null;
    let allUsers = [];
    let chatsList = { private: [], groups: [] };
    let messagesUnsubscribe = null;
    let isMobile = window.innerWidth <= 768;
    let isAdmin = false;
    let currentView = 'chats';
    let viewedProfileUserId = null;

    const savedTheme = localStorage.getItem('cheburchat_theme') || 'default';
    document.body.setAttribute('data-theme', savedTheme);

    function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('cheburchat_theme', theme);
    }

    function showModal(title, message, onConfirm = null) {
        const modal = document.getElementById('modal');
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message;
        const confirmBtn = document.getElementById('modalConfirm');
        confirmBtn.onclick = () => {
            modal.classList.remove('active');
            if (onConfirm) onConfirm();
        };
        modal.classList.add('active');
    }

    function getInitials(first, last) { return (first?.[0] || '?') + (last?.[0] || '?'); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)).replace(/\n/g,'<br>'); }
    function scrollToBottom() { const el = document.getElementById('messagesArea'); if(el) setTimeout(() => el.scrollTop = el.scrollHeight, 100); }
    function getChatId(a, b) { return [a, b].sort().join('_'); }

    // ========== АВАТАРКИ ==========
    function uploadAvatar(file) {
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        formData.append('folder', 'avatars');
        showModal('Загрузка', 'Обновление аватарки...');
        fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.secure_url) {
                    db.collection('users').doc(currentUser.uid).update({ avatarUrl: data.secure_url }).then(() => {
                        userData.avatarUrl = data.secure_url;
                        showModal('Успех', 'Аватарка обновлена!');
                        if (currentView === 'profile') showProfileView(viewedProfileUserId);
                        else if (currentView === 'chats') showChatsView();
                        else if (currentView === 'people') showPeopleView();
                        else if (currentView === 'feed') showFeedView();
                    }).catch(err => showModal('Ошибка', err.message));
                } else showModal('Ошибка', data.error?.message || 'Ошибка загрузки');
            }).catch(err => showModal('Ошибка', err.message));
    }

    function changeAvatar() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => { const file = e.target.files?.[0]; if (file) uploadAvatar(file); };
        input.click();
    }

    // ========== ПОСТЫ И КОММЕНТАРИИ ==========
    async function createPost(text) {
        if (!text.trim()) return;
        await db.collection('posts').add({
            userId: currentUser.uid,
            userName: `${userData.firstName} ${userData.lastName}`,
            userAvatar: userData.avatarUrl || null,
            userVerified: userData.isVerified || false,
            text: text.trim(),
            likes: [],
            comments: [],
            createdAt: new Date().toISOString()
        });
        showModal('Успех', 'Запись опубликована!');
        if (currentView === 'profile') showProfileView(viewedProfileUserId);
        else if (currentView === 'feed') showFeedView();
    }

    async function toggleLike(postId) {
        const postRef = db.collection('posts').doc(postId);
        const post = (await postRef.get()).data();
        const likes = post.likes || [];
        if (likes.includes(currentUser.uid)) {
            await postRef.update({ likes: firebase.firestore.FieldValue.arrayRemove(currentUser.uid) });
        } else {
            await postRef.update({ likes: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
        }
        if (currentView === 'profile') showProfileView(viewedProfileUserId);
        else if (currentView === 'feed') showFeedView();
    }

    async function toggleCommentLike(postId, commentId) {
        const postRef = db.collection('posts').doc(postId);
        const post = (await postRef.get()).data();
        const comments = post.comments || [];
        const commentIndex = comments.findIndex(c => c.id === commentId);
        if (commentIndex !== -1) {
            const comment = comments[commentIndex];
            const likes = comment.likes || [];
            if (likes.includes(currentUser.uid)) {
                comment.likes = likes.filter(id => id !== currentUser.uid);
            } else {
                comment.likes = [...likes, currentUser.uid];
            }
            comments[commentIndex] = comment;
            await postRef.update({ comments: comments });
        }
        if (currentView === 'profile') showProfileView(viewedProfileUserId);
        else if (currentView === 'feed') showFeedView();
    }

    async function addComment(postId, text) {
        if (!text.trim()) return;
        const comment = {
            id: Date.now().toString(),
            userId: currentUser.uid,
            userName: `${userData.firstName} ${userData.lastName}`,
            userAvatar: userData.avatarUrl || null,
            userVerified: userData.isVerified || false,
            text: text.trim(),
            likes: [],
            createdAt: new Date().toISOString()
        };
        await db.collection('posts').doc(postId).update({
            comments: firebase.firestore.FieldValue.arrayUnion(comment)
        });
        if (currentView === 'profile') showProfileView(viewedProfileUserId);
        else if (currentView === 'feed') showFeedView();
    }

    async function loadPosts(userId = null) {
        let query = db.collection('posts').orderBy('createdAt', 'desc');
        if (userId) query = query.where('userId', '==', userId);
        const snapshot = await query.get();
        const posts = [];
        snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
        return posts;
    }

    // ========== ЛЕНТА НОВОСТЕЙ ==========
    async function showFeedView() {
        currentView = 'feed';
        if (isMobile) { const bn = document.querySelector('.mobile-bottom-nav'); if(bn) bn.classList.remove('hidden'); }
        
        const posts = await loadPosts();
        
        let postsHtml = '<div class="posts-feed">';
        if (posts.length === 0) {
            postsHtml += '<div class="post-card" style="text-align: center; padding: 40px;"><i class="fas fa-newspaper" style="font-size: 48px; opacity: 0.5; margin-bottom: 16px;"></i><p>Нет постов</p><p style="font-size: 13px;">Подпишитесь на друзей или создайте свой первый пост!</p></div>';
        }
        
        for (const post of posts) {
            const postDate = new Date(post.createdAt).toLocaleString();
            const likes = post.likes || [];
            const comments = post.comments || [];
            const isLiked = likes.includes(currentUser.uid);
            
            postsHtml += `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header" data-user-id="${post.userId}">
                        <div class="post-avatar" style="${post.userAvatar ? `background-image: url('${post.userAvatar}'); background-size: cover; background-position: center;` : ''}">${!post.userAvatar ? getInitials(post.userName?.split(' ')[0], post.userName?.split(' ')[1] || '') : ''}</div>
                        <div>
                            <div class="post-author-name">${escapeHtml(post.userName)} ${post.userVerified ? '<i class="fas fa-check-circle verified-icon" style="font-size: 12px;"></i>' : ''}</div>
                            <div class="post-time">${postDate}</div>
                        </div>
                    </div>
                    <div class="post-text">${escapeHtml(post.text)}</div>
                    <div class="post-actions">
                        <button class="post-action-btn ${isLiked ? 'liked' : ''}" data-action="like" data-post="${post.id}"><i class="fas fa-heart"></i> ${likes.length > 0 ? likes.length : ''}</button>
                        <button class="post-action-btn" data-action="comment" data-post="${post.id}"><i class="fas fa-comment"></i> ${comments.length > 0 ? comments.length : ''}</button>
                    </div>
                    <div class="comments-section" id="comments-${post.id}" style="display: none;">
                        ${comments.map(c => `
                            <div class="comment-item">
                                <div class="comment-avatar" style="${c.userAvatar ? `background-image: url('${c.userAvatar}'); background-size: cover; background-position: center;` : ''}">${!c.userAvatar ? getInitials(c.userName?.split(' ')[0], c.userName?.split(' ')[1] || '') : ''}</div>
                                <div class="comment-content">
                                    <div class="comment-author">${escapeHtml(c.userName)} ${c.userVerified ? '<i class="fas fa-check-circle verified-icon" style="font-size: 10px;"></i>' : ''}</div>
                                    <div class="comment-text">${escapeHtml(c.text)}</div>
                                    <div class="comment-footer">
                                        <div class="comment-time">${new Date(c.createdAt).toLocaleString()}</div>
                                        <button class="comment-like-btn ${c.likes?.includes(currentUser.uid) ? 'liked' : ''}" data-post="${post.id}" data-comment="${c.id}"><i class="fas fa-heart"></i> ${c.likes?.length || 0}</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                        <div class="add-comment">
                            <input type="text" id="comment-input-${post.id}" placeholder="Написать комментарий...">
                            <button data-post="${post.id}" class="submit-comment-btn">Отправить</button>
                        </div>
                    </div>
                </div>
            `;
        }
        postsHtml += '</div>';
        
        document.getElementById('mainContent').innerHTML = `
            <div class="profile-view">
                <div class="profile-header" style="height: 100px;">
                    <div style="position: absolute; bottom: -30px; left: 20px; display: flex; align-items: center; gap: 16px;">
                        <div style="font-size: 28px; font-weight: 700; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.2);">Лента новостей</div>
                    </div>
                </div>
                <div class="profile-info" style="padding-top: 30px;">
                    <div class="profile-section" style="padding: 0;">
                        ${postsHtml}
                    </div>
                </div>
            </div>
        `;
        
        // Обработчики
        document.querySelectorAll('.post-header').forEach(header => {
            header.addEventListener('click', () => {
                const userId = header.dataset.userId;
                if (userId) showProfileView(userId);
            });
        });
        
        document.querySelectorAll('.post-action-btn[data-action="like"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleLike(btn.dataset.post);
            });
        });
        
        document.querySelectorAll('.post-action-btn[data-action="comment"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const commentsDiv = document.getElementById(`comments-${btn.dataset.post}`);
                if (commentsDiv.style.display === 'none') commentsDiv.style.display = 'block';
                else commentsDiv.style.display = 'none';
            });
        });
        
        document.querySelectorAll('.submit-comment-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const postId = btn.dataset.post;
                const input = document.getElementById(`comment-input-${postId}`);
                addComment(postId, input.value);
                input.value = '';
            });
        });
        
        document.querySelectorAll('.comment-like-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleCommentLike(btn.dataset.post, btn.dataset.comment);
            });
        });
        
        if (isMobile) updateMobileNav('feed');
    }

    // ========== ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ ==========
    async function showProfileView(userId = null) {
        currentView = 'profile';
        const targetUserId = userId || currentUser.uid;
        viewedProfileUserId = targetUserId;
        const isOwnProfile = targetUserId === currentUser.uid;
        
        if (isMobile) { const bn = document.querySelector('.mobile-bottom-nav'); if(bn) bn.classList.remove('hidden'); }
        
        const userDoc = await db.collection('users').doc(targetUserId).get();
        if (!userDoc.exists) { showModal('Ошибка', 'Пользователь не найден'); showChatsView(); return; }
        const profileData = userDoc.data();
        
        const friendsCount = profileData.friends?.length || 0;
        const avatarStyle = profileData.avatarUrl ? `background-image: url('${profileData.avatarUrl}'); background-size: cover; background-position: center;` : '';
        
        const posts = await loadPosts(targetUserId);
        
        let postsHtml = '<div class="posts-feed">';
        if (isOwnProfile) {
            postsHtml += `
                <div class="create-post-card">
                    <textarea id="newPostText" class="create-post-input" rows="3" placeholder="Что у вас нового?"></textarea>
                    <button class="create-post-btn" id="submitPostBtn">✏️ Опубликовать</button>
                </div>
            `;
        }
        
        for (const post of posts) {
            const postDate = new Date(post.createdAt).toLocaleString();
            const likes = post.likes || [];
            const comments = post.comments || [];
            const isLiked = likes.includes(currentUser.uid);
            
            postsHtml += `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        <div class="post-avatar" style="${post.userAvatar ? `background-image: url('${post.userAvatar}'); background-size: cover; background-position: center;` : ''}">${!post.userAvatar ? getInitials(post.userName?.split(' ')[0], post.userName?.split(' ')[1] || '') : ''}</div>
                        <div>
                            <div class="post-author-name">${escapeHtml(post.userName)} ${post.userVerified ? '<i class="fas fa-check-circle verified-icon" style="font-size: 12px;"></i>' : ''}</div>
                            <div class="post-time">${postDate}</div>
                        </div>
                    </div>
                    <div class="post-text">${escapeHtml(post.text)}</div>
                    <div class="post-actions">

    async function loadChatsList() {
        if(!currentUser) return;
        try {
            const allMessages = await db.collection('messages').where('userId', '==', currentUser.uid).get();
            const messagesTo = await db.collection('messages').where('toUserId', '==', currentUser.uid).get();
            const chatUsers = new Map();
            allMessages.forEach(doc => { const msg = doc.data(); if(msg.toUserId && msg.toUserId !== currentUser.uid && msg.chatType !== 'group') chatUsers.set(msg.toUserId, { lastMsg: msg.text || '📎 Медиа', lastTime: msg.timestamp }); });
            messagesTo.forEach(doc => { const msg = doc.data(); if(msg.userId && msg.userId !== currentUser.uid && msg.chatType !== 'group') { const existing = chatUsers.get(msg.userId); if(!existing || (msg.timestamp && existing.lastTime?.toDate?.() < msg.timestamp.toDate())) chatUsers.set(msg.userId, { lastMsg: msg.text || '📎 Медиа', lastTime: msg.timestamp }); } });
            const friendIds = userData.friends || [];
            for(const id of friendIds) { if(!chatUsers.has(id)) { const userDoc = await db.collection('users').doc(id).get(); if(userDoc.exists) chatUsers.set(id, { lastMsg: 'Напишите первым', lastTime: null }); } }
            const privateChats = [];
            for(const [id, data] of chatUsers) {
                const userDoc = await db.collection('users').doc(id).get();
                if(userDoc.exists) { const u = userDoc.data(); privateChats.push({ type: 'private', id, firstName: u.firstName, lastName: u.lastName, avatarUrl: u.avatarUrl || null, isVerified: u.isVerified || false, lastMsg: data.lastMsg || 'Напишите первым', lastTime: data.lastTime, unreadCount: 0 }); }
            }
            const groupsSnapshot = await db.collection('groups').where('members', 'array-contains', currentUser.uid).get();
            const groupChats = [];
            for(const doc of groupsSnapshot.docs) {
                const group = doc.data();
                const lastMsgSnapshot = await db.collection('messages').where('groupId', '==', doc.id).orderBy('timestamp', 'desc').limit(1).get();
                let lastMsg = 'Нет сообщений', lastTime = null;
                if(!lastMsgSnapshot.empty) { const lastMsgData = lastMsgSnapshot.docs[0].data(); lastMsg = lastMsgData.text || '📎 Медиа'; lastTime = lastMsgData.timestamp?.toDate?.() || null; }
                groupChats.push({ type: 'group', id: doc.id, name: group.name, members: group.members, createdBy: group.createdBy, lastMsg, lastTime });
            }
            groupChats.sort((a,b) => (b.lastTime?.getTime?.() || 0) - (a.lastTime?.getTime?.() || 0));
            privateChats.sort((a,b) => (b.lastTime?.toDate?.()?.getTime() || 0) - (a.lastTime?.toDate?.()?.getTime() || 0));
            chatsList = { private: privateChats, groups: groupChats };
            renderChatsList();
        } catch(e) { console.error(e); }
    }

    function renderChatsList(searchQuery = '') {
        const container = document.getElementById('chatsListContainer');
        if(!container) return;
        let fp = chatsList.private || [], fg = chatsList.groups || [];
        if(searchQuery) { const q = searchQuery.toLowerCase(); fp = fp.filter(c => `${c.firstName} ${c.lastName}`.toLowerCase().includes(q)); fg = fg.filter(g => g.name.toLowerCase().includes(q)); }
        if(fp.length === 0 && fg.length === 0) { container.innerHTML = '<div class="empty-chats"><i class="fas fa-comments" style="font-size:48px;margin-bottom:16px;opacity:0.5"></i><p>Нет чатов</p><p style="font-size:13px">Начните общение или создайте беседу</p></div>'; return; }
        container.innerHTML = '';
        fg.forEach(chat => {
            const div = document.createElement('div'); div.className = 'chat-item';
            const timeStr = chat.lastTime ? new Date(chat.lastTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            div.innerHTML = `<div class="chat-avatar group-avatar"><i class="fas fa-users"></i></div><div class="chat-info"><div class="chat-name">${escapeHtml(chat.name)}<span class="group-icon"><i class="fas fa-users"></i></span></div><div class="chat-last-msg">${escapeHtml(chat.lastMsg.substring(0,50))}</div></div>${timeStr ? `<div class="chat-time">${timeStr}</div>` : ''}`;
            div.onclick = () => openChat({ type: 'group', id: chat.id, name: chat.name, members: chat.members, createdBy: chat.createdBy });
            container.appendChild(div);
        });
        fp.forEach(chat => {
            const div = document.createElement('div'); div.className = 'chat-item';
            const timeStr = chat.lastTime?.toDate?.() ? new Date(chat.lastTime.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            const avatarStyle = chat.avatarUrl ? `background-image: url('${chat.avatarUrl}'); background-size: cover; background-position: center;` : '';
            div.innerHTML = `<div class="chat-avatar" style="${avatarStyle}">${!chat.avatarUrl ? getInitials(chat.firstName, chat.lastName) : ''}${chat.isVerified ? '<div class="verified-badge"><i class="fas fa-check"></i></div>' : ''}</div><div class="chat-info"><div class="chat-name">${chat.firstName} ${chat.lastName}${chat.isVerified ? '<i class="fas fa-check-circle verified-icon"></i>' : ''}</div><div class="chat-last-msg">${escapeHtml(chat.lastMsg.substring(0,50))}</div></div>${timeStr ? `<div class="chat-time">${timeStr}</div>` : ''}`;
            div.onclick = () => openChat({ type: 'private', id: chat.id, firstName: chat.firstName, lastName: chat.lastName, avatarUrl: chat.avatarUrl, isVerified: chat.isVerified });
            container.appendChild(div);
        });
    }

    async function handleRegister() {
        const fn = document.getElementById('regFirstName').value.trim(), ln = document.getElementById('regLastName').value.trim(), email = document.getElementById('regEmail').value.trim(), pass = document.getElementById('regPassword').value;
        if(!fn || !ln) { showModal('Ошибка', 'Введите имя и фамилию'); return; }
        if(pass.length < 6) { showModal('Ошибка', 'Пароль минимум 6 символов'); return; }
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, pass);
            await cred.user.sendEmailVerification();
            await db.collection('users').doc(cred.user.uid).set({ firstName: fn, lastName: ln, email, friends: [], friendRequests: { sent: [], received: [] }, createdAt: new Date(), isVerified: false });
            showModal('Регистрация', 'Письмо с подтверждением отправлено!');
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function handleLogin() {
