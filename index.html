<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЧЕБУРЧАТ — Социальная сеть</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; }
        
        body[data-theme="default"] { --bg-page: #f0f2f5; --bg-surface: white; --bg-element: #f0f2f5; --text: #1a1a1a; --text-secondary: #65676b; --accent: #ff7b2c; --accent-hover: #e6691a; --border: #e4e6eb; --my-msg: #ff7b2c; --my-msg-text: white; --other-msg: white; --other-msg-text: #1a1a1a; --verified: #3b82f6; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        body[data-theme="dark"] { --bg-page: #18191a; --bg-surface: #242526; --bg-element: #3a3b3c; --text: #e4e6eb; --text-secondary: #b0b3b8; --accent: #ff7b2c; --accent-hover: #e6691a; --border: #3e4042; --my-msg: #ff7b2c; --my-msg-text: white; --other-msg: #3e4042; --other-msg-text: #e4e6eb; --verified: #3b82f6; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        body[data-theme="purple"] { --bg-page: #f5f0ff; --bg-surface: white; --bg-element: #f0ebf8; --text: #2d1b4e; --text-secondary: #7c6b9e; --accent: #9b59b6; --accent-hover: #8e44ad; --border: #e8dfd5; --my-msg: #9b59b6; --my-msg-text: white; --other-msg: white; --other-msg-text: #2d1b4e; --verified: #3b82f6; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        body[data-theme="red"] { --bg-page: #1a0f0f; --bg-surface: #2a1a1a; --bg-element: #3d2525; --text: #f0d6d6; --text-secondary: #c4a0a0; --accent: #c0392b; --accent-hover: #e74c3c; --border: #4a2e2e; --my-msg: #c0392b; --my-msg-text: white; --other-msg: #3d2525; --other-msg-text: #f0d6d6; --verified: #3b82f6; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        body[data-theme="blue"] { --bg-page: #e8f0fe; --bg-surface: white; --bg-element: #e4edf7; --text: #1a3a5c; --text-secondary: #5a7a9e; --accent: #2d88ff; --accent-hover: #1a66cc; --border: #d4e0ec; --my-msg: #2d88ff; --my-msg-text: white; --other-msg: white; --other-msg-text: #1a3a5c; --verified: #fbbf24; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        body[data-theme="green"] { --bg-page: #eaf7ea; --bg-surface: white; --bg-element: #e2f0e2; --text: #1a4a1a; --text-secondary: #5a8a5a; --accent: #27ae60; --accent-hover: #219a52; --border: #d0e4d0; --my-msg: #27ae60; --my-msg-text: white; --other-msg: white; --other-msg-text: #1a4a1a; --verified: #3b82f6; --read-status: #8e8e8e; --read-status-delivered: #34c759; }
        
        body { background: var(--bg-page); color: var(--text); }
        
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-page); padding: 16px; }
        .auth-card { background: var(--bg-surface); padding: 32px 24px; border-radius: 28px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        .auth-card h1 { color: var(--accent); margin-bottom: 24px; font-size: 32px; }
        .auth-card input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); border-radius: 16px; font-size: 16px; background: var(--bg-element); color: var(--text); }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 16px; color: white; font-weight: 600; margin-top: 16px; cursor: pointer; }
        .toggle-auth { margin-top: 16px; color: var(--accent); cursor: pointer; }
        .verify-msg { background: #fff3cd; color: #856404; padding: 12px; border-radius: 16px; margin: 12px 0; font-size: 14px; }
        .hidden { display: none !important; }
        
        .app { display: flex; height: 100vh; background: var(--bg-page); }
        .sidebar { width: 280px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; }
        .logo { padding: 20px 20px 16px; font-size: 22px; font-weight: 800; color: var(--accent); border-bottom: 1px solid var(--border); }
        .sidebar-section { padding: 16px 0; }
        .nav-item { padding: 10px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); font-weight: 500; border-radius: 10px; margin: 0 8px; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--bg-element); color: var(--accent); }
        .nav-item i { width: 24px; font-size: 20px; }
        .user-info-sidebar { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; flex-shrink: 0; position: relative; }
        .verified-badge { position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; background: var(--verified); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; border: 2px solid var(--bg-surface); }
        .logout-btn { margin: 10px 16px; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-page); }
        
        .chats-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); }
        .chats-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chats-header h2 { font-size: 24px; font-weight: 700; color: var(--text); }
        .create-group-btn { background: var(--accent); border: none; padding: 8px 16px; border-radius: 24px; color: white; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .chats-search { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .chats-search input { width: 100%; padding: 10px 16px; border: none; background: var(--bg-element); border-radius: 24px; font-size: 15px; outline: none; color: var(--text); }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .chat-item:hover { background: var(--bg-element); }
        .chat-avatar { width: 52px; height: 52px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 20px; flex-shrink: 0; position: relative; }
        .group-avatar { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 16px; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .verified-icon { color: var(--verified); font-size: 14px; }
        .group-icon { font-size: 12px; color: var(--text-secondary); }
        .chat-last-msg { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
        .empty-chats { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        
        /* Сообщения */
        .message { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn 0.2s ease; margin-bottom: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.my { align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 18px; word-wrap: break-word; cursor: pointer; }
        .my .message-bubble { background: var(--my-msg); color: var(--my-msg-text); border-bottom-right-radius: 4px; }
        .other .message-bubble { background: var(--other-msg); color: var(--other-msg-text); border-bottom-left-radius: 4px; }
        .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 4px; margin-left: 6px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
        .message-footer { display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin-top: 4px; margin-right: 6px; }
        .message-time { font-size: 10px; color: var(--text-secondary); }
        .read-status { font-size: 10px; display: flex; align-items: center; gap: 2px; }
        .read-status.read i { color: var(--read-status-delivered); }
        .read-status.delivered i { color: var(--read-status); }
        
        /* Реакции под сообщением */
        .reactions-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; margin-left: 6px; }
        .reaction-item { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-element); padding: 2px 8px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.1s; border: 1px solid var(--border); }
        .reaction-item:hover { background: var(--bg-element); transform: scale(1.05); }
        .reaction-item.my-reaction { background: var(--accent); color: white; border-color: var(--accent); }
        .reaction-item.my-reaction .reaction-count { color: rgba(255,255,255,0.8); }
        .reaction-emoji { font-size: 14px; }
        .reaction-count { font-size: 11px; font-weight: 500; }
        
        /* Контекстное меню для ПК */
        .context-menu { position: fixed; background: var(--bg-surface); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 1000; min-width: 180px; overflow: hidden; border: 1px solid var(--border); display: none; }
        .context-menu.active { display: block; }
        .context-menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.1s; color: var(--text); }
        .context-menu-item:hover { background: var(--bg-element); }
        .context-menu-item.delete { color: #dc3545; }
        
        /* Модальное окно выбора реакций */
        .reactions-modal .modal { max-width: 350px; }
        .reactions-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; padding: 16px; }
        .reaction-option { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px; cursor: pointer; border-radius: 16px; transition: 0.1s; min-width: 60px; }
        .reaction-option:hover { background: var(--bg-element); transform: scale(1.05); }
        .reaction-emoji-big { font-size: 32px; }
        .reaction-name { font-size: 12px; color: var(--text-secondary); }
        
        /* Мобильное контекстное меню */
        .mobile-context-menu { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-surface); border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); z-index: 1001; display: none; flex-direction: column; padding: 16px; animation: slideUp 0.2s ease; }
        .mobile-context-menu.active { display: flex; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .mobile-context-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; }
        .mobile-context-overlay.active { display: block; }
        .mobile-context-title { font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--text-secondary); text-align: center; }
        .mobile-context-buttons { display: flex; flex-direction: column; gap: 8px; }
        .mobile-context-btn { padding: 14px; border-radius: 14px; background: var(--bg-element); border: none; font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text); }
        .mobile-context-btn.delete { color: #dc3545; background: rgba(220,53,69,0.1); }
        
        .chat-window { display: flex; flex-direction: column; height: 100%; background: var(--bg-page); }
        .chat-header { padding: 12px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text); }
        .chat-header-avatar { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; flex-shrink: 0; position: relative; }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: 600; font-size: 17px; color: var(--text); display: flex; align-items: center; gap: 6px; }
        .chat-header-members { font-size: 12px; color: var(--text-secondary); cursor: pointer; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .input-area { padding: 12px 16px; background: var(--bg-surface); border-top: 1px solid var(--border); display: flex; gap: 12px; flex-shrink: 0; }
        .input-area input { flex: 1; padding: 12px 18px; border: none; background: var(--bg-element); border-radius: 28px; font-size: 16px; outline: none; color: var(--text); }
        .input-area button { background: var(--accent); border: none; width: 48px; height: 48px; border-radius: 50%; color: white; cursor: pointer; font-size: 18px; }
        
        /* Остальные стили (компактно) */
        .people-view, .settings-view, .admin-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); }
        .people-header, .settings-header, .admin-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .people-header h2, .settings-header h2, .admin-header h2 { font-size: 24px; font-weight: 700; color: var(--text); flex: 1; }
        .people-search, .admin-search { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .people-search input, .admin-search input { width: 100%; padding: 10px 16px; border: none; background: var(--bg-element); border-radius: 24px; font-size: 15px; outline: none; color: var(--text); }
        .people-list, .admin-list { flex: 1; overflow-y: auto; }
        .person-item, .admin-user-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .person-item:hover, .admin-user-item:hover { background: var(--bg-element); }
        .person-info, .admin-user-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .person-avatar, .admin-user-avatar { width: 48px; height: 48px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; position: relative; }
        .person-name, .admin-user-name { font-weight: 600; font-size: 16px; color: var(--text); display: flex; align-items: center; gap: 6px; }
        .action-btns { display: flex; gap: 8px; }
        .action-btn { background: none; border: none; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .action-btn.write { background: var(--accent); color: white; }
        .action-btn.add { background: var(--bg-element); color: var(--text); }
        .action-btn.remove { background: #dc3545; color: white; }
        .action-btn.pending { background: var(--bg-element); color: var(--text-secondary); cursor: default; }
        
        .settings-list { padding: 16px; }
        .settings-section { margin-bottom: 24px; }
        .settings-section-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
        .theme-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .theme-option { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px; border-radius: 16px; cursor: pointer; border: 2px solid transparent; background: var(--bg-element); }
        .theme-option.active { border-color: var(--accent); }
        .theme-preview { width: 50px; height: 50px; border-radius: 25px; }
        .theme-preview.default { background: linear-gradient(135deg, #ff7b2c, #e6691a); }
        .theme-preview.dark { background: linear-gradient(135deg, #242526, #3a3b3c); }
        .theme-preview.purple { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .theme-preview.red { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        .theme-preview.blue { background: linear-gradient(135deg, #2d88ff, #1a66cc); }
        .theme-preview.green { background: linear-gradient(135deg, #27ae60, #219a52); }
        .theme-name { font-size: 13px; color: var(--text); }
        
        .admin-stats { display: flex; gap: 16px; padding: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .admin-stat-card { background: var(--bg-element); border-radius: 16px; padding: 12px 20px; text-align: center; flex: 1; min-width: 100px; }
        .admin-stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
        .admin-stat-label { font-size: 12px; color: var(--text-secondary); }
        
        .group-manage-modal .modal { max-width: 500px; }
        .group-members-list { max-height: 300px; overflow-y: auto; margin: 16px 0; border: 1px solid var(--border); border-radius: 16px; }
        .group-member-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .group-member-avatar { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .remove-member-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .add-member-section { margin: 16px 0; padding-top: 16px; border-top: 1px solid var(--border); }
        .add-member-select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 16px; background: var(--bg-element); color: var(--text); margin-bottom: 12px; }
        .danger-btn { background: #dc3545; color: white; border: none; padding: 12px; border-radius: 16px; cursor: pointer; width: 100%; margin-top: 8px; font-weight: 600; }
        .leave-btn { background: #ffc107; color: #1a1a1a; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-surface); border-radius: 28px; width: 320px; max-width: 90%; text-align: center; overflow: hidden; }
        .modal-header { padding: 24px 20px 0; font-size: 18px; font-weight: bold; color: var(--text); }
        .modal-body { padding: 20px; color: var(--text-secondary); }
        .modal-buttons { display: flex; border-top: 1px solid var(--border); }
        .modal-buttons button { flex: 1; padding: 16px; border: none; background: none; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--text); }
        .modal-buttons .confirm { color: var(--accent); border-left: 1px solid var(--border); }
        
        .create-group-modal .modal { max-width: 400px; }
        .friend-list-select { max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 16px; padding: 8px; margin: 12px 0; }
        .friend-select-item { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; border-radius: 12px; }
        .friend-select-item:hover { background: var(--bg-element); }
        .friend-select-item input { width: 18px; height: 18px; margin: 0; }
        .selected-friends { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        
        .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-surface); border-top: 1px solid var(--border); padding: 8px 20px 12px; justify-content: space-around; z-index: 100; transition: transform 0.3s ease; }
        .mobile-bottom-nav.hidden { transform: translateY(100%); }
        .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; font-size: 11px; color: var(--text-secondary); cursor: pointer; padding: 8px; border-radius: 12px; }
        .mobile-nav-item i { font-size: 22px; }
        .mobile-nav-item.active { color: var(--accent); background: var(--bg-element); }
        
        .mobile-profile-modal .modal { max-width: 320px; }
        .mobile-profile-info { text-align: center; padding: 16px; }
        .mobile-profile-avatar { width: 80px; height: 80px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 32px; margin: 0 auto 16px; position: relative; }
        .mobile-profile-name { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .mobile-profile-email { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; word-break: break-all; }
        .mobile-logout-btn { width: 100%; padding: 14px; background: #dc3545; color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        @media (max-width: 768px) { .sidebar { display: none; } .mobile-bottom-nav { display: flex; } .message { max-width: 85%; } }
        @media (min-width: 769px) { .back-btn { display: flex !important; } }
    </style>
</head>
<body data-theme="default">
<div id="app"></div>

<!-- Контекстное меню для ПК -->
<div id="contextMenu" class="context-menu">
    <div id="contextReactionItem" class="context-menu-item">
        <i class="fas fa-smile"></i> Реакция
    </div>
    <div id="contextDeleteItem" class="context-menu-item delete">
        <i class="fas fa-trash"></i> Удалить
    </div>
</div>

<!-- Модальное окно выбора реакций -->

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBx_koHusbH0CwiGvVj132nZ0rUpuPyqQw",
        authDomain: "msend-92718.firebaseapp.com",
        projectId: "msend-92718",
        storageBucket: "msend-92718.firebasestorage.app",
        messagingSenderId: "672219125451",
        appId: "1:672219125451:web:84871d4e136d0168076d4e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let userData = null;
    let currentChat = null;
    let allUsers = [];
    let chatsList = { private: [], groups: [] };
    let messagesUnsubscribe = null;
    let isMobile = window.innerWidth <= 768;
    let isAdmin = false;
    
    let activeMessageId = null;
    let activeMessageIsMy = false;

    const savedTheme = localStorage.getItem('cheburchat_theme') || 'default';
    document.body.setAttribute('data-theme', savedTheme);

    function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('cheburchat_theme', theme);
    }

    function showModal(title, message, onConfirm = null) {
        const modal = document.getElementById('modal');
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message;
        const confirmBtn = document.getElementById('modalConfirm');
        confirmBtn.onclick = () => {
            modal.classList.remove('active');
            if (onConfirm) onConfirm();
        };
        modal.classList.add('active');
    }

    function showReactionsModal(messageId) {
        const modal = document.getElementById('reactionsModal');
        modal.classList.add('active');
        
        document.querySelectorAll('#reactionsModal .reaction-option').forEach(el => {
            el.onclick = () => {
                const reaction = el.dataset.reaction;
                addReaction(messageId, reaction);
                modal.classList.remove('active');
            };
        });
        
        document.getElementById('closeReactionsModal').onclick = () => {
            modal.classList.remove('active');
        };
    }

    function getInitials(first, last) { return (first?.[0] || '?') + (last?.[0] || '?'); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)).replace(/\n/g,'<br>'); }
    function scrollToBottom() { const el = document.getElementById('messagesArea'); if(el) setTimeout(() => el.scrollTop = el.scrollHeight, 100); }
    function getChatId(a, b) { return [a, b].sort().join('_'); }

    // ========== РЕАКЦИИ ==========
    async function addReaction(messageId, reaction) {
        if (!messageId || !reaction) return;
        const messageRef = db.collection('messages').doc(messageId);
        const messageDoc = await messageRef.get();
        if (!messageDoc.exists) return;
        
        const reactions = messageDoc.data().reactions || {};
        const userId = currentUser.uid;
        
        if (reactions[userId] === reaction) {
            delete reactions[userId];
        } else {
            reactions[userId] = reaction;
        }
        
        await messageRef.update({ reactions: reactions });
        hideContextMenu();
    }

    async function deleteMessage(messageId) {
        showModal('Подтверждение', 'Удалить это сообщение?', async () => {
            try {
                await db.collection('messages').doc(messageId).delete();
                showModal('Успех', 'Сообщение удалено');
            } catch(e) { showModal('Ошибка', e.message); }
        });
        hideContextMenu();
    }

    // ========== КОНТЕКСТНОЕ МЕНЮ ==========
    function hideContextMenu() {
        document.getElementById('contextMenu').classList.remove('active');
        document.getElementById('mobileContextOverlay').classList.remove('active');
        document.getElementById('mobileContextMenu').classList.remove('active');
        activeMessageId = null;
    }

    function showContextMenu(e, messageId, isMyMessage) {
        e.preventDefault();
        e.stopPropagation();
        activeMessageId = messageId;
        activeMessageIsMy = isMyMessage;
        
        if (isMobile) {
            const mobileMenu = document.getElementById('mobileContextMenu');
            const overlay = document.getElementById('mobileContextOverlay');
            const deleteBtn = document.getElementById('mobileDeleteBtn');
            const reactionBtn = document.getElementById('mobileReactionBtn');
            
            if (isMyMessage) {
                deleteBtn.style.display = 'flex';
                reactionBtn.style.display = 'flex';
            } else {
                deleteBtn.style.display = 'none';
                reactionBtn.style.display = 'flex';
            }
            
            reactionBtn.onclick = () => {
                hideContextMenu();
                showReactionsModal(messageId);
            };
            
            deleteBtn.onclick = () => {
                if (isMyMessage) deleteMessage(messageId);
                hideContextMenu();
            };
            
            overlay.onclick = hideContextMenu;
            overlay.classList.add('active');
            mobileMenu.classList.add('active');
        } else {
            const menu = document.getElementById('contextMenu');
            const deleteItem = document.getElementById('contextDeleteItem');
            const reactionItem = document.getElementById('contextReactionItem');
            
            if (isMyMessage) {
                deleteItem.style.display = 'flex';
            } else {
                deleteItem.style.display = 'none';
            }
            
            let x = e.clientX;
            let y = e.clientY;
            const menuWidth = 180;
            const menuHeight = 80;
            if (x + menuWidth > window.innerWidth) x = window.innerWidth - menuWidth - 10;
            if (y + menuHeight > window.innerHeight) y = window.innerHeight - menuHeight - 10;
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            menu.classList.add('active');
            
            reactionItem.onclick = () => {
                menu.classList.remove('active');
                showReactionsModal(messageId);
            };
            
            deleteItem.onclick = () => {
                if (isMyMessage) deleteMessage(messageId);
                hideContextMenu();
            };
        }
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        if(!input || !currentChat) return;
        const text = input.value.trim();
        if(!text) return;
        input.value = '';
        
        try {
            const messageData = {
                text: text,
                userId: currentUser.uid,
                userName: `${userData.firstName} ${userData.lastName}`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                chatType: currentChat.type,
                reactions: {}
            };
            
            if (currentChat.type === 'private') {
                messageData.read = false;
                messageData.chatId = getChatId(currentUser.uid, currentChat.id);
                messageData.toUserId = currentChat.id;
            } else {
                messageData.groupId = currentChat.id;
                await db.collection('groups').doc(currentChat.id).update({
                    lastMsg: text,
                    lastTime: new Date().toISOString()
                }).catch(() => {});
            }
            
            await db.collection('messages').add(messageData);
            scrollToBottom();
            loadChatsList();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function markMessagesAsRead(chat) {
        if (!currentUser || chat.type !== 'private') return;
        const chatId = getChatId(currentUser.uid, chat.id);
        const query = db.collection('messages').where('chatId', '==', chatId).where('userId', '!=', currentUser.uid).where('read', '==', false);
        const snapshot = await query.get();
        const batch = db.batch();
        snapshot.forEach(doc => batch.update(doc.ref, { read: true }));
        await batch.commit();
    }

    function loadMessages() {
        if(messagesUnsubscribe) messagesUnsubscribe();
        if(!currentChat) return;
        
        let query;
        if (currentChat.type === 'private') {
            const chatId = getChatId(currentUser.uid, currentChat.id);
            query = db.collection('messages').where('chatId', '==', chatId);
        } else {
            query = db.collection('messages').where('groupId', '==', currentChat.id);
        }
        
        messagesUnsubscribe = query.orderBy('timestamp', 'asc').onSnapshot(async (snapshot) => {
            const container = document.getElementById('messagesArea');
            if(!container) return;
            container.innerHTML = '';
            if (currentChat.type === 'private') await markMessagesAsRead(currentChat);
            
            snapshot.forEach(doc => {
                const msg = doc.data();
                const msgId = doc.id;
                const isMy = msg.userId === currentUser.uid;
                const ts = msg.timestamp?.toDate?.() || new Date();
                const reactions = msg.reactions || {};
                
                const reactionGroups = {};
                Object.values(reactions).forEach(r => { reactionGroups[r] = (reactionGroups[r] || 0) + 1; });
                const myReactionValue = reactions[currentUser.uid];
                
                let reactionsHtml = '';
                if (Object.keys(reactionGroups).length > 0) {
                    reactionsHtml = '<div class="reactions-bar">';
                    for (const [emoji, count] of Object.entries(reactionGroups)) {
                        const isMyReaction = myReactionValue === emoji;
                        reactionsHtml += `<div class="reaction-item ${isMyReaction ? 'my-reaction' : ''}" data-msg="${msgId}" data-reaction="${emoji}">
                            <span class="reaction-emoji">${emoji}</span>
                            ${count > 1 ? `<span class="reaction-count">${count}</span>` : ''}
                        </div>`;
                    }
                    reactionsHtml += '</div>';
                }
                
                let readStatusHtml = '';
                if (isMy && currentChat.type === 'private') {
                    readStatusHtml = msg.read ? 
                        `<span class="read-status read"><i class="fas fa-check-double"></i></span>` :
                        `<span class="read-status delivered"><i class="fas fa-check"></i></span>`;
                }
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isMy ? 'my' : 'other'}`;
                messageDiv.setAttribute('data-message-id', msgId);
                messageDiv.innerHTML = `
                    ${!isMy ? `<div class="message-sender">${escapeHtml(msg.userName || 'Пользователь')}</div>` : ''}
                    <div class="message-bubble">${escapeHtml(msg.text)}</div>
                    <div class="message-footer">
                        <span class="message-time">${ts.toLocaleDateString()} в ${ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        ${readStatusHtml}
                    </div>
                    ${reactionsHtml}
                `;
                
                messageDiv.querySelectorAll('.reaction-item').forEach(el => {
                    el.onclick = (e) => {
                        e.stopPropagation();
                        addReaction(el.dataset.msg, el.dataset.reaction);
                    };
                });
                
                const bubble = messageDiv.querySelector('.message-bubble');
                bubble.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showContextMenu(e, msgId, isMy);
                });
                
                let lastTap = 0;
                bubble.addEventListener('touchstart', (e) => {
                    const now = Date.now();
                    if (now - lastTap < 300) {
                        e.preventDefault();
                        showContextMenu(e, msgId, isMy);
                    }
                    lastTap = now;
                });
                
                container.appendChild(messageDiv);
            });
            scrollToBottom();
        });
    }

    function openChat(chat) {
        if(messagesUnsubscribe) messagesUnsubscribe();
        currentChat = chat;
        
        if(isMobile) {
            const bottomNav = document.querySelector('.mobile-bottom-nav');
            if(bottomNav) bottomNav.classList.add('hidden');
        }
        
        const isGroup = chat.type === 'group';
        const avatarText = isGroup ? (chat.name?.substring(0,2).toUpperCase() || 'ГЧ') : getInitials(chat.firstName, chat.lastName);
        
        document.getElementById('mainContent').innerHTML = `
            <div class="chat-window">
                <div class="chat-header">
                    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="chat-header-avatar ${isGroup ? 'group-avatar' : ''}">
                        ${isGroup ? '<i class="fas fa-users"></i>' : avatarText}
                    </div>
                    <div class="chat-header-info">
                        <div class="chat-header-name">
                            ${isGroup ? escapeHtml(chat.name) : `${escapeHtml(chat.firstName)} ${escapeHtml(chat.lastName)}`}
                            ${!isGroup && chat.isVerified ? '<i class="fas fa-check-circle verified-icon"></i>' : ''}
                        </div>
                        ${isGroup && chat.members ? `<div class="chat-header-members" id="groupManageBtn">${chat.members.length} участников</div>` : ''}
                    </div>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        `;
        
        document.getElementById('backBtn').onclick = () => {
            if(isMobile) { const bn = document.querySelector('.mobile-bottom-nav'); if(bn) bn.classList.remove('hidden'); }
            currentChat = null;
            showChatsView();
        };
        if (isGroup && document.getElementById('groupManageBtn')) {
            document.getElementById('groupManageBtn').onclick = showGroupManage;
        }
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        loadMessages();
        setTimeout(() => { const ma = document.getElementById('messagesArea'); if(ma) ma.scrollTop = ma.scrollHeight; }, 100);
    }

    // Групповые функции (сокращённо, но рабочие)
    async function showGroupManage() {
        if (!currentChat || currentChat.type !== 'group') return;
        const groupDoc = await db.collection('groups').doc(currentChat.id).get();
        const group = groupDoc.data();
        const isCreator = group.createdBy === currentUser.uid;
        
        const members = [];
        for (const memberId of group.members) {
            const userDoc = await db.collection('users').doc(memberId).get();
            if (userDoc.exists) members.push({ id: memberId, ...userDoc.data() });
        }
        
        const friendIds = userData.friends || [];
        const availableFriends = [];
        for (const id of friendIds) {
            if (!group.members.includes(id)) {
                const userDoc = await db.collection('users').doc(id).get();
                if (userDoc.exists) availableFriends.push({ id, ...userDoc.data() });
            }
        }
        
        const modal = document.getElementById('groupManageModal');
        document.getElementById('groupManageTitle').textContent = `Управление: ${group.name}`;
        
        const membersListDiv = document.getElementById('groupMembersList');
        membersListDiv.innerHTML = '<div style="padding: 12px; font-weight: 600;">Участники:</div>';
        for (const member of members) {
            const isCreatorBadge = group.createdBy === member.id ? ' 👑' : '';
            const removeBtn = (isCreator && member.id !== currentUser.uid) ? `<button class="remove-member-btn" data-id="${member.id}">Удалить</button>` : '';
            const div = document.createElement('div');
            div.className = 'group-member-item';
            div.innerHTML = `<div class="group-member-info"><div class="group-member-avatar">${getInitials(member.firstName, member.lastName)}</div><div class="group-member-name">${member.firstName} ${member.lastName}${isCreatorBadge}</div></div>${removeBtn}`;
            const removeBtnEl = div.querySelector('.remove-member-btn');
            if (removeBtnEl) removeBtnEl.onclick = () => removeMemberFromGroup(member.id, member.firstName, member.lastName);
            membersListDiv.appendChild(div);
        }
        
        const selectEl = document.getElementById('addMemberSelect');
        selectEl.innerHTML = '<option value="">Выберите друга</option>';
        for (const friend of availableFriends) {
            selectEl.innerHTML += `<option value="${friend.id}">${friend.firstName} ${friend.lastName}</option>`;
        }
        
        document.getElementById('addMemberBtn').onclick = async () => {
            const friendId = selectEl.value;
            if (!friendId) { showModal('Ошибка', 'Выберите друга'); return; }
            const friend = availableFriends.find(f => f.id === friendId);
            await addMemberToGroup(friendId, friend.firstName, friend.lastName);
            modal.classList.remove('active');
            showGroupManage();
        };
        
        document.getElementById('leaveGroupBtn').onclick = () => {
            showModal('Подтверждение', 'Выйти из беседы?', async () => { await leaveGroup(); modal.classList.remove('active'); showChatsView(); });
        };
        
        const deleteBtn = document.getElementById('deleteGroupBtn');
        if (isCreator) {
            deleteBtn.style.display = 'block';
            deleteBtn.onclick = () => {
                showModal('Подтверждение', 'Удалить беседу? Это необратимо.', async () => { await deleteGroup(); modal.classList.remove('active'); showChatsView(); });
            };
        } else {
            deleteBtn.style.display = 'none';
        }
        
        document.getElementById('closeGroupManageBtn').onclick = () => modal.classList.remove('active');
        modal.classList.add('active');
    }
    
    async function addMemberToGroup(userId, firstName, lastName) {
        try {
            await db.collection('groups').doc(currentChat.id).update({ members: firebase.firestore.FieldValue.arrayUnion(userId) });
            showModal('Успех', `${firstName} ${lastName} добавлен(а) в беседу`);
            loadChatsList();
        } catch(e) { showModal('Ошибка', e.message); }
    }
    
    async function removeMemberFromGroup(userId, firstName, lastName) {
        showModal('Подтверждение', `Удалить ${firstName} ${lastName} из беседы?`, async () => {
            try {
                await db.collection('groups').doc(currentChat.id).update({ members: firebase.firestore.FieldValue.arrayRemove(userId) });
                showModal('Успех', `${firstName} ${lastName} удалён(а) из беседы`);
                loadChatsList();
                if (currentChat && currentChat.id) showGroupManage();
            } catch(e) { showModal('Ошибка', e.message); }
        });
    }
    
    async function leaveGroup() {
        try {
            await db.collection('groups').doc(currentChat.id).update({ members: firebase.firestore.FieldValue.arrayRemove(currentUser.uid) });
            showModal('Успех', 'Вы вышли из беседы');
            currentChat = null;
            loadChatsList();
        } catch(e) { showModal('Ошибка', e.message); }
    }
    
    async function deleteGroup() {
        try {
            const messagesSnap = await db.collection('messages').where('groupId', '==', currentChat.id).get();
            const batch = db.batch();
            messagesSnap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            await db.collection('groups').doc(currentChat.id).delete();
            showModal('Успех', 'Беседа удалена');
            currentChat = null;
            loadChatsList();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function getUnreadCount(chat) {
        if (!currentUser || chat.type !== 'private') return 0;
        const chatId = getChatId(currentUser.uid, chat.id);
        const snapshot = await db.collection('messages').where('chatId', '==', chatId).where('userId', '!=', currentUser.uid).where('read', '==', false).get();
        return snapshot.size;
    }

    async function loadChatsList() {
        if(!currentUser) return;
        try {
            const allMessages = await db.collection('messages').where('userId', '==', currentUser.uid).get();
            const messagesTo = await db.collection('messages').where('toUserId', '==', currentUser.uid).get();
            const chatUsers = new Map();
            allMessages.forEach(doc => { const msg = doc.data(); if(msg.toUserId && msg.toUserId !== currentUser.uid && msg.chatType !== 'group') chatUsers.set(msg.toUserId, { lastMsg: msg.text, lastTime: msg.timestamp }); });
            messagesTo.forEach(doc => { const msg = doc.data(); if(msg.userId && msg.userId !== currentUser.uid && msg.chatType !== 'group') { const existing = chatUsers.get(msg.userId); if(!existing || (msg.timestamp && existing.lastTime?.toDate?.() < msg.timestamp.toDate())) chatUsers.set(msg.userId, { lastMsg: msg.text, lastTime: msg.timestamp }); } });
            const friendIds = userData.friends || [];
            for(const id of friendIds) { if(!chatUsers.has(id)) { const userDoc = await db.collection('users').doc(id).get(); if(userDoc.exists) chatUsers.set(id, { lastMsg: 'Напишите первым', lastTime: null }); } }
            const privateChats = [];
            for(const [id, data] of chatUsers) {
                const userDoc = await db.collection('users').doc(id).get();
                if(userDoc.exists) {
                    const u = userDoc.data();
                    privateChats.push({ type: 'private', id, firstName: u.firstName, lastName: u.lastName, isVerified: u.isVerified || false, lastMsg: data.lastMsg || 'Напишите первым', lastTime: data.lastTime, unreadCount: await getUnreadCount({ type: 'private', id }) });
                }
            }
            const groupsSnapshot = await db.collection('groups').where('members', 'array-contains', currentUser.uid).get();
            const groupChats = [];
            for(const doc of groupsSnapshot.docs) {
                const group = doc.data();
                const lastMsgSnapshot = await db.collection('messages').where('groupId', '==', doc.id).orderBy('timestamp', 'desc').limit(1).get();
                let lastMsg = 'Нет сообщений', lastTime = null;
                if(!lastMsgSnapshot.empty) { lastMsg = lastMsgSnapshot.docs[0].data().text; lastTime = lastMsgSnapshot.docs[0].data().timestamp?.toDate?.() || null; }
                groupChats.push({ type: 'group', id: doc.id, name: group.name, members: group.members, createdBy: group.createdBy, lastMsg, lastTime });
            }
            groupChats.sort((a,b) => (b.lastTime?.getTime?.() || 0) - (a.lastTime?.getTime?.() || 0));
            privateChats.sort((a,b) => (b.lastTime?.toDate?.()?.getTime() || 0) - (a.lastTime?.toDate?.()?.getTime() || 0));
            chatsList = { private: privateChats, groups: groupChats };
            renderChatsList();
        } catch(e) { console.error(e); }
    }

    function renderChatsList(searchQuery = '') {
        const container = document.getElementById('chatsListContainer');

        container.innerHTML = '';
        fg.forEach(chat => {
            const div = document.createElement('div'); div.className = 'chat-item';

            div.innerHTML = `<div class="chat-avatar group-avatar"><i class="fas fa-users"></i></div><div class="chat-info"><div class="chat-name">${escapeHtml(chat.name)}<span class="group-icon"><i class="fas fa-users"></i></span></div><div class="chat-last-msg">${escapeHtml(chat.lastMsg.substring(0,50))}</div></div>${timeStr ? `<div class="chat-time">${timeStr}</div>` : ''}`;

        });
        fp.forEach(chat => {
            const div = document.createElement('div'); div.className = 'chat-item';

            div.onclick = () => openChat({ type: 'private', id: chat.id, firstName: chat.firstName, lastName: chat.lastName, isVerified: chat.isVerified });
            container.appendChild(div);
        });
    }

    async function showCreateGroupModal() {
        const modal = document.getElementById('createGroupModal');
        document.getElementById('groupName').value = '';
        document.getElementById('selectedFriendsList').innerHTML = '';
        const friendsListDiv = document.getElementById('friendsForGroupList');
        const friendIds = userData.friends || [];

        if(friendIds.length === 0) {
            friendsListDiv.innerHTML = '<div style="text-align: center; padding: 20px;">Нет друзей</div>';
        } else {
            friendsListDiv.innerHTML = '';

                    const u = userDoc.data();

                    div.innerHTML = `<input type="checkbox" value="${id}" data-name="${u.firstName} ${u.lastName}"><div style="width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;color:white;">${getInitials(u.firstName, u.lastName)}</div><div>${u.firstName} ${u.lastName}</div>`;

                            tag.className = 'selected-friend';

                            selectedDiv.appendChild(tag);
                            tag.querySelector('button').onclick = () => { checkbox.checked = false; selectedFriends.delete(id); tag.remove(); };
                        } else {
                            selectedFriends.delete(id);

            const addBtn = div.querySelector('[data-add]');
            const acceptBtn = div.querySelector('[data-accept]');
            const removeBtn = div.querySelector('[data-remove]');

    async function sendFriendRequest(toId, firstName, lastName) {
        try {
            await db.collection('users').doc(toId).update({ 'friendRequests.received': firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
            await db.collection('users').doc(currentUser.uid).update({ 'friendRequests.sent': firebase.firestore.FieldValue.arrayUnion(toId) });
            showModal('Успех', `Запрос отправлен ${firstName} ${lastName}`);

            userData = updated.data();
            loadPeopleList();
        } catch(e) { showModal('Ошибка', e.message); }

    async function acceptFriendRequest(fromId) {
        try {
            await db.collection('users').doc(currentUser.uid).update({ friends: firebase.firestore.FieldValue.arrayUnion(fromId), 'friendRequests.received': firebase.firestore.FieldValue.arrayRemove(fromId) });
            await db.collection('users').doc(fromId).update({ friends: firebase.firestore.FieldValue.arrayUnion(currentUser.uid), 'friendRequests.sent': firebase.firestore.FieldValue.arrayRemove(currentUser.uid) });
            showModal('Успех', 'Теперь вы друзья!');
            const updated = await db.collection('users').doc(currentUser.uid).get();
            userData = updated.data();
            loadPeopleList();
            loadChatsList();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    }

    function renderAuth() {
        document.getElementById('app').innerHTML = `<div class="auth-container"><div class="auth-card"><h1>ЧЕБУРЧАТ</h1><div id="loginView"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Пароль"><button id="doLoginBtn">Войти</button><div class="toggle-auth" id="showRegisterBtn">Нет аккаунта? Регистрация</div></div><div id="registerView" class="hidden"><input type="text" id="regFirstName" placeholder="Имя"><input type="text" id="regLastName" placeholder="Фамилия"><input type="email" id="regEmail" placeholder="Email"><input type="password" id="regPassword" placeholder="Пароль (мин. 6)"><button id="doRegisterBtn">Зарегистрироваться</button><div class="toggle-auth" id="showLoginBtn">Уже есть аккаунт? Войти</div></div></div></div>`;
        document.getElementById('doLoginBtn').onclick = handleLogin;
        document.getElementById('showRegisterBtn').onclick = () => { document.getElementById('loginView').classList.add('hidden'); document.getElementById('registerView').classList.remove('hidden'); };
        document.getElementById('showLoginBtn').onclick = () => { document.getElementById('registerView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); };
        document.getElementById('doRegisterBtn').onclick = handleRegister;
    }

    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if(!doc.exists) {
                await db.collection('users').doc(user.uid).set({ firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] }, isVerified: false });
                userData = { firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] }, isVerified: false };
            } else {
                userData = doc.data();
                if(!userData.friendRequests) await db.collection('users').doc(user.uid).update({ friendRequests: { sent: [], received: [] } });
                if(userData.isVerified === undefined) await db.collection('users').doc(user.uid).update({ isVerified: false });
            }
            renderApp();
        } else {
            if(messagesUnsubscribe) messagesUnsubscribe();
            currentUser = null;
            userData = null;
            renderAuth();
        }
    });
    
    window.addEventListener('resize', () => { isMobile = window.innerWidth <= 768; });
    document.addEventListener('click', () => hideContextMenu());
</script>
</body>
</html>
