<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЧЕБУРЧАТ — Социальная сеть</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; transition: background 0.2s, color 0.2s; }
        
        :root {
            --accent: #ff7b2c;
            --accent-hover: #e6691a;
            --card-radius: 20px;
            --card-opacity: 1;
            --shadow-intensity: 0.08;
        }
        
        body[data-theme="default"] {
            --bg-page: #f0f2f5;
            --bg-surface: rgba(255,255,255,var(--card-opacity));
            --bg-element: #f0f2f5;
            --text: #1a1a1a;
            --text-secondary: #65676b;
            --border: #e4e6eb;
            --my-msg: #ff7b2c;
            --my-msg-text: white;
            --other-msg: #ffffff;
            --other-msg-text: #1a1a1a;
            --shadow-sm: 0 1px 2px rgba(0,0,0,var(--shadow-intensity));
            --shadow-md: 0 4px 12px rgba(0,0,0,var(--shadow-intensity));
            --shadow-lg: 0 8px 24px rgba(0,0,0,var(--shadow-intensity));
        }
        
        body[data-theme="dark"] {
            --bg-page: #121212;
            --bg-surface: rgba(30,30,30,var(--card-opacity));
            --bg-element: #2d2d2d;
            --text: #e4e6eb;
            --text-secondary: #b0b3b8;
            --border: #3a3a3a;
            --my-msg: #ff7b2c;
            --my-msg-text: white;
            --other-msg: #2d2d2d;
            --other-msg-text: #e4e6eb;
            --shadow-sm: 0 1px 2px rgba(0,0,0,var(--shadow-intensity));
            --shadow-md: 0 4px 12px rgba(0,0,0,var(--shadow-intensity));
            --shadow-lg: 0 8px 24px rgba(0,0,0,var(--shadow-intensity));
        }
        
        body[data-theme="glass-light"] {
            --bg-page: linear-gradient(135deg, #e8edf2 0%, #e66bfa 50%, #fbacf3 100%);
            --bg-surface: rgba(255,255,255,var(--card-opacity));
            --bg-element: rgba(255,255,255,0.5);
            --text: #2d2d2d;
            --text-secondary: #555555;
            --border: rgba(255,255,255,0.5);
            --my-msg: rgba(255,123,44,0.9);
            --my-msg-text: #1a1a1a;
            --other-msg: rgba(255,255,255,0.6);
            --other-msg-text: #2d2d2d;
            --shadow-sm: 0 4px 12px rgba(0,0,0,var(--shadow-intensity));
            --shadow-md: 0 8px 24px rgba(0,0,0,var(--shadow-intensity));
            --shadow-lg: 0 16px 40px rgba(0,0,0,var(--shadow-intensity));
        }
        
        body[data-theme="glass-dark"] {
            --bg-page: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --bg-surface: rgba(20,25,45,var(--card-opacity));
            --bg-element: rgba(30,35,55,0.5);
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.85);
            --border: rgba(255,255,255,0.15);
            --my-msg: rgba(255,123,44,0.9);
            --my-msg-text: white;
            --other-msg: rgba(255,255,255,0.12);
            --other-msg-text: #ffffff;
            --shadow-sm: 0 8px 32px rgba(0,0,0,var(--shadow-intensity));
            --shadow-md: 0 8px 32px rgba(0,0,0,var(--shadow-intensity));
            --shadow-lg: 0 8px 32px rgba(0,0,0,var(--shadow-intensity));
        }
        
        body[data-text-contrast="light"] {
            --text: #1a1a1a !important;
            --text-secondary: #444444 !important;
            --other-msg-text: #1a1a1a !important;
        }
        
        body[data-text-contrast="dark"] {
            --text: #ffffff !important;
            --text-secondary: #cccccc !important;
            --other-msg-text: #ffffff !important;
        }
        
        body[data-disable-hover="true"] * {
            transition: none !important;
            animation: none !important;
        }
        
        body { background: var(--bg-page); color: var(--text); }
        
        .post-card, .chat-item, .person-item, .track-card, .create-post-card {
            background: var(--bg-surface);
        }
        
        body[data-theme="glass-light"] .sidebar,
        body[data-theme="glass-light"] .chats-view,
        body[data-theme="glass-light"] .chat-header,
        body[data-theme="glass-light"] .feed-header,
        body[data-theme="glass-light"] .music-header,
        body[data-theme="glass-light"] .people-view,
        body[data-theme="glass-light"] .settings-view,
        body[data-theme="glass-light"] .admin-view,
        body[data-theme="glass-light"] .mobile-bottom-nav,
        body[data-theme="glass-light"] .input-area,
        body[data-theme="glass-light"] .profile-view,
        body[data-theme="glass-light"] .modal,
        body[data-theme="glass-light"] .message-bubble,
        body[data-theme="glass-dark"] .sidebar,
        body[data-theme="glass-dark"] .chats-view,
        body[data-theme="glass-dark"] .chat-header,
        body[data-theme="glass-dark"] .feed-header,
        body[data-theme="glass-dark"] .music-header,
        body[data-theme="glass-dark"] .people-view,
        body[data-theme="glass-dark"] .settings-view,
        body[data-theme="glass-dark"] .admin-view,
        body[data-theme="glass-dark"] .mobile-bottom-nav,
        body[data-theme="glass-dark"] .input-area,
        body[data-theme="glass-dark"] .profile-view,
        body[data-theme="glass-dark"] .modal,
        body[data-theme="glass-dark"] .message-bubble,
        body[data-theme="glass-light"] .call-container,
        body[data-theme="glass-dark"] .call-container {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: var(--bg-surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }
        
        body[data-theme="glass-light"] .sidebar,
        body[data-theme="glass-dark"] .sidebar {
            backdrop-filter: blur(25px) saturate(180%);
        }
        
        body[data-theme="glass-light"] .sidebar { background: rgba(255,255,255,0.8); }
        body[data-theme="glass-dark"] .sidebar { background: rgba(15,20,35,0.6); }
        
        .logo, .nav-item.active, .nav-item:hover, .create-group-btn, 
        .post-action-btn.liked, .comment-like-btn.liked,
        .action-btn.write, .profile-btn.primary, .input-area button,
        .modal-buttons .confirm, .toggle-auth, .stat:hover,
        .plus-btn:hover, .call-btn, .call-end-btn {
            color: var(--accent);
        }
        
        .create-group-btn, .action-btn.write, .profile-btn.primary, 
        .input-area button, .auth-card button, .official-post-btn,
        .send-btn, .submit-comment-btn, .add-comment button,
        .buy-sticker-btn, .plus-btn, .call-btn, .call-end-btn {
            background: var(--accent);
        }
        
        .sidebar, .chats-view, .chat-header, .feed-header, .music-header,
        .people-view, .settings-view, .admin-view, .post-card, .track-card,
        .person-item, .chat-item, .profile-view, .create-post-card,
        .modal, .auth-card, .context-menu, .reactions-modal .modal,
        .stickers-modal .modal, .plus-menu, .call-container {
            border-radius: var(--card-radius);
        }
        
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, #000)); padding: 16px; position: relative; }
        .auth-card { background: var(--bg-surface); padding: 40px 32px; width: 100%; max-width: 420px; text-align: center; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .auth-card h1 { color: var(--accent); margin-bottom: 8px; font-size: 36px; font-weight: 800; }
        .auth-subtitle { color: var(--text-secondary); margin-bottom: 32px; font-size: 14px; }
        .auth-card input { width: 100%; padding: 14px 16px; margin: 8px 0; border: 2px solid var(--border); border-radius: 16px; font-size: 16px; background: var(--bg-element); color: var(--text); transition: 0.2s; }
        .auth-card input:focus { outline: none; border-color: var(--accent); }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 16px; color: white; font-weight: 700; margin-top: 16px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .auth-card button:hover { filter: brightness(0.95); transform: translateY(-1px); }
        .toggle-auth { margin-top: 20px; color: var(--accent); cursor: pointer; font-size: 14px; }
        .verify-msg { background: #fff3cd; color: #856404; padding: 12px; border-radius: 16px; margin: 16px 0; font-size: 14px; }
        .hidden { display: none !important; }
        .app-version { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(255,255,255,0.6); }
        
        .app { display: flex; height: 100vh; background: var(--bg-page); }
        .sidebar { width: 280px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; transition: all 0.2s; }
        .logo { padding: 20px 20px 16px; font-size: 24px; font-weight: 800; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
        .sidebar-section { padding: 8px 0; }
        .nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); font-weight: 500; border-radius: 12px; margin: 4px 8px; transition: all 0.2s; position: relative; }
        .nav-item:hover, .nav-item.active { background: var(--bg-element); color: var(--accent); }
        .nav-item i { width: 24px; font-size: 20px; }
        
        .nav-item.has-submenu { position: relative; }
        .sub-menu { position: absolute; top: 100%; left: 8px; right: 8px; background: var(--bg-surface); border-radius: 12px; box-shadow: var(--shadow-md); border: 1px solid var(--border); z-index: 100; display: none; margin-top: 4px; }
        .sub-menu.show { display: block; }
        .sub-menu .nav-item { padding: 10px 16px; margin: 0; border-radius: 0; }
        .sub-menu .nav-item:first-child { border-radius: 12px 12px 0 0; }
        .sub-menu .nav-item:last-child { border-radius: 0 0 12px 12px; }
        .sub-menu .nav-item:hover { background: var(--bg-element); }
        
        .user-info-sidebar { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar-wrapper { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; }
        .verified-badge { position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; border: 2px solid var(--bg-surface); z-index: 2; }
        .logout-btn { margin: 10px 16px; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .logout-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-page); }
        
        .balance-header {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-element);
            padding: 6px 12px;
            border-radius: 30px;
            margin-right: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
        }
        .balance-header i { font-size: 16px; }
        
        .chats-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); transition: all 0.2s; }
        .chats-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding-top: max(16px, env(safe-area-inset-top)); }
        .chats-header h2 { font-size: 24px; font-weight: 700; color: var(--text); }
        .create-group-btn { border: none; padding: 8px 16px; border-radius: 24px; color: white; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .chats-search { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .chats-search input { width: 100%; padding: 10px 16px; border: none; background: var(--bg-element); border-radius: 24px; font-size: 15px; outline: none; color: var(--text); }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: all 0.2s; margin: 4px 8px; }
        .chat-item:hover { background: var(--bg-element); transform: translateX(4px); }
        .chat-avatar-wrapper { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
        .chat-avatar { width: 100%; height: 100%; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 20px; }
        .group-avatar { background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, #000)); }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 16px; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .verified-icon { color: #3b82f6; font-size: 14px; }
        .chat-last-msg { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
        .empty-chats { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        
        .chat-window { display: flex; flex-direction: column; height: 100%; background: var(--bg-page); }
        .chat-header { padding: 12px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; padding-top: max(12px, env(safe-area-inset-top)); transition: all 0.2s; }
        .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text); transition: 0.2s; }
        .back-btn:hover { background: var(--bg-element); }
        .chat-header-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; position: relative; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; }
        .chat-header-info { flex: 1; min-width: 0; }
        .chat-header-name { font-weight: 600; font-size: 17px; color: var(--text); display: flex; align-items: center; gap: 6px; cursor: pointer; flex-wrap: wrap; }
        .chat-header-members { font-size: 12px; color: var(--text-secondary); cursor: pointer; }
        .chat-header-actions { display: flex; gap: 8px; }
        .call-header-btn { background: none; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; color: var(--text); transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .call-header-btn:hover { background: var(--bg-element); color: var(--accent); }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn 0.2s ease; margin-bottom: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.my { align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 18px; word-wrap: break-word; cursor: pointer; background: var(--bg-surface); box-shadow: var(--shadow-sm); transition: all 0.2s; }
        .my .message-bubble { background: var(--my-msg); color: var(--my-msg-text); border-bottom-right-radius: 4px; }
        .other .message-bubble { background: var(--other-msg); color: var(--other-msg-text); border-bottom-left-radius: 4px; }
        .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 4px; margin-left: 6px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; cursor: pointer; flex-wrap: wrap; }
        .sender-avatar { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; flex-shrink: 0; }
        .message-footer { display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin-top: 4px; margin-right: 6px; }
        .message-time { font-size: 10px; color: var(--text-secondary); }
        .read-status { font-size: 10px; display: flex; align-items: center; gap: 2px; }
        .read-status.read i { color: #34c759; }
        .read-status.delivered i { color: #8e8e8e; }
        
        .media-container { margin: 4px 0; border-radius: 16px; overflow: hidden; max-width: 280px; }
        .message-image { width: 100%; height: auto; max-height: 300px; object-fit: cover; cursor: pointer; border-radius: 16px; }
        .message-video { width: 100%; max-height: 280px; border-radius: 16px; background: #000; outline: none; }
        
        .reactions-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; margin-left: 6px; }
        .reaction-item { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-element); padding: 2px 8px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.1s; border: 1px solid var(--border); }
        .reaction-item:hover { transform: scale(1.05); }
        .reaction-item.my-reaction { background: var(--accent); color: white; border-color: var(--accent); }
        .reaction-emoji { font-size: 14px; }
        .reaction-count { font-size: 11px; font-weight: 500; }
        
        /* Call styles */
        .call-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
        }
        .call-video-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
        .remote-video { width: 100%; max-width: 600px; border-radius: 20px; background: #1a1a1a; }
        .local-video { width: 200px; position: absolute; bottom: 100px; right: 20px; border-radius: 20px; background: #1a1a1a; z-index: 2001; }
        .call-controls {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 2002;
        }
        .call-controls button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }
        .call-end-btn { background: #dc3545; color: white; }
        .call-mute-btn, .call-video-toggle-btn { background: var(--bg-element); color: var(--text); }
        .call-status {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 18px;
            z-index: 2002;
        }
        
        .context-menu { position: fixed; background: var(--bg-surface); border-radius: 12px; box-shadow: var(--shadow-md); z-index: 1000; min-width: 180px; overflow: hidden; border: 1px solid var(--border); display: none; }
        .context-menu.active { display: block; }
        .context-menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.1s; color: var(--text); }
        .context-menu-item:hover { background: var(--bg-element); }
        .context-menu-item.delete { color: #dc3545; }
        
        .reactions-modal .modal { max-width: 350px; }
        .reactions-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; padding: 16px; }
        .reaction-option { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px; cursor: pointer; border-radius: 16px; transition: 0.1s; min-width: 60px; }
        .reaction-option:hover {background: var(--bg-element); transform: scale(1.05);}
        .reaction-emoji-big { font-size: 32px; }
        .reaction-name { font-size: 12px; color: var(--text-secondary); }
        
        .plus-menu {
            position: fixed;
            bottom: 80px;
            right: 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow: hidden;
            min-width: 160px;
        }
        .plus-menu.show { display: flex; }
        .plus-menu-item {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            color: var(--text);
            transition: 0.1s;
        }
        .plus-menu-item:hover { background: var(--bg-element); }
        .plus-menu-item i { width: 22px; font-size: 18px; color: var(--accent); }
        
        .stickers-modal .modal { max-width: 500px; width: 90%; }
        .stickers-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; padding: 16px; max-height: 400px; overflow-y: auto; }
        .sticker-item { cursor: pointer; transition: 0.2s; border-radius: 16px; padding: 8px; background: var(--bg-element); text-align: center; }
        .sticker-item:hover { transform: scale(1.05); background: var(--accent); }
        .sticker-item img { width: 100%; height: auto; border-radius: 12px; }
        .sticker-pack-locked { text-align: center; padding: 20px; background: var(--bg-element); border-radius: 20px; margin: 8px; }
        .sticker-pack-preview { display: flex; gap: 8px; justify-content: center; margin: 12px 0; flex-wrap: wrap; }
        .sticker-pack-preview img { width: 60px; height: 60px; border-radius: 12px; background: var(--bg-surface); }

<script>
    // ========== Firebase Configuration ==========

    // ========== WebRTC Calls with Xirsys TURN ==========
    let peerConnection = null, localStream = null, remoteStream = null, callActive = false, currentCallUserId = null, callOfferDocId = null, callListenerUnsubscribe = null, pendingCandidates = [];
    
    const callConfiguration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },

    async function startCall(targetUserId, preferVideo = true) {
        if (callActive) { showModal('Ошибка', 'У вас уже активен звонок'); return; }
        currentCallUserId = targetUserId;
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const hasVideo = devices.some(d => d.kind === 'videoinput');
            const constraints = { audio: true, video: hasVideo && preferVideo };
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            peerConnection = new RTCPeerConnection(callConfiguration);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (event) => {
                if (!remoteStream) remoteStream = new MediaStream();
                remoteStream.addTrack(event.track);
                showCallUI(true, constraints.video);
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && remoteStream) remoteVideo.srcObject = remoteStream;
            };
            peerConnection.onicecandidate = (event) => { if (event.candidate) sendCallSignal(targetUserId, 'candidate', { candidate: event.candidate }); };
            peerConnection.oniceconnectionstatechange = () => {
                if (peerConnection.iceConnectionState === 'connected' || peerConnection.iceConnectionState === 'completed') {
                    callActive = true;
                    const statusEl = document.getElementById('callStatus');
                    if (statusEl) statusEl.textContent = 'В звонке...';
                } else if (peerConnection.iceConnectionState === 'failed') { showModal('Ошибка', 'Не удалось установить соединение'); endCall(); }
            };
            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'closed') endCall();
            };
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await sendCallSignal(targetUserId, 'offer', { sdp: offer });
            showModal('Звонок', 'Вызов...');
        } catch (error) { showModal('Ошибка', 'Не удалось начать звонок: ' + error.message); endCall(); }
    }
    
    async function acceptCall(offerData, fromUserId, callId) {
        if (callActive) { await rejectCall(fromUserId); return; }
        const callDoc = await db.collection('calls').doc(callId).get();
        if (!callDoc.exists || callDoc.data().status !== 'pending') { showModal('Ошибка', 'Звонок уже неактивен'); return; }
        currentCallUserId = fromUserId; callOfferDocId = callId;
        try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const hasVideo = devices.some(d => d.kind === 'videoinput');
            const constraints = { audio: true, video: hasVideo };
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            peerConnection = new RTCPeerConnection(callConfiguration);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (event) => {
                if (!remoteStream) remoteStream = new MediaStream();
                remoteStream.addTrack(event.track);
                showCallUI(true, hasVideo);
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && remoteStream) remoteVideo.srcObject = remoteStream;
            };
            peerConnection.onicecandidate = (event) => { if (event.candidate) sendCallSignal(fromUserId, 'candidate', { candidate: event.candidate }); };
            peerConnection.oniceconnectionstatechange = () => {
                if (peerConnection.iceConnectionState === 'connected' || peerConnection.iceConnectionState === 'completed') {
                    callActive = true;
                    const statusEl = document.getElementById('callStatus');
                    if (statusEl) statusEl.textContent = 'В звонке...';
                }
            };
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offerData.sdp));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            await sendCallSignal(fromUserId, 'answer', { sdp: answer });
            await updateCallDocStatus(callId, 'active');
            for (const cand of pendingCandidates) { try { await peerConnection.addIceCandidate(new RTCIceCandidate(cand)); } catch(e) {} }
            pendingCandidates = [];
        } catch (error) { showModal('Ошибка', 'Не удалось принять звонок'); endCall(); }
    }
    
    async function sendCallSignal(targetUserId, type, data) {
        const callRef = await db.collection('calls').add({ from: currentUser.uid, to: targetUserId, type: type, data: data, timestamp: firebase.firestore.FieldValue.serverTimestamp(), status: type === 'reject' ? 'rejected' : 'pending' });
        if (type === 'offer') {
            callOfferDocId = callRef.id;
            setTimeout(async () => {
                const doc = await db.collection('calls').doc(callRef.id).get();
                if (doc.exists && doc.data().status === 'pending') { await db.collection('calls').doc(callRef.id).update({ status: 'timeout' }); if (callOfferDocId === callRef.id && !callActive) { showModal('Звонок', 'Собеседник не ответил'); endCall(); } }
            }, 45000);
        }
    }
    
    async function updateCallDocStatus(callId, status) { if (callId) await db.collection('calls').doc(callId).update({ status: status }); }
    async function rejectCall(targetUserId) { await sendCallSignal(targetUserId, 'reject', {}); endCall(); }
    
    function showCallUI(show, hasVideo) {
        const callContainer = document.getElementById('callContainer');
        if (show) {
            if (!callContainer) {
                const div = document.createElement('div');
                div.id = 'callContainer';
                div.className = 'call-container';
                div.innerHTML = `<div class="call-status" id="callStatus">Установка соединения...</div><div class="call-video-container"><video id="remoteVideo" class="remote-video" autoplay playsinline></video><video id="localVideo" class="local-video" autoplay playsinline muted></video></div><div class="call-controls"><button class="call-mute-btn" id="callMuteBtn"><i class="fas fa-microphone"></i></button>${hasVideo ? '<button class="call-video-toggle-btn" id="callVideoToggleBtn"><i class="fas fa-video"></i></button>' : ''}<button class="call-end-btn" id="callEndBtn"><i class="fas fa-phone-slash"></i></button></div></div>`;
                document.body.appendChild(div);
                document.getElementById('callMuteBtn').onclick = () => { if(localStream){ const track = localStream.getAudioTracks()[0]; if(track){ track.enabled = !track.enabled; document.getElementById('callMuteBtn').innerHTML = track.enabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>'; } } };
                if (hasVideo) document.getElementById('callVideoToggleBtn').onclick = () => { if(localStream){ const track = localStream.getVideoTracks()[0]; if(track){ track.enabled = !track.enabled; document.getElementById('callVideoToggleBtn').innerHTML = track.enabled ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>'; } } };
                document.getElementById('callEndBtn').onclick = () => endCall();
            }
            if (localStream && document.getElementById('localVideo')) document.getElementById('localVideo').srcObject = localStream;
            document.getElementById('callContainer').style.display = 'flex';
        } else { if (callContainer) callContainer.remove(); }
    }
    
    async function endCall() {
        callActive = false;
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        remoteStream = null; pendingCandidates = [];
        if (callOfferDocId) { await db.collection('calls').doc(callOfferDocId).update({ status: 'ended' }).catch(()=>{}); callOfferDocId = null; }
        currentCallUserId = null;
        showCallUI(false);
    }
    
    function listenForCalls() {
        if (callListenerUnsubscribe) callListenerUnsubscribe();
        callListenerUnsubscribe = db.collection('calls').where('to', '==', currentUser.uid).where('status', '==', 'pending').orderBy('timestamp', 'desc').onSnapshot(async (snapshot) => {
            for (const change of snapshot.docChanges()) {
                if (change.type === 'added') {
                    const call = change.doc.data();
                    const callId = change.doc.id;
                    if (call.from === currentUser.uid || callActive) continue;
                    const processed = JSON.parse(sessionStorage.getItem('processed_calls') || '[]');
                    if (processed.includes(callId)) continue;
                    if (call.type === 'offer') {
                        processed.push(callId);
                        sessionStorage.setItem('processed_calls', JSON.stringify(processed));
                        showIncomingCallUI(callId, call.from, call.data);
                    } else if (call.type === 'answer' && callActive && currentCallUserId === call.from) {
                        if (peerConnection && call.data.sdp) await peerConnection.setRemoteDescription(new RTCSessionDescription(call.data.sdp));
                    } else if (call.type === 'candidate' && peerConnection && call.data.candidate) {
                        try { await peerConnection.addIceCandidate(new RTCIceCandidate(call.data.candidate)); } catch(e) { if (!peerConnection) pendingCandidates.push(call.data.candidate); }
                    } else if (call.type === 'reject') { showModal('Звонок', 'Собеседник отклонил вызов'); endCall(); }
                }
            }
        });
    }
    
    function showIncomingCallUI(callId, fromUserId, offerData) {
        if (callActive) return;
        const processed = JSON.parse(sessionStorage.getItem('incoming_calls') || '[]');
        if (processed.includes(callId)) return;
        processed.push(callId);
        sessionStorage.setItem('incoming_calls', JSON.stringify(processed));
        setTimeout(() => { const updated = JSON.parse(sessionStorage.getItem('incoming_calls') || '[]'); const idx = updated.indexOf(callId); if(idx!==-1) updated.splice(idx,1); sessionStorage.setItem('incoming_calls', JSON.stringify(updated)); }, 60000);

        document.getElementById('modalTitle').textContent = 'Входящий звонок';

        const confirmBtn = document.getElementById('modalConfirm');
        confirmBtn.style.display = 'none';
        const acceptBtn = document.getElementById('acceptCallBtn');
        const rejectBtn = document.getElementById('rejectCallBtn');
        if (acceptBtn) acceptBtn.onclick = () => { modal.classList.remove('active'); acceptCall(offerData, fromUserId, callId); };
        if (rejectBtn) rejectBtn.onclick = () => { modal.classList.remove('active'); rejectCall(fromUserId); };
        modal.classList.add('active');
    }
    
    // ========== Helper Functions ==========
    function showModal(title, message, onConfirm = null) {
        const modal = document.getElementById('modal');
        document.getElementById('modalTitle').textContent = title;

    function getInitials(first, last) { return (first?.[0] || '?') + (last?.[0] || '?'); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)).replace(/\n/g,'<br>'); }

    function hideContextMenu() {
        document.getElementById('contextMenu')?.classList.remove('active');
        document.getElementById('mobileContextOverlay')?.classList.remove('active');
        document.getElementById('mobileContextMenu')?.classList.remove('active');
    }
    function showReactionsModal(messageId) {
        const modal = document.getElementById('reactionsModal');
        modal.classList.add('active');
        document.querySelectorAll('#reactionsModal .reaction-option').forEach(el => { el.onclick = () => { addReaction(messageId, el.dataset.reaction); modal.classList.remove('active'); }; });
        document.getElementById('closeReactionsModal').onclick = () => modal.classList.remove('active');
    }
    async function addReaction(messageId, reaction) {
        if (!messageId || !reaction) return;
        const msg = await db.collection('messages').doc(messageId).get();
        if (!msg.exists) return;
        const reactions = msg.data().reactions || {};
        if (reactions[currentUser.uid] === reaction) delete reactions[currentUser.uid];
        else reactions[currentUser.uid] = reaction;
        await db.collection('messages').doc(messageId).update({ reactions: reactions });
        hideContextMenu();
    }
    async function deleteMessage(messageId) {
        showModal('Подтверждение', 'Удалить это сообщение?', async () => { try { await db.collection('messages').doc(messageId).delete(); showModal('Успех', 'Сообщение удалено'); } catch(e) { showModal('Ошибка', e.message); } });
        hideContextMenu();
    }
    function showContextMenu(e, messageId, isMyMessage) {
        e.preventDefault();
        e.stopPropagation();
        if (isMobile) {
            const menu = document.getElementById('mobileContextMenu');
            const overlay = document.getElementById('mobileContextOverlay');
            const del = document.getElementById('mobileDeleteBtn');
            const react = document.getElementById('mobileReactionBtn');
            del.style.display = isMyMessage ? 'flex' : 'none';
            react.style.display = 'flex';
            react.onclick = () => { hideContextMenu(); showReactionsModal(messageId); };
            del.onclick = () => { if (isMyMessage) deleteMessage(messageId); hideContextMenu(); };
            overlay.onclick = hideContextMenu;
            overlay.classList.add('active');
            menu.classList.add('active');
        } else {
            let menu = document.getElementById('contextMenu');
            if (!menu) { menu = document.createElement('div'); menu.id = 'contextMenu'; menu.className = 'context-menu'; menu.innerHTML = '<div id="contextReactionItem" class="context-menu-item"><i class="fas fa-smile"></i> Реакция</div><div id="contextDeleteItem" class="context-menu-item delete"><i class="fas fa-trash"></i> Удалить</div>'; document.body.appendChild(menu); }
            const del = document.getElementById('contextDeleteItem');
            const react = document.getElementById('contextReactionItem');
            del.style.display = isMyMessage ? 'flex' : 'none';
            let x = e.clientX, y = e.clientY;
            if (x + 180 > window.innerWidth) x = window.innerWidth - 190;
            if (y + 80 > window.innerHeight) y = window.innerHeight - 90;
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            menu.classList.add('active');
            react.onclick = () => { menu.classList.remove('active'); showReactionsModal(messageId); };
            del.onclick = () => { if (isMyMessage) deleteMessage(messageId); hideContextMenu(); };
        }
    }
    
    function uploadAvatar(file) {
        if (!file) return;
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        fd.append('folder', 'avatars');
        showModal('Загрузка', 'Обновление аватарки...');
        fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: 'POST', body: fd }).then(r=>r.json()).then(d=>{ if(d.secure_url) { db.collection('users').doc(currentUser.uid).update({ avatarUrl: d.secure_url }).then(()=>{ userData.avatarUrl = d.secure_url; showModal('Успех', 'Аватарка обновлена!'); if (currentView === 'profile') showProfileView(viewedProfileUserId); else if (currentView === 'chats') showChatsView(); else if (currentView === 'people') showPeopleView(); else if (currentView === 'feed') showFeedView(); else if (currentView === 'music') showMusicView(); }).catch(e=>showModal('Ошибка',e.message)); } else showModal('Ошибка', d.error?.message || 'Ошибка загрузки'); }).catch(e=>showModal('Ошибка',e.message));
    }
    function changeAvatar() {
        const input = document.createElement('input');
        input.type = 'file';

        input.onchange = (e) => { const file = e.target.files?.[0]; if (file) uploadAvatar(file); };
        input.click();
    }
    
    async function loadTracks() {

        return tracks;
    }

        fd.append('folder', 'music');
        fd.append('resource_type', 'auto');
        showModal('Загрузка', 'Загрузка трека...');
        fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, { method: 'POST', body: fd }).then(r=>r.json()).then(d=>{ if(d.secure_url) { db.collection('tracks').add({ artist: artist.trim(), title: title.trim(), url: d.secure_url, addedBy: currentUser.uid, createdAt: new Date().toISOString() }).then(()=>{ showModal('Успех', 'Трек добавлен!'); if (currentView === 'music') showMusicView(); if (currentView === 'admin') loadAdminTracks(); }); } else showModal('Ошибка', d.error?.message || 'Ошибка загрузки'); }).catch(e=>showModal('Ошибка',e.message));

    async function toggleLike(postId) {
        const post = (await db.collection('posts').doc(postId).get()).data();
        const likes = post.likes || [];
        if (likes.includes(currentUser.uid)) await db.collection('posts').doc(postId).update({ likes: firebase.firestore.FieldValue.arrayRemove(currentUser.uid) });
        else { await db.collection('posts').doc(postId).update({ likes: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) }); await addCoins(currentUser.uid, 1); }
        if (currentView === 'profile') showProfileView(viewedProfileUserId);
        else if (currentView === 'feed') showFeedView();
    }
    async function toggleCommentLike(postId, commentId) {
        const post = (await db.collection('posts').doc(postId).get()).data();
        const comments = post.comments || [];
        const idx = comments.findIndex(c => c.id === commentId);
        if (idx !== -1) {
            const comment = comments[idx];
            const likes = comment.likes || [];
            if (likes.includes(currentUser.uid)) comment.likes = likes.filter(id => id !== currentUser.uid);
            else { comment.likes = [...likes, currentUser.uid]; await addCoins(currentUser.uid, 1); }
            comments[idx] = comment;
            await db.collection('posts').doc(postId).update({ comments: comments });
        }
        if (currentView === 'profile') showProfileView(viewedProfileUserId);
        else if (currentView === 'feed') showFeedView();
    }
    async function addComment(postId, text) {
        if (!text.trim()) return;

        if (currentView === 'profile') showProfileView(viewedProfileUserId);
        else if (currentView === 'feed') showFeedView();
    }

    async function loadChatsList() {
        if(!currentUser) return;
        try {
            const all = await db.collection('messages').where('userId', '==', currentUser.uid).get();
            const to = await db.collection('messages').where('toUserId', '==', currentUser.uid).get();
            const chatUsers = new Map();
            all.forEach(d => { const m = d.data(); if(m.toUserId && m.toUserId !== currentUser.uid && m.chatType !== 'group') chatUsers.set(m.toUserId, { lastMsg: m.text || (m.isSticker ? '📸 Стикер' : '📎 Медиа'), lastTime: m.timestamp }); });
            to.forEach(d => { const m = d.data(); if(m.userId && m.userId !== currentUser.uid && m.chatType !== 'group') { const ex = chatUsers.get(m.userId); if(!ex || (m.timestamp && ex.lastTime?.toDate?.() < m.timestamp.toDate())) chatUsers.set(m.userId, { lastMsg: m.text || (m.isSticker ? '📸 Стикер' : '📎 Медиа'), lastTime: m.timestamp }); } });
            const friendIds = userData.friends || [];
            for(const id of friendIds) { if(!chatUsers.has(id)) { const u = await db.collection('users').doc(id).get(); if(u.exists) chatUsers.set(id, { lastMsg: 'Напишите первым', lastTime: null }); } }
            const privateChats = [];
            for(const [id,data] of chatUsers) {
                const u = (await db.collection('users').doc(id).get()).data();
                if(u) privateChats.push({ type: 'private', id, firstName: u.firstName, lastName: u.lastName, avatarUrl: u.avatarUrl || null, isVerified: u.isVerified || false, lastMsg: data.lastMsg, lastTime: data.lastTime });
            }
            const groupsSnap = await db.collection('groups').where('members', 'array-contains', currentUser.uid).get();
            const groupChats = [];
            for(const d of groupsSnap.docs) {
                const g = d.data();
                const last = await db.collection('messages').where('groupId', '==', d.id).orderBy('timestamp', 'desc').limit(1).get();
                let lastMsg = 'Нет сообщений', lastTime = null;
                if(!last.empty) { const lm = last.docs[0].data(); lastMsg = lm.text || (lm.isSticker ? '📸 Стикер' : '📎 Медиа'); lastTime = lm.timestamp?.toDate?.() || null; }
                groupChats.push({ type: 'group', id: d.id, name: g.name, members: g.members, createdBy: g.createdBy, lastMsg, lastTime });
            }
            groupChats.sort((a,b)=> (b.lastTime?.getTime?.()||0) - (a.lastTime?.getTime?.()||0));
            privateChats.sort((a,b)=> (b.lastTime?.toDate?.()?.getTime()||0) - (a.lastTime?.toDate?.()?.getTime()||0));
            chatsList = { private: privateChats, groups: groupChats };
            renderChatsList();
        } catch(e) { console.error(e); }
    }

    async function sendTextMessage() {

    async function markMessagesAsRead(chat) {
        if (!currentUser || chat.type !== 'private') return;
        const chatId = getChatId(currentUser.uid, chat.id);
        const snap = await db.collection('messages').where('chatId', '==', chatId).where('userId', '!=', currentUser.uid).where('read', '==', false).get();
        const batch = db.batch();
        snap.forEach(d => batch.update(d.ref, { read: true }));
        await batch.commit();
    }
    
    function loadMessages() {
        if(messagesUnsubscribe) messagesUnsubscribe();
        if(!currentChat) return;
        let query;
        if (currentChat.type === 'private') query = db.collection('messages').where('chatId', '==', getChatId(currentUser.uid, currentChat.id));
        else query = db.collection('messages').where('groupId', '==', currentChat.id);
        messagesUnsubscribe = query.orderBy('timestamp', 'asc').onSnapshot(async (snap) => {
            const container = document.getElementById('messagesArea');
            if(!container) return;
            container.innerHTML = '';
            if (currentChat.type === 'private') await markMessagesAsRead(currentChat);
            snap.forEach(doc => {
                const msg = doc.data();
                const msgId = doc.id;
                const isMy = msg.userId === currentUser.uid;
                const ts = msg.timestamp?.toDate?.() || new Date();
                const reactions = msg.reactions || {};
                let mediaHtml = '';
                if (msg.mediaUrl) {
                    if (msg.isSticker) mediaHtml = `<div class="media-container"><img src="${msg.mediaUrl}" class="message-image" style="max-width:150px;background:transparent" onclick="window.open('${msg.mediaUrl}','_blank')"></div>`;
                    else if (msg.mediaType === 'image') mediaHtml = `<div class="media-container"><img src="${msg.mediaUrl}" class="message-image" onclick="window.open('${msg.mediaUrl}','_blank')"></div>`;
                    else if (msg.mediaType === 'video') mediaHtml = `<div class="media-container"><video src="${msg.mediaUrl}" class="message-video" controls preload="metadata" playsinline></video></div>`;
                }
                const reactionGroups = {};
                Object.values(reactions).forEach(r => { reactionGroups[r] = (reactionGroups[r]||0)+1; });
                const myReact = reactions[currentUser.uid];
                let reactionsHtml = '';
                if (Object.keys(reactionGroups).length > 0) {
                    reactionsHtml = '<div class="reactions-bar">';
                    for (const [e,c] of Object.entries(reactionGroups)) reactionsHtml += `<div class="reaction-item ${myReact === e ? 'my-reaction' : ''}" data-msg="${msgId}" data-reaction="${e}"><span class="reaction-emoji">${e}</span>${c>1 ? `<span class="reaction-count">${c}</span>` : ''}</div>`;
                    reactionsHtml += '</div>';
                }
                let readHtml = '';
                if (isMy && currentChat.type === 'private') readHtml = msg.read ? `<span class="read-status read"><i class="fas fa-check-double"></i></span>` : `<span class="read-status delivered"><i class="fas fa-check"></i></span>`;
                const div = document.createElement('div');
                div.className = `message ${isMy ? 'my' : 'other'}`;
                div.innerHTML = `${!isMy ? `<div class="message-sender" data-user-id="${msg.userId}"><div class="sender-avatar" style="background-image:url('${msg.userAvatar||''}');background-size:cover;background-position:center;${!msg.userAvatar ? 'background:var(--accent);display:flex;align-items:center;justify-content:center' : ''}">${!msg.userAvatar ? getInitials(msg.userName?.split(' ')[0], msg.userName?.split(' ')[1] || '') : ''}</div>${escapeHtml(msg.userName || 'Пользователь')}</div>` : ''}${mediaHtml}${msg.text ? `<div class="message-bubble">${escapeHtml(msg.text)}</div>` : ''}<div class="message-footer"><span class="message-time">${ts.toLocaleDateString()} в ${ts.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>${readHtml}</div>${reactionsHtml}`;
                div.querySelectorAll('.reaction-item').forEach(el => { el.onclick = (e) => { e.stopPropagation(); addReaction(el.dataset.msg, el.dataset.reaction); }; });
                const clickEl = div.querySelector('.message-bubble') || div.querySelector('.media-container');
                if (clickEl) {
                    clickEl.addEventListener('contextmenu', (e) => { e.preventDefault(); showContextMenu(e, msgId, isMy); });
                    let lastTap = 0;
                    clickEl.addEventListener('touchstart', (e) => { const now = Date.now(); if (now - lastTap < 300) { e.preventDefault(); showContextMenu(e, msgId, isMy); } lastTap = now; });
                }
                const senderEl = div.querySelector('.message-sender');
                if (senderEl && !isMy) { senderEl.style.cursor = 'pointer'; senderEl.addEventListener('click', () => showProfileView(msg.userId)); }
                container.appendChild(div);
            });
            scrollToBottom();
        });
    }
    
    function uploadFileToCloudinary(file, onS, onE) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        if (file.type.startsWith('video/')) fd.append('resource_type', 'video');
        const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${file.type.startsWith('video/') ? 'video' : 'image'}/upload`;
        fetch(url, { method: 'POST', body: fd }).then(r=>r.json()).then(d=>{ if(d.secure_url) onS(d.secure_url, d.resource_type); else onE(d.error?.message||'Ошибка загрузки'); }).catch(e=>onE(e.message));
    }
    function sendMediaFile(file) {
        if (!currentChat) { showModal('Ошибка', 'Сначала выберите чат'); return; }
        if (!file) return;
        const isVideo = file.type.startsWith('video/');
        if (file.size/(1024*1024) > 100) { showModal('Ошибка', 'Файл слишком большой. Максимум 100 МБ'); return; }
        showModal('Загрузка', isVideo ? '🎬 Обработка видео...' : '📸 Отправка фото...');
        uploadFileToCloudinary(file, (url,type) => {
            const data = { text: '', mediaUrl: url, mediaType: type, userId: currentUser.uid, userName: `${userData.firstName} ${userData.lastName}`, userAvatar: userData.avatarUrl || null, timestamp: firebase.firestore.FieldValue.serverTimestamp(), chatType: currentChat.type, reactions: {} };
            if (currentChat.type === 'private') { data.chatId = getChatId(currentUser.uid, currentChat.id); data.toUserId = currentChat.id; }
            else data.groupId = currentChat.id;
            db.collection('messages').add(data).then(() => { document.querySelector('.modal-overlay.active')?.classList.remove('active'); scrollToBottom(); loadChatsList(); }).catch(e => showModal('Ошибка', 'Ошибка отправки: ' + e.message));
        }, (err) => showModal('Ошибка', 'Не удалось загрузить файл: ' + err));
    }
    function openFilePicker() {
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'image/*,video/*';
        inp.onchange = (e) => { const f = e.target.files?.[0]; if(f) sendMediaFile(f); };
        inp.click();
    }

    function renderPeopleList(q='') {

        cont.innerHTML = '';

            const isReceived = userData.friendRequests?.received?.includes(user.id);

    }
    window.switchAdminTab = switchAdminTab;
    
    function showMoreMenu() {
        const modal = document.getElementById('mobileSubmenuModal');
        const adminItem = document.getElementById('adminSubmenuItem');
        if(isAdmin) adminItem.style.display = 'flex'; else adminItem.style.display = 'none';
        modal.classList.add('active');
        document.querySelectorAll('.mobile-submenu-item[data-sub]').forEach(el => { el.onclick = () => { modal.classList.remove('active'); const sub = el.dataset.sub; if(sub==='people') showPeopleView(); else if(sub==='music') showMusicView(); else if(sub==='shop') showShopView(); else if(sub==='faq') showFAQView(); else if(sub==='settings') showSettingsView(); else if(sub==='admin') showAdminView(); }; });
        document.getElementById('closeSubmenuModal').onclick = () => modal.classList.remove('active');
    }
    
    function showFAQView() {
        currentView = 'faq';
        if(isMobile) { const bn = document.querySelector('.mobile-bottom-nav'); if(bn) bn.classList.remove('hidden'); }
        document.getElementById('mainContent').innerHTML = `<div class="people-view"><div class="people-header"><h2>❓ FAQ</h2></div><div style="padding:16px"><div class="faq-item"><div class="faq-question" onclick="toggleFaq(this)"><span>💰 Как пополнять кошелёк?</span><i class="fas fa-chevron-down"></i></div><div class="faq-answer">Монеты начисляются автоматически:<br>• +1 🪙 за сообщение<br>• +1 🪙 за лайк<br>• +1 🪙 за комментарий<br><br>Никаких донатов — только активность!</div></div><div class="faq-item"><div class="faq-question" onclick="toggleFaq(this)"><span>✅ Как получить галочку верификации?</span><i class="fas fa-chevron-down"></i></div><div class="faq-answer">Галочка выдаётся администрацией за активность и вклад в сообщество.</div></div><div class="faq-item"><div class="faq-question" onclick="toggleFaq(this)"><span>🛍️ Как купить стикеры?</span><i class="fas fa-chevron-down"></i></div><div class="faq-answer">Зайдите в "Магазин стикеров" в меню "Прочее", выберите набор и нажмите "Купить".</div></div><div class="faq-item"><div class="faq-question" onclick="toggleFaq(this)"><span>📞 Как позвонить?</span><i class="fas fa-chevron-down"></i></div><div class="faq-answer">В личном чате нажмите на кнопку с трубкой 📞 вверху. Звонок использует WebRTC.</div></div></div></div>`;
        if(isMobile) updateMobileNav('more');
    }
    window.toggleFaq = function(el) { const ans = el.nextElementSibling; const icon = el.querySelector('i'); ans.classList.toggle('show'); icon.style.transform = ans.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)'; };
    
    function updateMobileNav(active) { document.querySelectorAll('.mobile-nav-item').forEach(btn => { if(btn.dataset.nav === active) btn.classList.add('active'); else btn.classList.remove('active'); }); }
    
    function renderApp() {
        if(!currentUser || !userData) return;
        if(!currentUser.emailVerified) { renderEmailVerifyScreen(); return; }
        isAdmin = currentUser.email === 'sad.spotty@gmail.com';
        const avatarStyle = userData.avatarUrl ? `background-image:url('${userData.avatarUrl}');background-size:cover;background-position:center` : '';
        document.getElementById('app').innerHTML = `<div class="app"><div class="sidebar"><div class="logo">ЧЕБУРЧАТ</div><div class="sidebar-section"><div class="nav-item active" data-nav="chats"><i class="fas fa-comments"></i> Чаты</div><div class="nav-item" data-nav="feed"><i class="fas fa-newspaper"></i> Новости</div><div class="nav-item" data-nav="profile"><i class="fas fa-user-circle"></i> Профиль</div><div class="nav-item has-submenu" data-nav="more"><i class="fas fa-ellipsis-h"></i> Прочее<div class="sub-menu"><div class="nav-item" data-sub="people"><i class="fas fa-users"></i> Люди</div><div class="nav-item" data-sub="music"><i class="fas fa-music"></i> Музыка</div><div class="nav-item" data-sub="shop"><i class="fas fa-store"></i> Магазин стикеров</div><div class="nav-item" data-sub="faq"><i class="fas fa-question-circle"></i> FAQ</div><div class="nav-item" data-sub="settings"><i class="fas fa-cog"></i> Настройки</div>${isAdmin ? '<div class="nav-item" data-sub="admin"><i class="fas fa-shield-alt"></i> Админ панель</div>' : ''}</div></div></div><div class="user-info-sidebar" id="profileBtn"><div class="avatar-wrapper"><div class="avatar" style="${avatarStyle}">${!userData.avatarUrl ? getInitials(userData.firstName, userData.lastName) : ''}</div>${userData.isVerified ? '<div class="verified-badge"><i class="fas fa-check"></i></div>' : ''}</div><div><strong>${userData.firstName} ${userData.lastName}</strong>${userData.isVerified ? ' <i class="fas fa-check-circle verified-icon" style="font-size:12px"></i>' : ''}</div></div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button></div><div class="main" id="mainContent"></div><div class="mobile-bottom-nav"><button class="mobile-nav-item active" data-nav="chats"><i class="fas fa-comments"></i><span>Чаты</span></button><button class="mobile-nav-item" data-nav="feed"><i class="fas fa-newspaper"></i><span>Новости</span></button><button class="mobile-nav-item" data-nav="profile"><i class="fas fa-user-circle"></i><span>Профиль</span></button><button class="mobile-nav-item" data-nav="more"><i class="fas fa-ellipsis-h"></i><span>Прочее</span></button></div></div>`;
        const moreNav = document.querySelector('.nav-item[data-nav="more"]');
        const subMenu = moreNav?.querySelector('.sub-menu');
        if(moreNav && subMenu) {
            moreNav.addEventListener('click', (e) => { e.stopPropagation(); subMenu.classList.toggle('show'); });
            document.addEventListener('click', (e) => { if(!moreNav.contains(e.target)) subMenu.classList.remove('show'); });
        }
        document.querySelectorAll('.nav-item[data-nav]').forEach(el => { if(el.dataset.nav !== 'more') { el.onclick = () => { document.querySelectorAll('.nav-item[data-nav]').forEach(n=>n.classList.remove('active')); el.classList.add('active'); if(el.dataset.nav === 'chats') showChatsView(); else if(el.dataset.nav === 'feed') showFeedView(); else if(el.dataset.nav === 'profile') showProfileView(); }; } });
        document.querySelectorAll('.nav-item[data-sub]').forEach(el => { el.onclick = (e) => { e.stopPropagation(); const sub = el.dataset.sub; if(sub === 'people') showPeopleView(); else if(sub === 'music') showMusicView(); else if(sub === 'shop') showShopView(); else if(sub === 'faq') showFAQView(); else if(sub === 'settings') showSettingsView(); else if(sub === 'admin') showAdminView(); if(subMenu) subMenu.classList.remove('show'); }; });
        document.querySelectorAll('.mobile-nav-item').forEach(el => { if(el.dataset.nav === 'more') el.onclick = () => showMoreMenu(); else el.onclick = () => { if(el.dataset.nav === 'chats') showChatsView(); else if(el.dataset.nav === 'feed') showFeedView(); else if(el.dataset.nav === 'profile') showProfileView(); }; });
        document.getElementById('profileBtn').onclick = () => showProfileView();
        document.getElementById('logoutBtn').onclick = () => { if(messagesUnsubscribe) messagesUnsubscribe(); auth.signOut(); renderAuth(); };
        listenForCalls();
        showChatsView();
    }
    
    function renderEmailVerifyScreen() { document.getElementById('app').innerHTML = `<div class="auth-container"><div class="auth-card"><h1>ЧЕБУРЧАТ</h1><div class="verify-msg"><i class="fas fa-envelope"></i> Подтвердите email<br><small>${currentUser.email}</small></div><button id="resendBtn">Отправить повторно</button><button id="checkBtn" style="background:#28a745">Я подтвердил</button><button id="logoutVerifyBtn" style="background:#dc3545;margin-top:10px">Выйти</button></div><div class="app-version">v1.0</div></div>`; document.getElementById('resendBtn').onclick = async () => { await currentUser.sendEmailVerification(); showModal('Письмо отправлено', 'Проверьте почту'); }; document.getElementById('checkBtn').onclick = async () => { await currentUser.reload(); if(currentUser.emailVerified) location.reload(); else showModal('Ошибка', 'Email не подтверждён'); }; document.getElementById('logoutVerifyBtn').onclick = () => { if(messagesUnsubscribe) messagesUnsubscribe(); auth.signOut(); renderAuth(); }; }
    async function handleRegister() { const fn = document.getElementById('regFirstName').value.trim(), ln = document.getElementById('regLastName').value.trim(), em = document.getElementById('regEmail').value.trim(), pw = document.getElementById('regPassword').value; if(!fn||!ln) { showModal('Ошибка', 'Введите имя и фамилию'); return; } if(pw.length<6) { showModal('Ошибка', 'Пароль минимум 6 символов'); return; } try { const cred = await auth.createUserWithEmailAndPassword(em, pw); await cred.user.sendEmailVerification(); await db.collection('users').doc(cred.user.uid).set({ firstName: fn, lastName: ln, email: em, friends: [], friendRequests: { sent: [], received: [] }, balance: 0, stickers: [], createdAt: new Date(), isVerified: false }); showModal('Регистрация', 'Письмо с подтверждением отправлено!'); } catch(e) { showModal('Ошибка', e.message); } }
    async function handleLogin() { const em = document.getElementById('loginEmail').value, pw = document.getElementById('loginPassword').value; try { await auth.signInWithEmailAndPassword(em, pw); } catch(e) { showModal('Ошибка', e.message); } }
    function renderAuth() { document.getElementById('app').innerHTML = `<div class="auth-container"><div class="auth-card"><h1>ЧЕБУРЧАТ</h1><div class="auth-subtitle">Социальная сеть для своих</div><div id="loginView"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Пароль"><button id="doLoginBtn">Войти</button><div class="toggle-auth" id="showRegisterBtn">Нет аккаунта? Зарегистрироваться</div></div><div id="registerView" class="hidden"><input type="text" id="regFirstName" placeholder="Имя"><input type="text" id="regLastName" placeholder="Фамилия"><input type="email" id="regEmail" placeholder="Email"><input type="password" id="regPassword" placeholder="Пароль (мин. 6)"><button id="doRegisterBtn">Зарегистрироваться</button><div class="toggle-auth" id="showLoginBtn">Уже есть аккаунт? Войти</div></div></div><div class="app-version">v1.0</div></div>`; document.getElementById('doLoginBtn').onclick = handleLogin; document.getElementById('showRegisterBtn').onclick = () => { document.getElementById('loginView').classList.add('hidden'); document.getElementById('registerView').classList.remove('hidden'); }; document.getElementById('showLoginBtn').onclick = () => { document.getElementById('registerView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); }; document.getElementById('doRegisterBtn').onclick = handleRegister; }
    
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if(!doc.exists) { await db.collection('users').doc(user.uid).set({ firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] }, balance: 0, stickers: [], isVerified: false }); userData = { firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] }, balance: 0, stickers: [], isVerified: false }; }
            else { userData = doc.data(); if(!userData.friendRequests) await db.collection('users').doc(user.uid).update({ friendRequests: { sent: [], received: [] } }); if(userData.isVerified === undefined) await db.collection('users').doc(user.uid).update({ isVerified: false }); if(userData.balance === undefined) await db.collection('users').doc(user.uid).update({ balance: 0 }); if(!userData.stickers) await db.collection('users').doc(user.uid).update({ stickers: [] }); }
            loadSavedSettings();
            renderApp();
        } else { if(messagesUnsubscribe) messagesUnsubscribe(); currentUser = null; userData = null; renderAuth(); }
    });
    
    window.addEventListener('resize', () => { isMobile = window.innerWidth <= 768; });
    document.addEventListener('click', () => hideContextMenu());
    document.getElementById('closeStickersModal')?.addEventListener('click', () => document.getElementById('stickersModal')?.classList.remove('active'));
    document.getElementById('closePreviewModal')?.addEventListener('click', () => document.getElementById('previewModal')?.classList.remove('active'));
</script>
</body>
</html>
