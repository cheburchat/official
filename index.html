<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЧЕБУРЧАТ — Социальная сеть</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; transition: background 0.2s, color 0.2s; }
        
        /* ========== БАЗОВЫЕ ПЕРЕМЕННЫЕ ========== */
        :root {
            --accent: #ff7b2c;
            --accent-hover: #e6691a;
            --card-radius: 20px;
            --text-brightness: 1;
            --icon-brightness: 1;
            --hover-animation: 1;
        }
        
        /* ========== ТЕМЫ ========== */
        body[data-theme="default"] {
            --bg-page: #f0f2f5;
            --bg-surface: #ffffff;
            --bg-element: #f0f2f5;
            --text: #1a1a1a;
            --text-secondary: #65676b;
            --border: #e4e6eb;
            --my-msg: #ff7b2c;
            --my-msg-text: white;
            --other-msg: #ffffff;
            --other-msg-text: #1a1a1a;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --glass-bg: rgba(255,255,255,0.95);
            --glass-border: rgba(0,0,0,0.05);
        }
        
        body[data-theme="dark"] {
            --bg-page: #121212;
            --bg-surface: #1e1e1e;
            --bg-element: #2d2d2d;
            --text: #e4e6eb;
            --text-secondary: #b0b3b8;
            --border: #3a3a3a;
            --my-msg: #ff7b2c;
            --my-msg-text: white;
            --other-msg: #2d2d2d;
            --other-msg-text: #e4e6eb;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
            --glass-bg: rgba(30,30,30,0.9);
            --glass-border: rgba(255,255,255,0.05);
        }
        
        body[data-theme="glass"] {
            --bg-page: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --bg-surface: rgba(255,255,255,0.12);
            --bg-element: rgba(255,255,255,0.08);
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.8);
            --border: rgba(255,255,255,0.15);
            --my-msg: rgba(255,123,44,0.85);
            --my-msg-text: white;
            --other-msg: rgba(255,255,255,0.15);
            --other-msg-text: white;
            --shadow-sm: 0 8px 32px rgba(0,0,0,0.2);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.25);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.3);
            --glass-bg: rgba(255,255,255,0.12);
            --glass-border: rgba(255,255,255,0.2);
        }
        
        /* Применение яркости текста */
        body { 
            background: var(--bg-page); 
            color: var(--text);
            filter: brightness(var(--text-brightness));
        }
        
        /* Применение яркости иконок */
        .nav-item i, .post-action-btn i, .comment-like-btn i, 
        .action-btn i, .profile-btn i, .back-btn i,
        .attach-btn i, .send-btn i, .create-group-btn i {
            filter: brightness(var(--icon-brightness));
        }
        
        /* Отключение анимаций при наведении */
        body.no-hover-animation .nav-item:hover,
        body.no-hover-animation .chat-item:hover,
        body.no-hover-animation .person-item:hover,
        body.no-hover-animation .post-card:hover,
        body.no-hover-animation .track-card:hover,
        body.no-hover-animation .theme-preset:hover,
        body.no-hover-animation .color-btn:hover,
        body.no-hover-animation .radius-preset:hover {
            transform: none;
        }
        
        /* Стеклянные элементы */
        body[data-theme="glass"] .sidebar,
        body[data-theme="glass"] .chats-view,
        body[data-theme="glass"] .chat-header,
        body[data-theme="glass"] .feed-header,
        body[data-theme="glass"] .music-header,
        body[data-theme="glass"] .people-view,
        body[data-theme="glass"] .settings-view,
        body[data-theme="glass"] .admin-view,
        body[data-theme="glass"] .mobile-bottom-nav,
        body[data-theme="glass"] .input-area,
        body[data-theme="glass"] .post-card,
        body[data-theme="glass"] .track-card,
        body[data-theme="glass"] .person-item,
        body[data-theme="glass"] .chat-item,
        body[data-theme="glass"] .profile-view,
        body[data-theme="glass"] .create-post-card,
        body[data-theme="glass"] .modal,
        body[data-theme="glass"] .context-menu {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
        }
        
        body[data-theme="glass"] .sidebar {
            backdrop-filter: blur(25px);
            background: rgba(255,255,255,0.1);
        }
        
        body[data-theme="glass"] .message-bubble {
            backdrop-filter: blur(10px);
        }
        
        body[data-theme="glass"] .post-card:hover,
        body[data-theme="glass"] .chat-item:hover,
        body[data-theme="glass"] .person-item:hover {
            background: rgba(255,255,255,0.2);
        }
        
        body[data-theme="glass"] .nav-item:hover,
        body[data-theme="glass"] .nav-item.active {
            background: rgba(255,255,255,0.15);
        }
        
        /* Применение скруглений */
        .sidebar, .chats-view, .chat-header, .feed-header, .music-header,
        .people-view, .settings-view, .admin-view, .post-card, .track-card,
        .person-item, .chat-item, .profile-view, .create-post-card,
        .modal, .auth-card, .context-menu, .reactions-modal .modal,
        .theme-preset, .radius-preset, .color-btn {
            border-radius: var(--card-radius);
        }
        
        /* Auth */
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, #000)); padding: 16px; }
        .auth-card { background: var(--bg-surface); padding: 40px 32px; width: 100%; max-width: 420px; text-align: center; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .auth-card h1 { color: var(--accent); margin-bottom: 8px; font-size: 36px; font-weight: 800; }
        .auth-subtitle { color: var(--text-secondary); margin-bottom: 32px; font-size: 14px; }
        .auth-card input { width: 100%; padding: 14px 16px; margin: 8px 0; border: 2px solid var(--border); border-radius: 16px; font-size: 16px; background: var(--bg-element); color: var(--text); transition: 0.2s; }
        .auth-card input:focus { outline: none; border-color: var(--accent); }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 16px; color: white; font-weight: 700; margin-top: 16px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .auth-card button:hover { filter: brightness(0.95); transform: translateY(-1px); }
        .toggle-auth { margin-top: 20px; color: var(--accent); cursor: pointer; font-size: 14px; }
        .verify-msg { background: #fff3cd; color: #856404; padding: 12px; border-radius: 16px; margin: 16px 0; font-size: 14px; }
        .hidden { display: none !important; }
        
        .app { display: flex; height: 100vh; background: var(--bg-page); }
        .sidebar { width: 280px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; transition: all 0.2s; }
        .logo { padding: 20px 20px 16px; font-size: 24px; font-weight: 800; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
        .sidebar-section { padding: 8px 0; }
        .nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); font-weight: 500; border-radius: 12px; margin: 4px 8px; transition: all 0.2s; position: relative; }
        .nav-item:hover, .nav-item.active { background: var(--bg-element); color: var(--accent); }
        .nav-item i { width: 24px; font-size: 20px; }
        
        .nav-item.has-submenu { position: relative; }
        .sub-menu { position: absolute; top: 100%; left: 8px; right: 8px; background: var(--bg-surface); border-radius: 12px; box-shadow: var(--shadow-md); border: 1px solid var(--border); z-index: 100; display: none; margin-top: 4px; }
        .sub-menu.show { display: block; }
        .sub-menu .nav-item { padding: 10px 16px; margin: 0; border-radius: 0; }
        .sub-menu .nav-item:first-child { border-radius: 12px 12px 0 0; }
        .sub-menu .nav-item:last-child { border-radius: 0 0 12px 12px; }
        .sub-menu .nav-item:hover { background: var(--bg-element); }
        
        .user-info-sidebar { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar-wrapper { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; }
        .verified-badge { position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; border: 2px solid var(--bg-surface); z-index: 2; }
        .logout-btn { margin: 10px 16px; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .logout-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-page); }
        
        /* Чаты (остальные стили остаются без изменений) */
        .chats-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); transition: all 0.2s; }
        .chats-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding-top: max(16px, env(safe-area-inset-top)); }
        .chats-header h2 { font-size: 24px; font-weight: 700; color: var(--text); }
        .create-group-btn { border: none; padding: 8px 16px; border-radius: 24px; color: white; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .create-group-btn:hover { filter: brightness(0.95); }
        .chats-search { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .chats-search input { width: 100%; padding: 10px 16px; border: none; background: var(--bg-element); border-radius: 24px; font-size: 15px; outline: none; color: var(--text); }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: all 0.2s; margin: 4px 8px; }
        .chat-item:hover { background: var(--bg-element); }
        .chat-avatar-wrapper { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
        .chat-avatar { width: 100%; height: 100%; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 20px; }
        .group-avatar { background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, #000)); }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 16px; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .verified-icon { color: #3b82f6; font-size: 14px; }
        .chat-last-msg { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
        .empty-chats { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        
        .chat-window { display: flex; flex-direction: column; height: 100%; background: var(--bg-page); }
        .chat-header { padding: 12px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; padding-top: max(12px, env(safe-area-inset-top)); transition: all 0.2s; }
        .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text); transition: 0.2s; }
        .back-btn:hover { background: var(--bg-element); }
        .chat-header-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; position: relative; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; }
        .chat-header-info { flex: 1; min-width: 0; }
        .chat-header-name { font-weight: 600; font-size: 17px; color: var(--text); display: flex; align-items: center; gap: 6px; cursor: pointer; flex-wrap: wrap; }
        .chat-header-members { font-size: 12px; color: var(--text-secondary); cursor: pointer; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn 0.2s ease; margin-bottom: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.my { align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 18px; word-wrap: break-word; cursor: pointer; background: var(--bg-surface); box-shadow: var(--shadow-sm); transition: all 0.2s; }
        .my .message-bubble { background: var(--my-msg); color: var(--my-msg-text); border-bottom-right-radius: 4px; }
        .other .message-bubble { background: var(--other-msg); color: var(--other-msg-text); border-bottom-left-radius: 4px; }
        .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 4px; margin-left: 6px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; cursor: pointer; flex-wrap: wrap; }
        .sender-avatar { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; flex-shrink: 0; }
        .message-footer { display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin-top: 4px; margin-right: 6px; }
        .message-time { font-size: 10px; color: var(--text-secondary); }
        .read-status { font-size: 10px; display: flex; align-items: center; gap: 2px; }
        .read-status.read i { color: #34c759; }
        .read-status.delivered i { color: #8e8e8e; }
        
        .media-container { margin: 4px 0; border-radius: 16px; overflow: hidden; max-width: 280px; }
        .message-image { width: 100%; height: auto; max-height: 300px; object-fit: cover; cursor: pointer; border-radius: 16px; }
        .message-video { width: 100%; max-height: 280px; border-radius: 16px; background: #000; outline: none; }
        
        .reactions-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; margin-left: 6px; }
        .reaction-item { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-element); padding: 2px 8px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.1s; border: 1px solid var(--border); }
        .reaction-item:hover { transform: scale(1.05); }
        .reaction-item.my-reaction { background: var(--accent); color: white; border-color: var(--accent); }
        .reaction-emoji { font-size: 14px; }
        .reaction-count { font-size: 11px; font-weight: 500; }
        
        .context-menu { position: fixed; background: var(--bg-surface); border-radius: 12px; box-shadow: var(--shadow-md); z-index: 1000; min-width: 180px; overflow: hidden; border: 1px solid var(--border); display: none; }
        .context-menu.active { display: block; }
        .context-menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.1s; color: var(--text); }
        .context-menu-item:hover { background: var(--bg-element); }
        .context-menu-item.delete { color: #dc3545; }
        
        .reactions-modal .modal { max-width: 350px; }
        .reactions-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; padding: 16px; }
        .reaction-option { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px; cursor: pointer; border-radius: 16px; transition: 0.1s; min-width: 60px; }
        .reaction-option:hover { background: var(--bg-element); transform: scale(1.05); }
        .reaction-emoji-big { font-size: 32px; }
        .reaction-name { font-size: 12px; color: var(--text-secondary); }
        
        .mobile-context-menu { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-surface); border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); z-index: 1001; display: none; flex-direction: column; padding: 16px; animation: slideUp 0.2s ease; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
        .mobile-context-menu.active { display: flex; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .mobile-context-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; }
        .mobile-context-overlay.active { display: block; }
        .mobile-context-title { font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); color: var(--text-secondary); text-align: center; }
        .mobile-context-buttons { display: flex; flex-direction: column; gap: 8px; }
        .mobile-context-btn { padding: 14px; border-radius: 14px; background: var(--bg-element); border: none; font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text); }
        .mobile-context-btn.delete { color: #dc3545; background: rgba(220,53,69,0.1); }
        
        .input-area { padding: 12px 16px; background: var(--bg-surface); border-top: 1px solid var(--border); display: flex; gap: 12px; flex-shrink: 0; padding-bottom: max(12px, env(safe-area-inset-bottom)); transition: all 0.2s; }
        .input-area input { flex: 1; padding: 12px 18px; border: none; background: var(--bg-element); border-radius: 28px; font-size: 16px; outline: none; color: var(--text); }
        .input-area button { border: none; width: 48px; height: 48px; border-radius: 50%; color: white; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .input-area button:hover { filter: brightness(0.95); }
        .attach-btn { background: var(--bg-element); border: none; width: 48px; height: 48px; border-radius: 50%; color: var(--text); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .attach-btn:hover { background: var(--accent); color: white; }
        
        /* Лента новостей */
        .feed-header { background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, #000)); padding: 16px 20px; padding-top: max(16px, env(safe-area-inset-top)); }
        .feed-header h2 { font-size: 24px; font-weight: 700; color: white; }
        .posts-feed { display: flex; flex-direction: column; gap: 16px; padding: 16px; }
        .post-card { background: var(--bg-surface); padding: 16px; border: 1px solid var(--border); position: relative; transition: all 0.2s; box-shadow: var(--shadow-sm); }
        .post-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; cursor: pointer; }
        .post-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; flex-shrink: 0; position: relative; }
        .post-author-name { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .post-time { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .post-text { font-size: 15px; color: var(--text); margin-bottom: 12px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
        .post-actions { display: flex; gap: 24px; padding-top: 12px; border-top: 1px solid var(--border); }
        .post-action-btn { background: none; border: none; display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-secondary); cursor: pointer; padding: 6px 12px; border-radius: 20px; transition: 0.1s; }
        .post-action-btn:hover { background: var(--bg-element); }
        .post-action-btn.liked { color: #e74c3c; }
        .post-delete-btn { background: none; border: none; font-size: 16px; color: var(--text-secondary); cursor: pointer; padding: 6px; border-radius: 50%; transition: 0.1s; position: absolute; top: 12px; right: 12px; }
        .post-delete-btn:hover { background: var(--bg-element); color: #dc3545; }
        .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .comment-item { display: flex; gap: 10px; padding: 8px 0; font-size: 13px; }
        .comment-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 12px; flex-shrink: 0; position: relative; }
        .comment-content { flex: 1; }
        .comment-author { font-weight: 600; font-size: 12px; color: var(--text); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .comment-text { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .comment-footer { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
        .comment-time { font-size: 10px; color: var(--text-secondary); }

                if (parseInt(p.dataset.radius) === radius) p.classList.add('active');
                else p.classList.remove('active');
            });
        }
    }
    
    function setTextBrightness(value) {
        currentTextBrightness = value;
        document.documentElement.style.setProperty('--text-brightness', value);
        localStorage.setItem('cheburchat_text_brightness', value);
        if (currentView === 'settings') {
            const slider = document.getElementById('textBrightnessSlider');
            if (slider) slider.value = value;
            document.getElementById('textBrightnessValue').textContent = Math.round(value * 100) + '%';
        }
    }
    
    function setIconBrightness(value) {
        currentIconBrightness = value;
        document.documentElement.style.setProperty('--icon-brightness', value);
        localStorage.setItem('cheburchat_icon_brightness', value);
        if (currentView === 'settings') {
            const slider = document.getElementById('iconBrightnessSlider');
            if (slider) slider.value = value;
            document.getElementById('iconBrightnessValue').textContent = Math.round(value * 100) + '%';
        }
    }
    
    function setHoverAnimation(enabled) {
        hoverAnimationEnabled = enabled;
        if (enabled) {
            document.body.classList.remove('no-hover-animation');
        } else {
            document.body.classList.add('no-hover-animation');
        }
        localStorage.setItem('cheburchat_hover_animation', enabled);
        if (currentView === 'settings') {
            const toggle = document.getElementById('hoverAnimationToggle');
            if (toggle) {
                if (enabled) toggle.classList.add('active');
                else toggle.classList.remove('active');
            }
        }
    }
    
    function resetAllSettings() {
        setTheme('default');
        setAccentColor('#ff7b2c');
        setRadius(20);
        setTextBrightness(1);
        setIconBrightness(1);
        setHoverAnimation(true);
        location.reload();
    }
    
    function loadSavedSettings() {
        const savedTheme = localStorage.getItem('cheburchat_theme') || 'default';
        const savedAccent = localStorage.getItem('cheburchat_accent') || '#ff7b2c';
        const savedRadius = parseInt(localStorage.getItem('cheburchat_radius')) || 20;
        const savedTextBrightness = parseFloat(localStorage.getItem('cheburchat_text_brightness')) || 1;
        const savedIconBrightness = parseFloat(localStorage.getItem('cheburchat_icon_brightness')) || 1;
        const savedHoverAnimation = localStorage.getItem('cheburchat_hover_animation') !== 'false';
        
        setTheme(savedTheme);
        setAccentColor(savedAccent);
        setRadius(savedRadius);
        setTextBrightness(savedTextBrightness);
        setIconBrightness(savedIconBrightness);
        setHoverAnimation(savedHoverAnimation);
    }

    // ========== ОСТАЛЬНЫЕ ФУНКЦИИ (сообщения, чаты, посты и т.д.) ==========

    function showSettingsView() {
        currentView = 'settings';
        if(isMobile) { const bn = document.querySelector('.mobile-bottom-nav'); if(bn) bn.classList.remove('hidden'); }
        
        document.getElementById('mainContent').innerHTML = `

                            <div class="theme-preset ${localStorage.getItem('cheburchat_theme') === 'default' ? 'active' : ''}" data-theme="default">
                                <div class="preset-icon">🌞</div>
                                <div class="preset-name">Стандартная</div>
                                <div class="preset-desc">Светлая тема</div>

                    </div>
                    <div class="settings-section">
                        <div class="settings-section-title"><i class="fas fa-fill-drip"></i> Акцентный цвет</div>
                        <div class="color-palette">
                            <div class="color-btn" style="background: #ff7b2c;" data-color="#ff7b2c"></div>
                            <div class="color-btn" style="background: #e91e63;" data-color="#e91e63"></div>
                            <div class="color-btn" style="background: #9b59b6;" data-color="#9b59b6"></div>

                            <div class="color-btn" style="background: #212529;" data-color="#212529"></div>

                        </div>
                    </div>
                    <div class="settings-section">
                        <div class="settings-section-title"><i class="fas fa-border-all"></i> Скругление углов</div>
                        <div class="radius-presets">
                            <div class="radius-preset ${parseInt(localStorage.getItem('cheburchat_radius')) === 8 ? 'active' : ''}" data-radius="8">
                                <i class="fas fa-square"></i>
                                <div>Малые (8px)</div>
                            </div>
                            <div class="radius-preset ${parseInt(localStorage.getItem('cheburchat_radius')) === 20 ? 'active' : ''}" data-radius="20">
                                <i class="fas fa-border-all"></i>
                                <div>Средние (20px)</div>
                            </div>
                            <div class="radius-preset ${parseInt(localStorage.getItem('cheburchat_radius')) === 32 ? 'active' : ''}" data-radius="32">
                                <i class="fas fa-circle"></i>
                                <div>Большие (32px)</div>
                            </div>
                        </div>
                    </div>
                    <div class="settings-section">
                        <div class="settings-section-title"><i class="fas fa-adjust"></i> Яркость текста</div>
                        <div class="slider-item">
                            <div class="slider-label"><span>Текст</span><span id="textBrightnessValue">${Math.round(currentTextBrightness * 100)}%</span></div>
                            <input type="range" id="textBrightnessSlider" min="0.5" max="1.5" step="0.05" value="${currentTextBrightness}">
                        </div>
                        <div class="slider-item">
                            <div class="slider-label"><span>Иконки</span><span id="iconBrightnessValue">${Math.round(currentIconBrightness * 100)}%</span></div>
                            <input type="range" id="iconBrightnessSlider" min="0.5" max="1.5" step="0.05" value="${currentIconBrightness}">
                        </div>
                    </div>
                    <div class="settings-section">
                        <div class="settings-section-title"><i class="fas fa-film"></i> Анимации</div>
                        <div class="toggle-switch">
                            <span class="toggle-label">Анимации при наведении</span>
                            <div class="toggle-checkbox ${hoverAnimationEnabled ? 'active' : ''}" id="hoverAnimationToggle"></div>
                        </div>
                    </div>
                    <button class="reset-btn" id="resetSettingsBtn">Сбросить все настройки</button>
                </div>
            </div>
        `;
        
        document.getElementById('settingsBackBtn').onclick = () => { if(currentChat) openChat(currentChat); else showChatsView(); };
        
        // Выбор темы
        document.querySelectorAll('.theme-preset').forEach(preset => {
            preset.onclick = () => {
                const theme = preset.dataset.theme;
                setTheme(theme);
                document.querySelectorAll('.theme-preset').forEach(p => p.classList.remove('active'));
                preset.classList.add('active');
            };
        });
        
        // Выбор цвета
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.onclick = () => {
                const color = btn.dataset.color;
                setAccentColor(color);
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            if (btn.dataset.color === currentAccentColor) btn.classList.add('active');
        });
        
        // Выбор скругления
        document.querySelectorAll('.radius-preset').forEach(preset => {
            preset.onclick = () => {
                const radius = parseInt(preset.dataset.radius);
                setRadius(radius);
                document.querySelectorAll('.radius-preset').forEach(p => p.classList.remove('active'));
                preset.classList.add('active');
            };
        });
        
        // Яркость текста
        const textSlider = document.getElementById('textBrightnessSlider');
        textSlider.oninput = (e) => {
            const val = parseFloat(e.target.value);
            setTextBrightness(val);
        };
        
        // Яркость иконок
        const iconSlider = document.getElementById('iconBrightnessSlider');
        iconSlider.oninput = (e) => {
            const val = parseFloat(e.target.value);
            setIconBrightness(val);
        };
        
        // Анимации при наведении
        const hoverToggle = document.getElementById('hoverAnimationToggle');
        hoverToggle.onclick = () => {
            setHoverAnimation(!hoverAnimationEnabled);
        };
        
        // Сброс
        document.getElementById('resetSettingsBtn').onclick = () => {
            resetAllSettings();
        };
        
        if(isMobile) updateMobileNav('more');
    }
    
    // Остальные функции (сообщения, чаты, посты) остаются полностью из предыдущей версии
    // (я их не включаю в этот ответ из-за ограничения длины, но они должны быть)
    
    // ВАЖНО: В полной версии кода все функции из предыдущей версии должны быть здесь
    
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if(!doc.exists) {
                await db.collection('users').doc(user.uid).set({ firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] }, isVerified: false });
                userData = { firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] }, isVerified: false };
            } else {
                userData = doc.data();
                if(!userData.friendRequests) await db.collection('users').doc(user.uid).update({ friendRequests: { sent: [], received: [] } });
                if(userData.isVerified === undefined) await db.collection('users').doc(user.uid).update({ isVerified: false });
            }
            loadSavedSettings();
            renderApp();
        } else {
            if(messagesUnsubscribe) messagesUnsubscribe();
            currentUser = null;
            userData = null;
            renderAuth();
        }
    });
    
    window.addEventListener('resize', () => { isMobile = window.innerWidth <= 768; });
    document.addEventListener('click', () => hideContextMenu());
