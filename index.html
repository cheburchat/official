    async function showCreateGroupModal() {
        const modal = document.getElementById('createGroupModal');
        document.getElementById('groupName').value = '';
        document.getElementById('selectedFriendsList').innerHTML = '';
        const friendsListDiv = document.getElementById('friendsForGroupList');
        const friendIds = userData.friends || [];
        const selectedFriends = new Set();
        if(friendIds.length === 0) friendsListDiv.innerHTML = '<div style="text-align: center; padding: 20px;">Нет друзей</div>';
        else {
            friendsListDiv.innerHTML = '';
            for(const id of friendIds) {
                const userDoc = await db.collection('users').doc(id).get();
                if(userDoc.exists) {
                    const u = userDoc.data();
                    const avatarStyle = u.avatarUrl ? `background-image: url('${u.avatarUrl}'); background-size: cover; background-position: center;` : '';
                    const div = document.createElement('div');
                    div.className = 'friend-select-item';
                    div.innerHTML = `<input type="checkbox" value="${id}" data-name="${u.firstName} ${u.lastName}"><div class="avatar" style="width:36px;height:36px;${avatarStyle}">${!u.avatarUrl ? getInitials(u.firstName, u.lastName) : ''}</div><div>${u.firstName} ${u.lastName}</div>`;
                    const checkbox = div.querySelector('input');
                    checkbox.onchange = () => {
                        if(checkbox.checked) {
                            selectedFriends.add(id);
                            const selectedDiv = document.getElementById('selectedFriendsList');
                            const tag = document.createElement('div');
                            tag.className = 'selected-friend';
                            tag.setAttribute('data-id', id);
                            tag.innerHTML = `${u.firstName} ${u.lastName} <button style="background:none;border:none;cursor:pointer;">×</button>`;
                            selectedDiv.appendChild(tag);
                            tag.querySelector('button').onclick = () => { checkbox.checked = false; selectedFriends.delete(id); tag.remove(); };
                        } else {
                            selectedFriends.delete(id);
                            const tag = document.querySelector(`.selected-friend[data-id="${id}"]`);
                            if(tag) tag.remove();
                        }
                    };
                    friendsListDiv.appendChild(div);
                }
            }
        }
        modal.classList.add('active');
        document.getElementById('confirmCreateGroup').onclick = async () => {
            const groupName = document.getElementById('groupName').value.trim();
            if(!groupName) { showModal('Ошибка', 'Введите название'); return; }
            const selected = document.querySelectorAll('#friendsForGroupList input:checked');
            const members = [currentUser.uid];
            selected.forEach(cb => members.push(cb.value));
            if(members.length < 2) { showModal('Ошибка', 'Выберите хотя бы одного друга'); return; }
            try { await db.collection('groups').add({ name: groupName, members, createdBy: currentUser.uid, createdAt: new Date().toISOString() }); showModal('Успех', 'Беседа создана!'); modal.classList.remove('active'); loadChatsList(); } catch(e) { showModal('Ошибка', e.message); }
        };
        document.getElementById('cancelCreateGroup').onclick = () => modal.classList.remove('active');
    }

    async function loadPeopleList() {
        const snapshot = await db.collection('users').get();
        allUsers = [];
        snapshot.forEach(doc => { if(doc.id !== currentUser.uid) allUsers.push({ id: doc.id, ...doc.data() }); });
        renderPeopleList('');
    }

    function renderPeopleList(searchQuery) {
        const container = document.getElementById('peopleListContainer');
        if(!container) return;
        let filtered = allUsers;
        if(searchQuery) filtered = allUsers.filter(u => `${u.firstName} ${u.lastName}`.toLowerCase().includes(searchQuery.toLowerCase()));
        if(filtered.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px">Никого не найдено</div>'; return; }
        container.innerHTML = '';
        filtered.forEach(user => {
            const isFriend = userData.friends?.includes(user.id);
            const isSent = userData.friendRequests?.sent?.includes(user.id);
            const isReceived = userData.friendRequests?.received?.includes(user.id);
            const avatarStyle = user.avatarUrl ? `background-image: url('${user.avatarUrl}'); background-size: cover; background-position: center;` : '';
            const div = document.createElement('div');
            div.className = 'person-item';
            div.innerHTML = `<div class="person-info"><div class="person-avatar" style="${avatarStyle}">${!user.avatarUrl ? getInitials(user.firstName, user.lastName) : ''}${user.isVerified ? '<div class="verified-badge" style="width: 16px; height: 16px; font-size: 8px;"><i class="fas fa-check"></i></div>' : ''}</div><div class="person-name">${user.firstName} ${user.lastName}${user.isVerified ? '<i class="fas fa-check-circle verified-icon"></i>' : ''}</div></div><div class="action-btns"><button class="action-btn write" data-chat="${user.id}">💬</button>${!isFriend && !isSent && !isReceived ? `<button class="action-btn add" data-add="${user.id}">➕</button>` : ''}${isSent ? '<button class="action-btn pending" disabled>⏳ Запрос</button>' : ''}${isReceived ? `<button class="action-btn add" data-accept="${user.id}" style="background:#28a745">✅ Принять</button>` : ''}${isFriend ? `<button class="action-btn remove" data-remove="${user.id}">🗑️</button>` : ''}</div>`;
            const writeBtn = div.querySelector('[data-chat]');
            const addBtn = div.querySelector('[data-add]');
            const acceptBtn = div.querySelector('[data-accept]');
            const removeBtn = div.querySelector('[data-remove]');
            if(writeBtn) writeBtn.onclick = () => openChat({ type: 'private', id: user.id, firstName: user.firstName, lastName: user.lastName, avatarUrl: user.avatarUrl, isVerified: user.isVerified });
            if(addBtn) addBtn.onclick = () => sendFriendRequest(user.id, user.firstName, user.lastName);
            if(acceptBtn) acceptBtn.onclick = () => acceptFriendRequest(user.id);
            if(removeBtn) removeBtn.onclick = () => removeFriend(user.id);
            container.appendChild(div);
        });
    }

    function showPeopleView() {
        currentView = 'people';
        if(isMobile) { const bn = document.querySelector('.mobile-bottom-nav'); if(bn) bn.classList.remove('hidden'); }
        document.getElementById('mainContent').innerHTML = `<div class="people-view"><div class="people-header"><h2>Люди</h2></div><div class="people-search"><input type="text" id="peopleSearchInput" placeholder="Поиск людей..."></div><div class="people-list" id="peopleListContainer"><div style="text-align:center;padding:40px">Загрузка...</div></div></div>`;
        loadPeopleList();
        document.getElementById('peopleSearchInput').oninput = (e) => renderPeopleList(e.target.value.trim());
        if(isMobile) updateMobileNav('more');
    }

    async function sendFriendRequest(toId, firstName, lastName) {
        try {
            await db.collection('users').doc(toId).update({ 'friendRequests.received': firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
            await db.collection('users').doc(currentUser.uid).update({ 'friendRequests.sent': firebase.firestore.FieldValue.arrayUnion(toId) });
            showModal('Успех', `Запрос отправлен ${firstName} ${lastName}`);
            const updated = await db.collection('users').doc(currentUser.uid).get();
            userData = updated.data();
            loadPeopleList();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function acceptFriendRequest(fromId) {
        try {
            await db.collection('users').doc(currentUser.uid).update({ friends: firebase.firestore.FieldValue.arrayUnion(fromId), 'friendRequests.received': firebase.firestore.FieldValue.arrayRemove(fromId) });
            await db.collection('users').doc(fromId).update({ friends: firebase.firestore.FieldValue.arrayUnion(currentUser.uid), 'friendRequests.sent': firebase.firestore.FieldValue.arrayRemove(currentUser.uid) });
            showModal('Успех', 'Теперь вы друзья!');
            const updated = await db.collection('users').doc(currentUser.uid).get();
            userData = updated.data();
            loadPeopleList();
            loadChatsList();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function removeFriend(friendId) {
        showModal('Подтверждение', 'Удалить пользователя из друзей?', async () => {
            try {
                await db.collection('users').doc(currentUser.uid).update({ friends: firebase.firestore.FieldValue.arrayRemove(friendId) });
                await db.collection('users').doc(friendId).update({ friends: firebase.firestore.FieldValue.arrayRemove(currentUser.uid) });
                showModal('Успех', 'Пользователь удалён из друзей');
                const updated = await db.collection('users').doc(currentUser.uid).get();
                userData = updated.data();
                loadPeopleList();
                loadChatsList();
            } catch(e) { showModal('Ошибка', e.message); }
        });
    }

        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('cheburchat_theme', theme);
        if (currentView === 'settings') { document.querySelectorAll('.theme-preset').forEach(p => { if (p.dataset.theme === theme) p.classList.add('active'); else p.classList.remove('active'); }); }
    }
    
    function setAccentColor(color) {
        currentAccentColor = color;
        document.documentElement.style.setProperty('--accent', color);
        document.documentElement.style.setProperty('--accent-hover', color);
        document.documentElement.style.setProperty('--my-msg', color);
        localStorage.setItem('cheburchat_accent', color);
        if (currentView === 'settings') { document.querySelectorAll('.color-btn').forEach(btn => { if (btn.style.backgroundColor === color) btn.classList.add('active'); else btn.classList.remove('active'); }); }
    }
    
    function setRadius(radius) {
        currentRadius = radius;
        document.documentElement.style.setProperty('--card-radius', radius + 'px');
        localStorage.setItem('cheburchat_radius', radius);
        if (currentView === 'settings') { document.querySelectorAll('.radius-preset').forEach(p => { if (parseInt(p.dataset.radius) === radius) p.classList.add('active'); else p.classList.remove('active'); }); }
    }
    
    function setTextContrast(contrast) {
        currentTextContrast = contrast;
        if (contrast === 'normal') document.body.removeAttribute('data-text-contrast');
        else document.body.setAttribute('data-text-contrast', contrast);
        localStorage.setItem('cheburchat_text_contrast', contrast);
        if (currentView === 'settings') { document.querySelectorAll('.contrast-preset').forEach(p => { if (p.dataset.contrast === contrast) p.classList.add('active'); else p.classList.remove('active'); }); }
    }
    
    function setDisableHover(disabled) {
        disableHover = disabled;
        if (disabled) document.body.setAttribute('data-disable-hover', 'true');
        else document.body.removeAttribute('data-disable-hover');
        localStorage.setItem('cheburchat_disable_hover', disabled);
        if (currentView === 'settings') { const toggle = document.querySelector('.toggle-switch'); if (toggle) { if (disabled) toggle.classList.add('active'); else toggle.classList.remove('active'); } }
    }
    
    function setOpacity(opacity) {
        currentOpacity = opacity;
        document.documentElement.style.setProperty('--card-opacity', opacity);
        localStorage.setItem('cheburchat_opacity', opacity);
        if (currentView === 'settings') { const slider = document.getElementById('opacitySlider'); if (slider) slider.value = opacity; const valueSpan = document.getElementById('opacityValue'); if (valueSpan) valueSpan.textContent = Math.round(opacity * 100) + '%'; }
    }
    
    function setShadow(shadow) {
        currentShadow = shadow;
        document.documentElement.style.setProperty('--shadow-intensity', shadow);
        localStorage.setItem('cheburchat_shadow', shadow);
        if (currentView === 'settings') { const slider = document.getElementById('shadowSlider'); if (slider) slider.value = shadow; const valueSpan = document.getElementById('shadowValue'); if (valueSpan) valueSpan.textContent = Math.round(shadow * 100) + '%'; }
    }
    
    function resetAllSettings() {
        setTheme('default');
        setAccentColor('#ff7b2c');
        setRadius(20);
        setTextContrast('normal');
        setDisableHover(false);
        setOpacity(1);
        setShadow(0.08);
        location.reload();
    }
    
    function loadSavedSettings() {
        const savedTheme = localStorage.getItem('cheburchat_theme') || 'default';
        const savedAccent = localStorage.getItem('cheburchat_accent') || '#ff7b2c';
        const savedRadius = parseInt(localStorage.getItem('cheburchat_radius')) || 20;
        const savedContrast = localStorage.getItem('cheburchat_text_contrast') || 'normal';
        const savedDisableHover = localStorage.getItem('cheburchat_disable_hover') === 'true';
        const savedOpacity = parseFloat(localStorage.getItem('cheburchat_opacity')) || 1;
        const savedShadow = parseFloat(localStorage.getItem('cheburchat_shadow')) || 0.08;
        setTheme(savedTheme);
        setAccentColor(savedAccent);
        setRadius(savedRadius);
        setTextContrast(savedContrast);
        setDisableHover(savedDisableHover);
        setOpacity(savedOpacity);
        setShadow(savedShadow);
    }

    async function loadAdminStats() {
        const usersSnapshot = await db.collection('users').get();
        if(document.getElementById('totalUsersCount')) document.getElementById('totalUsersCount').textContent = usersSnapshot.size;
        let verified = 0;
        usersSnapshot.forEach(doc => { if(doc.data().isVerified) verified++; });
        if(document.getElementById('verifiedUsersCount')) document.getElementById('verifiedUsersCount').textContent = verified;
    }

    async function loadAdminUsers() {
        const snapshot = await db.collection('users').get();
        const container = document.getElementById('adminUsersContainer');
        if(!container) return;
        container.innerHTML = '';
        snapshot.forEach(doc => {
            const user = doc.data();
            const avatarStyle = user.avatarUrl ? `background-image: url('${user.avatarUrl}'); background-size: cover; background-position: center;` : '';
            const div = document.createElement('div');
            div.className = 'admin-user-item';
            div.innerHTML = `<div class="admin-user-info"><div class="admin-user-avatar" style="${avatarStyle}">${!user.avatarUrl ? getInitials(user.firstName, user.lastName) : ''}${user.isVerified ? '<div class="verified-badge" style="width: 14px; height: 14px; font-size: 7px;"><i class="fas fa-check"></i></div>' : ''}</div><div class="admin-user-details"><div class="admin-user-name">${user.firstName} ${user.lastName} ${user.isVerified ? '<i class="fas fa-check-circle verified-icon"></i>' : ''}</div><div class="admin-user-email">${user.email}</div><div class="admin-user-balance"><i class="fas fa-coins"></i> ${user.balance || 0} 🪙</div></div></div><div class="action-btns">${!user.isVerified ? `<button class="action-btn verify" data-verify="${doc.id}" style="background:#3b82f6;color:white;">✅ Выдать</button>` : `<button class="action-btn unverify" data-unverify="${doc.id}" style="background:#6c757d;color:white;">❌ Забрать</button>`}</div>`;
            const verifyBtn = div.querySelector('[data-verify]');
            const unverifyBtn = div.querySelector('[data-unverify]');
            if(verifyBtn) verifyBtn.onclick = () => toggleVerification(doc.id, true, user.firstName, user.lastName);
            if(unverifyBtn) unverifyBtn.onclick = () => toggleVerification(doc.id, false, user.firstName, user.lastName);
            container.appendChild(div);
        });
        await loadAdminStats();
    }

    async function loadAdminTracks() {
        const tracks = await loadTracks();
        const container = document.getElementById('adminTracksContainer');
        if(!container) return;
        if(tracks.length === 0) { container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-secondary);">Нет треков</div>'; return; }

        for(const track of tracks) {
            const div = document.createElement('div');
            div.className = 'admin-user-item';
            div.innerHTML = `<div class="admin-user-info"><div><strong>${escapeHtml(track.artist)}</strong> - ${escapeHtml(track.title)}</div></div><button class="action-btn remove" data-id="${track.id}">🗑️ Удалить</button>`;
            div.querySelector('button').onclick = () => deleteTrack(track.id);
            container.appendChild(div);
        }
    }

        const fn = document.getElementById('regFirstName').value.trim(), ln = document.getElementById('regLastName').value.trim(), email = document.getElementById('regEmail').value.trim(), pass = document.getElementById('regPassword').value;
        if(!fn || !ln) { showModal('Ошибка', 'Введите имя и фамилию'); return; }
        if(pass.length < 6) { showModal('Ошибка', 'Пароль минимум 6 символов'); return; }
        try { const cred = await auth.createUserWithEmailAndPassword(email, pass); await cred.user.sendEmailVerification(); await db.collection('users').doc(cred.user.uid).set({ firstName: fn, lastName: ln, email, friends: [], friendRequests: { sent: [], received: [] }, balance: 0, stickers: [], createdAt: new Date(), isVerified: false }); showModal('Регистрация', 'Письмо с подтверждением отправлено!'); } catch(e) { showModal('Ошибка', e.message); }
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value, pass = document.getElementById('loginPassword').value;
        try { await auth.signInWithEmailAndPassword(email, pass); } catch(e) { showModal('Ошибка', e.message); }
    }

    function renderAuth() {
        document.getElementById('app').innerHTML = `<div class="auth-container"><div class="auth-card"><h1>ЧЕБУРЧАТ</h1><div class="auth-subtitle">Социальная сеть для своих</div><div id="loginView"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Пароль"><button id="doLoginBtn">Войти</button><div class="toggle-auth" id="showRegisterBtn">Нет аккаунта? Зарегистрироваться</div></div><div id="registerView" class="hidden"><input type="text" id="regFirstName" placeholder="Имя"><input type="text" id="regLastName" placeholder="Фамилия"><input type="email" id="regEmail" placeholder="Email"><input type="password" id="regPassword" placeholder="Пароль (мин. 6)"><button id="doRegisterBtn">Зарегистрироваться</button><div class="toggle-auth" id="showLoginBtn">Уже есть аккаунт? Войти</div></div></div><div class="app-version">v1.0</div></div>`;
        document.getElementById('doLoginBtn').onclick = handleLogin;
        document.getElementById('showRegisterBtn').onclick = () => { document.getElementById('loginView').classList.add('hidden'); document.getElementById('registerView').classList.remove('hidden'); };
        document.getElementById('showLoginBtn').onclick = () => { document.getElementById('registerView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); };
        document.getElementById('doRegisterBtn').onclick = handleRegister;
    }

    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if(!doc.exists) { 
                await db.collection('users').doc(user.uid).set({ firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] }, balance: 0, stickers: [], isVerified: false }); 
                userData = { firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] }, balance: 0, stickers: [], isVerified: false }; 
            } else { 
                userData = doc.data(); 
                if(!userData.friendRequests) await db.collection('users').doc(user.uid).update({ friendRequests: { sent: [], received: [] } });
                if(userData.isVerified === undefined) await db.collection('users').doc(user.uid).update({ isVerified: false });
                if(userData.balance === undefined) await db.collection('users').doc(user.uid).update({ balance: 0 });
                if(!userData.stickers) await db.collection('users').doc(user.uid).update({ stickers: [] });
            }
            loadSavedSettings();
            renderApp();
        } else { if(messagesUnsubscribe) messagesUnsubscribe(); currentUser = null; userData = null; renderAuth(); }
    });
    
    window.addEventListener('resize', () => { isMobile = window.innerWidth <= 768; });
    document.addEventListener('click', () => hideContextMenu());
    document.getElementById('closeStickersModal')?.addEventListener('click', () => document.getElementById('stickersModal')?.classList.remove('active'));
    document.getElementById('closePreviewModal')?.addEventListener('click', () => document.getElementById('previewModal')?.classList.remove('active'));
</script>
</body>
