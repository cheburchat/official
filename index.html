<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЧЕБУРЧАТ — Социальная сеть</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; transition: background 0.2s, color 0.2s; }
        
        :root {
            --accent: #ff7b2c;
            --accent-hover: #e6691a;
            --card-radius: 20px;
            --card-opacity: 1;
            --shadow-intensity: 0.08;
        }
        
        body[data-theme="default"] {
            --bg-page: #f0f2f5;
            --bg-surface: rgba(255, 255, 255, var(--card-opacity));
            --bg-element: #f0f2f5;
            --text: #1a1a1a;
            --text-secondary: #65676b;
            --border: #e4e6eb;
            --my-msg: #ff7b2c;
            --my-msg-text: white;
            --other-msg: #ffffff;
            --other-msg-text: #1a1a1a;
            --shadow-sm: 0 1px 2px rgba(0,0,0,var(--shadow-intensity));
            --shadow-md: 0 4px 12px rgba(0,0,0,var(--shadow-intensity));
            --shadow-lg: 0 8px 24px rgba(0,0,0,var(--shadow-intensity));
        }
        
        body[data-theme="dark"] {
            --bg-page: #121212;
            --bg-surface: rgba(30, 30, 30, var(--card-opacity));
            --bg-element: #2d2d2d;
            --text: #e4e6eb;
            --text-secondary: #b0b3b8;
            --border: #3a3a3a;
            --my-msg: #ff7b2c;
            --my-msg-text: white;
            --other-msg: #2d2d2d;
            --other-msg-text: #e4e6eb;
            --shadow-sm: 0 1px 2px rgba(0,0,0,var(--shadow-intensity));
            --shadow-md: 0 4px 12px rgba(0,0,0,var(--shadow-intensity));
            --shadow-lg: 0 8px 24px rgba(0,0,0,var(--shadow-intensity));
        }
        
        body[data-theme="glass-light"] {
            --bg-page: linear-gradient(135deg, #e8edf2 0%, #e66bfa 50%, #fbacf3 100%);
            --bg-surface: rgba(255, 255, 255, var(--card-opacity));
            --bg-element: rgba(255, 255, 255, 0.5);
            --text: #2d2d2d;
            --text-secondary: #555555;
            --border: rgba(255, 255, 255, 0.5);
            --my-msg: rgba(255, 123, 44, 0.9);
            --my-msg-text: #1a1a1a;
            --other-msg: rgba(255, 255, 255, 0.6);
            --other-msg-text: #2d2d2d;
            --shadow-sm: 0 4px 12px rgba(0,0,0,var(--shadow-intensity));
            --shadow-md: 0 8px 24px rgba(0,0,0,var(--shadow-intensity));
            --shadow-lg: 0 16px 40px rgba(0,0,0,var(--shadow-intensity));
        }
        
        body[data-theme="glass-dark"] {
            --bg-page: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --bg-surface: rgba(20, 25, 45, var(--card-opacity));
            --bg-element: rgba(30, 35, 55, 0.5);
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.85);
            --border: rgba(255, 255, 255, 0.15);
            --my-msg: rgba(255, 123, 44, 0.9);
            --my-msg-text: white;
            --other-msg: rgba(255, 255, 255, 0.12);
            --other-msg-text: #ffffff;
            --shadow-sm: 0 8px 32px rgba(0,0,0,var(--shadow-intensity));
            --shadow-md: 0 8px 32px rgba(0,0,0,var(--shadow-intensity));
            --shadow-lg: 0 8px 32px rgba(0,0,0,var(--shadow-intensity));
        }
        
        body[data-text-contrast="light"] {
            --text: #1a1a1a !important;
            --text-secondary: #444444 !important;
            --other-msg-text: #1a1a1a !important;
        }
        
        body[data-text-contrast="dark"] {
            --text: #ffffff !important;
            --text-secondary: #cccccc !important;
            --other-msg-text: #ffffff !important;
        }
        
        body[data-disable-hover="true"] * {
            transition: none !important;
            animation: none !important;
        }
        
        body { background: var(--bg-page); color: var(--text); }
        
        .post-card, .chat-item, .person-item, .track-card, .create-post-card {
            background: var(--bg-surface);
        }
        
        body[data-theme="glass-light"] .sidebar,
        body[data-theme="glass-light"] .chats-view,
        body[data-theme="glass-light"] .chat-header,
        body[data-theme="glass-light"] .feed-header,
        body[data-theme="glass-light"] .music-header,
        body[data-theme="glass-light"] .people-view,
        body[data-theme="glass-light"] .settings-view,
        body[data-theme="glass-light"] .admin-view,
        body[data-theme="glass-light"] .mobile-bottom-nav,
        body[data-theme="glass-light"] .input-area,
        body[data-theme="glass-light"] .profile-view,
        body[data-theme="glass-light"] .modal,
        body[data-theme="glass-light"] .message-bubble,
        body[data-theme="glass-dark"] .sidebar,
        body[data-theme="glass-dark"] .chats-view,
        body[data-theme="glass-dark"] .chat-header,
        body[data-theme="glass-dark"] .feed-header,
        body[data-theme="glass-dark"] .music-header,
        body[data-theme="glass-dark"] .people-view,
        body[data-theme="glass-dark"] .settings-view,
        body[data-theme="glass-dark"] .admin-view,
        body[data-theme="glass-dark"] .mobile-bottom-nav,
        body[data-theme="glass-dark"] .input-area,
        body[data-theme="glass-dark"] .profile-view,
        body[data-theme="glass-dark"] .modal,
        body[data-theme="glass-dark"] .message-bubble,
        body[data-theme="glass-light"] .call-container,
        body[data-theme="glass-dark"] .call-container {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: var(--bg-surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }
        
        body[data-theme="glass-light"] .sidebar,
        body[data-theme="glass-dark"] .sidebar {
            backdrop-filter: blur(25px) saturate(180%);
        }
        
        body[data-theme="glass-light"] .sidebar { background: rgba(255, 255, 255, 0.8); }
        body[data-theme="glass-dark"] .sidebar { background: rgba(15, 20, 35, 0.6); }
        
        .logo, .nav-item.active, .nav-item:hover, .create-group-btn, 
        .post-action-btn.liked, .comment-like-btn.liked,
        .action-btn.write, .profile-btn.primary, .input-area button,
        .modal-buttons .confirm, .toggle-auth, .stat:hover,
        .plus-btn:hover, .call-btn, .call-end-btn {
            color: var(--accent);
        }
        
        .create-group-btn, .action-btn.write, .profile-btn.primary, 
        .input-area button, .auth-card button, .official-post-btn,
        .send-btn, .submit-comment-btn, .add-comment button,
        .buy-sticker-btn, .plus-btn, .call-btn, .call-end-btn {
            background: var(--accent);
        }
        
        .create-group-btn:hover, .action-btn.write:hover, .profile-btn.primary:hover,
        .input-area button:hover, .auth-card button:hover,
        .buy-sticker-btn:hover, .plus-btn:hover, .call-btn:hover, .call-end-btn:hover {
            background: var(--accent-hover);
        }
        
        .sidebar, .chats-view, .chat-header, .feed-header, .music-header,
        .people-view, .settings-view, .admin-view, .post-card, .track-card,
        .person-item, .chat-item, .profile-view, .create-post-card,
        .modal, .auth-card, .context-menu, .reactions-modal .modal,
        .stickers-modal .modal, .plus-menu, .call-container {
            border-radius: var(--card-radius);
        }
        
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, #000)); padding: 16px; position: relative; }
        .auth-card { background: var(--bg-surface); padding: 40px 32px; width: 100%; max-width: 420px; text-align: center; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .auth-card h1 { color: var(--accent); margin-bottom: 8px; font-size: 36px; font-weight: 800; }
        .auth-subtitle { color: var(--text-secondary); margin-bottom: 32px; font-size: 14px; }
        .auth-card input { width: 100%; padding: 14px 16px; margin: 8px 0; border: 2px solid var(--border); border-radius: 16px; font-size: 16px; background: var(--bg-element); color: var(--text); transition: 0.2s; }
        .auth-card input:focus { outline: none; border-color: var(--accent); }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 16px; color: white; font-weight: 700; margin-top: 16px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .auth-card button:hover { filter: brightness(0.95); transform: translateY(-1px); }
        .toggle-auth { margin-top: 20px; color: var(--accent); cursor: pointer; font-size: 14px; }
        .verify-msg { background: #fff3cd; color: #856404; padding: 12px; border-radius: 16px; margin: 16px 0; font-size: 14px; }
        .hidden { display: none !important; }
        .app-version { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(255,255,255,0.6); }
        
        .app { display: flex; height: 100vh; background: var(--bg-page); }
        .sidebar { width: 280px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; transition: all 0.2s; }
        .logo { padding: 20px 20px 16px; font-size: 24px; font-weight: 800; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
        .sidebar-section { padding: 8px 0; }
        .nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); font-weight: 500; border-radius: 12px; margin: 4px 8px; transition: all 0.2s; position: relative; }
        .nav-item:hover, .nav-item.active { background: var(--bg-element); color: var(--accent); }
        .nav-item i { width: 24px; font-size: 20px; }
        
        .nav-item.has-submenu { position: relative; }
        .sub-menu { position: absolute; top: 100%; left: 8px; right: 8px; background: var(--bg-surface); border-radius: 12px; box-shadow: var(--shadow-md); border: 1px solid var(--border); z-index: 100; display: none; margin-top: 4px; }
        .sub-menu.show { display: block; }
        .sub-menu .nav-item { padding: 10px 16px; margin: 0; border-radius: 0; }
        .sub-menu .nav-item:first-child { border-radius: 12px 12px 0 0; }
        .sub-menu .nav-item:last-child { border-radius: 0 0 12px 12px; }
        .sub-menu .nav-item:hover { background: var(--bg-element); }
        
        .user-info-sidebar { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar-wrapper { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; }
        .verified-badge { position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; border: 2px solid var(--bg-surface); z-index: 2; }
        .logout-btn { margin: 10px 16px; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .logout-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-page); }
        
        .balance-header {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-element);
            padding: 6px 12px;
            border-radius: 30px;
            margin-right: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
        }
        .balance-header i { font-size: 16px; }
        
        .chats-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); transition: all 0.2s; }
        .chats-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding-top: max(16px, env(safe-area-inset-top)); }
        .chats-header h2 { font-size: 24px; font-weight: 700; color: var(--text); }
        .create-group-btn { border: none; padding: 8px 16px; border-radius: 24px; color: white; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .chats-search { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .chats-search input { width: 100%; padding: 10px 16px; border: none; background: var(--bg-element); border-radius: 24px; font-size: 15px; outline: none; color: var(--text); }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: all 0.2s; margin: 4px 8px; }
        .chat-item:hover { background: var(--bg-element); transform: translateX(4px); }
        .chat-avatar-wrapper { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
        .chat-avatar { width: 100%; height: 100%; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 20px; }
        .group-avatar { background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, #000)); }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 16px; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .verified-icon { color: #3b82f6; font-size: 14px; }
        .chat-last-msg { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
        .empty-chats { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        
        .chat-window { display: flex; flex-direction: column; height: 100%; background: var(--bg-page); }
        .chat-header { padding: 12px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; padding-top: max(12px, env(safe-area-inset-top)); transition: all 0.2s; }
        .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text); transition: 0.2s; }
        .back-btn:hover { background: var(--bg-element); }
        .chat-header-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; position: relative; background: var(--accent); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; }
        .chat-header-info { flex: 1; min-width: 0; }
        .chat-header-name { font-weight: 600; font-size: 17px; color: var(--text); display: flex; align-items: center; gap: 6px; cursor: pointer; flex-wrap: wrap; }
        .chat-header-members { font-size: 12px; color: var(--text-secondary); cursor: pointer; }
        .chat-header-actions { display: flex; gap: 8px; }
        .call-header-btn { background: none; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; color: var(--text); transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .call-header-btn:hover { background: var(--bg-element); color: var(--accent); }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn 0.2s ease; margin-bottom: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.my { align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 18px; word-wrap: break-word; cursor: pointer; background: var(--bg-surface); box-shadow: var(--shadow-sm); transition: all 0.2s; }
        .my .message-bubble { background: var(--my-msg); color: var(--my-msg-text); border-bottom-right-radius: 4px; }
        .other .message-bubble { background: var(--other-msg); color: var(--other-msg-text); border-bottom-left-radius: 4px; }
        .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 4px; margin-left: 6px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; cursor: pointer; flex-wrap: wrap; }
        .sender-avatar { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); background-size: cover; background-position: center; flex-shrink: 0; }
        .message-footer { display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin-top: 4px; margin-right: 6px; }
        .message-time { font-size: 10px; color: var(--text-secondary); }
        .read-status { font-size: 10px; display: flex; align-items: center; gap: 2px; }
        .read-status.read i { color: #34c759; }
        .read-status.delivered i { color: #8e8e8e; }
        
        .media-container { margin: 4px 0; border-radius: 16px; overflow: hidden; max-width: 280px; }
        .message-image { width: 100%; height: auto; max-height: 300px; object-fit: cover; cursor: pointer; border-radius: 16px; }
        .message-video { width: 100%; max-height: 280px; border-radius: 16px; background: #000; outline: none; }
        
        .reactions-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; margin-left: 6px; }
        .reaction-item { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-element); padding: 2px 8px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.1s; border: 1px solid var(--border); }
        .reaction-item:hover { transform: scale(1.05); }
        .reaction-item.my-reaction { background: var(--accent); color: white; border-color: var(--accent); }
        .reaction-emoji { font-size: 14px; }
        .reaction-count { font-size: 11px; font-weight: 500; }
        
        /* Call Container */
        .call-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
        }
        .call-video-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
        .local-video, .remote-video {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            background: #1a1a1a;
        }
        .remote-video { width: 100%; max-width: 600px; }
        .local-video { width: 200px; position: absolute; bottom: 100px; right: 20px; z-index: 2001; }
        .call-controls {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 2002;
        }
        .call-controls button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }
        .call-end-btn { background: #dc3545; color: white; }
        .call-mute-btn { background: var(--bg-element); color: var(--text); }
        .call-video-toggle-btn { background: var(--bg-element); color: var(--text); }
        .call-status {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 18px;
            z-index: 2002;
        }
        
        .context-menu { position: fixed; background: var(--bg-surface); border-radius: 12px; box-shadow: var(--shadow-md); z-index: 1000; min-width: 180px; overflow: hidden; border: 1px solid var(--border); display: none; }
        .context-menu.active { display: block; }
        .context-menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.1s; color: var(--text); }
        .context-menu-item:hover { background: var(--bg-element); }
        .context-menu-item.delete { color: #dc3545; }
        
        .reactions-modal .modal { max-width: 350px; }
        .reactions-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; padding: 16px; }
        .reaction-option { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px; cursor: pointer; border-radius: 16px; transition: 0.1s; min-width: 60px; }
        .reaction-option:hover { background: var(--bg-element); transform: scale(1.05); }
        .reaction-emoji-big { font-size: 32px; }
        .reaction-name { font-size: 12px; color: var(--text-secondary); }
        
        .plus-menu {
            position: fixed;
            bottom: 80px;
            right: 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow: hidden;
            min-width: 160px;
        }
        .plus-menu.show { display: flex; }
        .plus-menu-item {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            color: var(--text);
            transition: 0.1s;
        }
        .plus-menu-item:hover { background: var(--bg-element); }
        .plus-menu-item i { width: 22px; font-size: 18px; color: var(--accent); }
        
        .stickers-modal .modal { max-width: 500px; width: 90%; }
        .stickers-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; max-height: 400px; overflow-y: auto; }
        .sticker-item { cursor: pointer; transition: 0.2s; border-radius: 16px; padding: 8px; background: var(--bg-element); text-align: center; }
        .sticker-item:hover { transform: scale(1.05); background: var(--accent); }

<script>

	// ========== WEBRTC ЗВОНКИ (ИСПРАВЛЕННЫЕ) ==========
	let peerConnection = null;

	let callActive = false;
	let currentCallUserId = null;

	let callListenerUnsubscribe = null;
	let pendingCandidates = [];

	const configuration = {
		iceServers: [
			{ urls: 'stun:stun.l.google.com:19302' },
			{ urls: 'stun:stun1.l.google.com:19302' },

		],
		iceCandidatePoolSize: 10
	};

	// Проверка наличия медиа-устройств
	async function hasMediaDevices() {
		try {
			const devices = await navigator.mediaDevices.enumerateDevices();
			const hasAudio = devices.some(d => d.kind === 'audioinput');
			const hasVideo = devices.some(d => d.kind === 'videoinput');
			return { hasAudio, hasVideo };
		} catch {
			return { hasAudio: false, hasVideo: false };
		}
	}

	async function startCall(targetUserId, preferVideo = true) {
		if (callActive) {
			showModal('Ошибка', 'У вас уже активен звонок');
			return;
		}
		
		// Проверяем наличие устройств
		const { hasAudio, hasVideo } = await hasMediaDevices();
		if (!hasAudio) {
			showModal('Ошибка', 'Не найден микрофон. Звонок невозможен.');
			return;
		}
		
		const useVideo = preferVideo && hasVideo;
		
		currentCallUserId = targetUserId;
		
		try {
			// Запрашиваем доступ к медиа
			const constraints = { audio: true, video: useVideo };
			localStream = await navigator.mediaDevices.getUserMedia(constraints);
			
			peerConnection = new RTCPeerConnection(configuration);
			pendingCandidates = [];
			
			// Добавляем треки
			localStream.getTracks().forEach(track => {
				peerConnection.addTrack(track, localStream);
			});
			
			// Обработка входящих треков
			peerConnection.ontrack = (event) => {
				if (!remoteStream) {
					remoteStream = new MediaStream();
				}
				remoteStream.addTrack(event.track);
				showCallUI(true, useVideo);
				const remoteVideo = document.getElementById('remoteVideo');
				if (remoteVideo && remoteStream) {
					remoteVideo.srcObject = remoteStream;
				}
			};
			
			// ICE кандидаты — отправляем сразу, как появляются
			peerConnection.onicecandidate = (event) => {
				if (event.candidate) {
					sendCallSignal(targetUserId, 'candidate', { candidate: event.candidate });
				}
			};
			
			// Отслеживаем состояние ICE
			peerConnection.oniceconnectionstatechange = () => {
				console.log('ICE connection state:', peerConnection.iceConnectionState);
				if (peerConnection.iceConnectionState === 'connected' || 
					peerConnection.iceConnectionState === 'completed') {
					callActive = true;
					const statusEl = document.getElementById('callStatus');
					if (statusEl) statusEl.textContent = 'В звонке...';
				} else if (peerConnection.iceConnectionState === 'failed' ||
						   peerConnection.iceConnectionState === 'disconnected') {
					console.log('ICE failed, retrying...');
					// Пробуем переподключиться
					if (peerConnection && peerConnection.iceConnectionState === 'failed') {
						peerConnection.restartIce();
					}
				}
			};
			
			peerConnection.onconnectionstatechange = () => {
				console.log('Connection state:', peerConnection.connectionState);
				if (peerConnection.connectionState === 'disconnected' || 
					peerConnection.connectionState === 'failed' ||
					peerConnection.connectionState === 'closed') {
					if (callActive) {
						showModal('Звонок', 'Соединение разорвано');
						endCall();
					}
				}
			};
			
			// Создаём оффер
			const offer = await peerConnection.createOffer();
			await peerConnection.setLocalDescription(offer);
			
			// Отправляем оффер
			await sendCallSignal(targetUserId, 'offer', { sdp: offer });
			
			showModal('Звонок', 'Вызов...');
			
		} catch (error) {
			console.error('Start call error:', error);
			let errorMsg = 'Не удалось начать звонок: ';
			if (error.name === 'NotFoundError') errorMsg += 'Не найден микрофон или камера';
			else if (error.name === 'NotAllowedError') errorMsg += 'Нет доступа к микрофону/камере';
			else errorMsg += error.message;
			showModal('Ошибка', errorMsg);
			endCall();
		}
	}

	async function acceptCall(offerData, fromUserId, callId) {
		if (callActive) {
			await rejectCall(fromUserId);
			return;
		}
		
		// Проверяем, не завершён ли уже звонок
		const callDoc = await db.collection('calls').doc(callId).get();
		if (!callDoc.exists || callDoc.data().status !== 'pending') {
			showModal('Ошибка', 'Звонок уже неактивен');
			return;
		}
		
		// Проверяем наличие устройств
		const { hasAudio, hasVideo } = await hasMediaDevices();
		if (!hasAudio) {
			showModal('Ошибка', 'Не найден микрофон. Невозможно принять звонок.');
			return;
		}
		
		currentCallUserId = fromUserId;
		callOfferDocId = callId;
		
		try {
			const constraints = { audio: true, video: hasVideo };
			localStream = await navigator.mediaDevices.getUserMedia(constraints);
			
			peerConnection = new RTCPeerConnection(configuration);
			pendingCandidates = [];
			
			localStream.getTracks().forEach(track => {
				peerConnection.addTrack(track, localStream);
			});
			
			peerConnection.ontrack = (event) => {
				if (!remoteStream) {
					remoteStream = new MediaStream();
				}
				remoteStream.addTrack(event.track);
				showCallUI(true, hasVideo);
				const remoteVideo = document.getElementById('remoteVideo');
				if (remoteVideo && remoteStream) {
					remoteVideo.srcObject = remoteStream;
				}
			};
			
			peerConnection.onicecandidate = (event) => {
				if (event.candidate) {
					sendCallSignal(fromUserId, 'candidate', { candidate: event.candidate });
				}
			};
			
			peerConnection.oniceconnectionstatechange = () => {
				console.log('ICE connection state (answer):', peerConnection.iceConnectionState);
				if (peerConnection.iceConnectionState === 'connected' || 
					peerConnection.iceConnectionState === 'completed') {
					callActive = true;
					const statusEl = document.getElementById('callStatus');
					if (statusEl) statusEl.textContent = 'В звонке...';
				}
			};
			
			peerConnection.onconnectionstatechange = () => {
				console.log('Connection state (answer):', peerConnection.connectionState);
				if (peerConnection.connectionState === 'disconnected' || 
					peerConnection.connectionState === 'failed') {
					if (callActive) {
						showModal('Звонок', 'Соединение разорвано');
						endCall();
					}
				}
			};
			
			await peerConnection.setRemoteDescription(new RTCSessionDescription(offerData.sdp));
			const answer = await peerConnection.createAnswer();
			await peerConnection.setLocalDescription(answer);
			
			await sendCallSignal(fromUserId, 'answer', { sdp: answer });
			await updateCallDocStatus(callId, 'active');
			
			// Обрабатываем накопленные кандидаты
			for (const candidate of pendingCandidates) {
				try {
					await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
				} catch (e) {
					console.log('Error adding pending candidate:', e);
				}
			}
			pendingCandidates = [];
			
		} catch (error) {
			console.error('Accept call error:', error);
			showModal('Ошибка', 'Не удалось принять звонок: ' + error.message);
			endCall();
		}
	}

	async function sendCallSignal(targetUserId, type, data) {
		const callData = {
			from: currentUser.uid,
			to: targetUserId,
			type: type,
			data: data,
			timestamp: firebase.firestore.FieldValue.serverTimestamp(),
			status: type === 'reject' ? 'rejected' : 'pending'
		};
		
		if (type === 'offer') {
			const docRef = await db.collection('calls').add(callData);
			callOfferDocId = docRef.id;
			// Таймаут на ожидание ответа
			setTimeout(async () => {
				const doc = await db.collection('calls').doc(docRef.id).get();
				if (doc.exists && doc.data().status === 'pending') {
					await db.collection('calls').doc(docRef.id).update({ status: 'timeout' });
					if (callOfferDocId === docRef.id && !callActive) {
						showModal('Звонок', 'Собеседник не ответил');
						endCall();
					}
				}
			}, 45000);
		} else {
			await db.collection('calls').add(callData);
		}
	}

	async function updateCallDocStatus(callId, status) {
		if (callId) {
			await db.collection('calls').doc(callId).update({ status: status });
		}
	}

	async function rejectCall(targetUserId) {
		await sendCallSignal(targetUserId, 'reject', {});
		endCall();
	}

	function showCallUI(show, hasVideo) {
		const callContainer = document.getElementById('callContainer');
		if (show) {
			if (!callContainer) {
				const container = document.createElement('div');
				container.id = 'callContainer';
				container.className = 'call-container';
				container.innerHTML = `
					<div class="call-status" id="callStatus">Установка соединения...</div>
					<div class="call-video-container">
						<video id="remoteVideo" class="remote-video" autoplay playsinline></video>
						<video id="localVideo" class="local-video" autoplay playsinline muted></video>
					</div>
					<div class="call-controls">
						<button class="call-mute-btn" id="callMuteBtn"><i class="fas fa-microphone"></i></button>
						${hasVideo ? '<button class="call-video-toggle-btn" id="callVideoToggleBtn"><i class="fas fa-video"></i></button>' : ''}
						<button class="call-end-btn" id="callEndBtn"><i class="fas fa-phone-slash"></i></button>
					</div>
				`;
				document.body.appendChild(container);
				
				document.getElementById('callMuteBtn').onclick = () => toggleMute();
				const videoBtn = document.getElementById('callVideoToggleBtn');
				if (videoBtn) videoBtn.onclick = () => toggleVideo();
				document.getElementById('callEndBtn').onclick = () => endCall();
			}
			if (localStream) {
				const localVideo = document.getElementById('localVideo');
				if (localVideo) localVideo.srcObject = localStream;
			}
			const container = document.getElementById('callContainer');
			if (container) container.style.display = 'flex';
		} else {
			if (callContainer) callContainer.remove();
		}
	}

	function toggleMute() {
		if (localStream) {
			const audioTrack = localStream.getAudioTracks()[0];
			if (audioTrack) {
				audioTrack.enabled = !audioTrack.enabled;
				const btn = document.getElementById('callMuteBtn');
				if (btn) {
					btn.innerHTML = audioTrack.enabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
				}
			}
		}
	}

	function toggleVideo() {
		if (localStream) {
			const videoTrack = localStream.getVideoTracks()[0];
			if (videoTrack) {
				videoTrack.enabled = !videoTrack.enabled;
				const btn = document.getElementById('callVideoToggleBtn');
				if (btn) {
					btn.innerHTML = videoTrack.enabled ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
				}
			}
		}
	}

	async function endCall() {
		callActive = false;
		
		if (peerConnection) {
			peerConnection.close();
			peerConnection = null;
		}
		
		if (localStream) {
			localStream.getTracks().forEach(track => track.stop());
			localStream = null;
		}
		
		remoteStream = null;
		pendingCandidates = [];
		
		if (callOfferDocId) {
			await db.collection('calls').doc(callOfferDocId).update({ status: 'ended' }).catch(() => {});
			callOfferDocId = null;
		}
		
		currentCallUserId = null;
		showCallUI(false);
	}

	function listenForCalls() {
		if (callListenerUnsubscribe) callListenerUnsubscribe();
		
		callListenerUnsubscribe = db.collection('calls')
			.where('to', '==', currentUser.uid)
			.where('status', '==', 'pending')
			.orderBy('timestamp', 'desc')
			.onSnapshot((snapshot) => {
				snapshot.docChanges().forEach((change) => {
					if (change.type === 'added') {
						const call = change.doc.data();
						const callId = change.doc.id;
						
						// Игнорируем звонки от самого себя или если уже в звонке
						if (call.from === currentUser.uid || callActive) return;
						
						// Игнорируем уже обработанные
						const processed = sessionStorage.getItem('processed_calls') || '[]';
						const processedCalls = JSON.parse(processed);
						if (processedCalls.includes(callId)) return;
						
						if (call.type === 'offer') {
							processedCalls.push(callId);
							sessionStorage.setItem('processed_calls', JSON.stringify(processedCalls));
							showIncomingCallUI(callId, call.from, call.data);
						} else if (call.type === 'answer' && callActive && currentCallUserId === call.from) {
							handleAnswer(call.data);
						} else if (call.type === 'candidate' && peerConnection) {
							handleCandidate(call.data);
						} else if (call.type === 'candidate' && !peerConnection) {
							// Сохраняем кандидаты, если соединение ещё не создано
							pendingCandidates.push(call.data.candidate);
						} else if (call.type === 'reject') {
							showModal('Звонок', 'Собеседник отклонил вызов');
							endCall();
						}
					}
				});
			});
	}

	function showIncomingCallUI(callId, fromUserId, offerData) {
		// Не показываем, если уже в звонке
		if (callActive) return;
		
		const processedCalls = JSON.parse(sessionStorage.getItem('incoming_calls') || '[]');
		if (processedCalls.includes(callId)) return;
		processedCalls.push(callId);
		sessionStorage.setItem('incoming_calls', JSON.stringify(processedCalls));
		
		// Удаляем из хранилища через минуту
		setTimeout(() => {
			const updated = JSON.parse(sessionStorage.getItem('incoming_calls') || '[]');
			const idx = updated.indexOf(callId);
			if (idx !== -1) updated.splice(idx, 1);
			sessionStorage.setItem('incoming_calls', JSON.stringify(updated));
		}, 60000);

					<button id="rejectCallBtn" style="background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;">Отклонить</button>
				</div>
			</div>
		`;
		const confirmBtn = document.getElementById('modalConfirm');
		confirmBtn.style.display = 'none';
		
		const acceptBtn = document.getElementById('acceptCallBtn');
		const rejectBtn = document.getElementById('rejectCallBtn');
		
		// Удаляем старые обработчики
		const newAcceptBtn = acceptBtn.cloneNode(true);
		const newRejectBtn = rejectBtn.cloneNode(true);
		acceptBtn.parentNode.replaceChild(newAcceptBtn, acceptBtn);
		rejectBtn.parentNode.replaceChild(newRejectBtn, rejectBtn);
		
		newAcceptBtn.onclick = () => {
			modal.classList.remove('active');
			acceptCall(offerData, fromUserId, callId);
		};
		newRejectBtn.onclick = () => {
			modal.classList.remove('active');
			rejectCall(fromUserId);
		};
		
		modal.classList.add('active');
	}

	async function handleAnswer(data) {
		if (peerConnection && data.sdp) {
			await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
		}
	}

	async function handleCandidate(data) {
		if (peerConnection && data.candidate) {
			try {
				await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
			} catch (e) {
				console.error('Error adding ICE candidate:', e);
			}
		}
	}

	// Очистка старых звонков
	async function cleanupOldCalls() {
		const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000);
		const oldCalls = await db.collection('calls')
			.where('timestamp', '<', oneHourAgo)
			.get();
		const batch = db.batch();
		oldCalls.forEach(doc => batch.delete(doc.ref));
		await batch.commit();
	}

    async function addCoins(userId, amount) {
        const userRef = db.collection('users').doc(userId);
        await userRef.update({
            balance: firebase.firestore.FieldValue.increment(amount)
        });
        if (userId === currentUser?.uid && userData) {
            userData.balance = (userData.balance || 0) + amount;
            updateBalanceDisplay();
        }
    }
    
    async function removeCoins(userId, amount) {
        const userRef = db.collection('users').doc(userId);
        await userRef.update({
            balance: firebase.firestore.FieldValue.increment(-amount)
        });
        if (userId === currentUser?.uid && userData) {
            userData.balance = (userData.balance || 0) - amount;
            updateBalanceDisplay();
        }
    }

    async function purchaseStickerPack(packId) {
        const pack = STICKER_PACKS[packId];
        if (!pack) return false;
        if ((userData?.balance || 0) < pack.price) {
            showModal('Ошибка', `Недостаточно монет! Нужно ${pack.price} 🪙`);
            return false;
        }
        const currentPacks = userData?.stickers || [];
        if (currentPacks.includes(packId)) {
            showModal('Ошибка', 'У вас уже есть этот набор стикеров!');
            return false;
        }
        await removeCoins(currentUser.uid, pack.price);
        await db.collection('users').doc(currentUser.uid).update({
            stickers: firebase.firestore.FieldValue.arrayUnion(packId)
        });
        userData.stickers = [...(userData.stickers || []), packId];
        showModal('Успех', `Вы купили набор стикеров "${pack.name}" за ${pack.price} 🪙!`);
        return true;
    }

            return;

        };

        scrollToBottom();
        loadChatsList();

    function showReactionsModal(messageId) {
        const modal = document.getElementById('reactionsModal');
        modal.classList.add('active');
        document.querySelectorAll('#reactionsModal .reaction-option').forEach(el => {
            el.onclick = () => { addReaction(messageId, el.dataset.reaction); modal.classList.remove('active'); };
        });
        document.getElementById('closeReactionsModal').onclick = () => modal.classList.remove('active');

    async function addReaction(messageId, reaction) {
        if (!messageId || !reaction) return;
        const messageRef = db.collection('messages').doc(messageId);
        const messageDoc = await messageRef.get();
        if (!messageDoc.exists) return;
        const reactions = messageDoc.data().reactions || {};
        const userId = currentUser.uid;
        if (reactions[userId] === reaction) delete reactions[userId];
        else reactions[userId] = reaction;
        await messageRef.update({ reactions: reactions });
        hideContextMenu();
    }

        showModal('Подтверждение', 'Удалить это сообщение?', async () => {
            try { await db.collection('messages').doc(messageId).delete(); showModal('Успех', 'Сообщение удалено'); } 
            catch(e) { showModal('Ошибка', e.message); }
        });
        hideContextMenu();
    }

    function showContextMenu(e, messageId, isMyMessage) {
        e.preventDefault();
        e.stopPropagation();
        if (isMobile) {
            const mobileMenu = document.getElementById('mobileContextMenu');
            const overlay = document.getElementById('mobileContextOverlay');
            const deleteBtn = document.getElementById('mobileDeleteBtn');
            const reactionBtn = document.getElementById('mobileReactionBtn');
            deleteBtn.style.display = isMyMessage ? 'flex' : 'none';
            reactionBtn.style.display = 'flex';
            reactionBtn.onclick = () => { hideContextMenu(); showReactionsModal(messageId); };
            deleteBtn.onclick = () => { if (isMyMessage) deleteMessage(messageId); hideContextMenu(); };
            overlay.onclick = hideContextMenu;
            overlay.classList.add('active');
            mobileMenu.classList.add('active');
        } else {
            let menu = document.getElementById('contextMenu');
            if (!menu) {
                menu = document.createElement('div');
                menu.id = 'contextMenu';
                menu.className = 'context-menu';
                menu.innerHTML = `<div id="contextReactionItem" class="context-menu-item"><i class="fas fa-smile"></i> Реакция</div><div id="contextDeleteItem" class="context-menu-item delete"><i class="fas fa-trash"></i> Удалить</div>`;
                document.body.appendChild(menu);
            }
            const deleteItem = document.getElementById('contextDeleteItem');
            const reactionItem = document.getElementById('contextReactionItem');
            deleteItem.style.display = isMyMessage ? 'flex' : 'none';
            let x = e.clientX, y = e.clientY;
            if (x + 180 > window.innerWidth) x = window.innerWidth - 190;
            if (y + 80 > window.innerHeight) y = window.innerHeight - 90;
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            menu.classList.add('active');
            reactionItem.onclick = () => { menu.classList.remove('active'); showReactionsModal(messageId); };
            deleteItem.onclick = () => { if (isMyMessage) deleteMessage(messageId); hideContextMenu(); };
        }
    }

    function uploadAvatar(file) {
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        formData.append('folder', 'avatars');
        showModal('Загрузка', 'Обновление аватарки...');
        fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.secure_url) {
                    db.collection('users').doc(currentUser.uid).update({ avatarUrl: data.secure_url }).then(() => {
                        userData.avatarUrl = data.secure_url;
                        showModal('Успех', 'Аватарка обновлена!');
                        if (currentView === 'profile') showProfileView(viewedProfileUserId);
                        else if (currentView === 'chats') showChatsView();
                        else if (currentView === 'people') showPeopleView();
                        else if (currentView === 'feed') showFeedView();
                        else if (currentView === 'music') showMusicView();
                    }).catch(err => showModal('Ошибка', err.message));
                } else showModal('Ошибка', data.error?.message || 'Ошибка загрузки');
            }).catch(err => showModal('Ошибка', err.message));
    }

    function changeAvatar() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => { const file = e.target.files?.[0]; if (file) uploadAvatar(file); };
        input.click();
    }

    // ========== МУЗЫКА ==========
    async function loadTracks() {
        const snapshot = await db.collection('tracks').orderBy('createdAt', 'desc').get();
        const tracks = [];
        snapshot.forEach(doc => tracks.push({ id: doc.id, ...doc.data() }));
        return tracks;
    }

    async function addTrack(artist, title, file) {
        if (!artist || !title || !file) return;
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        formData.append('folder', 'music');
        formData.append('resource_type', 'auto');
        showModal('Загрузка', 'Загрузка трека...');
        fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.secure_url) {
                    db.collection('tracks').add({
                        artist: artist.trim(),
                        title: title.trim(),
                        url: data.secure_url,
                        addedBy: currentUser.uid,
                        createdAt: new Date().toISOString()
                    }).then(() => {
                        showModal('Успех', 'Трек добавлен!');
                        if (currentView === 'music') showMusicView();
                        if (currentView === 'admin') loadAdminTracks();
                    });
                } else showModal('Ошибка', data.error?.message || 'Ошибка загрузки');
            }).catch(err => showModal('Ошибка', err.message));
    }

            try {
                await db.collection('tracks').doc(trackId).delete();
                showModal('Успех', 'Трек удалён');
                if (currentView === 'music') showMusicView();
                if (currentView === 'admin') loadAdminTracks();

    async function showMusicView() {
        currentView = 'music';
        if (isMobile) { const bn = document.querySelector('.mobile-bottom-nav'); if(bn) bn.classList.remove('hidden'); }
        const tracks = await loadTracks();
        let tracksHtml = '<div class="music-list">';
        if (tracks.length === 0) tracksHtml += '<div class="track-card" style="text-align: center; padding: 40px;"><i class="fas fa-music" style="font-size: 48px; opacity: 0.5; margin-bottom: 16px;"></i><p>Нет треков</p></div>';
        for (const track of tracks) {
            tracksHtml += `<div class="track-card"><div class="track-info"><div class="track-title">${escapeHtml(track.title)}</div><div class="track-artist">${escapeHtml(track.artist)}</div></div><div class="track-player"><audio controls src="${track.url}" preload="metadata"></audio></div></div>`;

    // ========== ПОСТЫ С МОНЕТАМИ ==========
    async function createPost(text, isOfficial = false) {
        if (!text.trim()) return;
        await db.collection('posts').add({
            userId: isOfficial ? 'official' : currentUser.uid,
            userName: isOfficial ? 'ЧЕБУРЧАТ' : `${userData.firstName} ${userData.lastName}`,
            userAvatar: isOfficial ? null : (userData.avatarUrl || null),
            userVerified: isOfficial ? true : (userData.isVerified || false),
            isOfficial: isOfficial,
            text: text.trim(),
            likes: [],
            comments: [],
            createdAt: new Date().toISOString()
        });
        showModal('Успех', isOfficial ? 'Официальный пост опубликован!' : 'Запись опубликована!');
        if (currentView === 'profile') showProfileView(viewedProfileUserId);
        else if (currentView === 'feed') showFeedView();
        else if (currentView === 'admin') loadAdminStats();
    }

    async function deletePost(postId, postUserId) {
        if (postUserId !== currentUser.uid && !isAdmin) return;
        showModal('Подтверждение', 'Удалить этот пост?', async () => {
            try { await db.collection('posts').doc(postId).delete(); showModal('Успех', 'Пост удалён'); if (currentView === 'profile') showProfileView(viewedProfileUserId); else if (currentView === 'feed') showFeedView(); } catch(e) { showModal('Ошибка', e.message); }
        });
    }

    async function toggleLike(postId) {
        const postRef = db.collection('posts').doc(postId);
        const post = (await postRef.get()).data();
        const likes = post.likes || [];
        if (likes.includes(currentUser.uid)) {
            await postRef.update({ likes: firebase.firestore.FieldValue.arrayRemove(currentUser.uid) });
        } else {
            await postRef.update({ likes: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
            await addCoins(currentUser.uid, 1);
        }
        if (currentView === 'profile') showProfileView(viewedProfileUserId);
        else if (currentView === 'feed') showFeedView();
    }

    async function toggleCommentLike(postId, commentId) {
        const postRef = db.collection('posts').doc(postId);
        const post = (await postRef.get()).data();
        const comments = post.comments || [];
        const commentIndex = comments.findIndex(c => c.id === commentId);
        if (commentIndex !== -1) {
            const comment = comments[commentIndex];
            const likes = comment.likes || [];
            if (likes.includes(currentUser.uid)) {
                comment.likes = likes.filter(id => id !== currentUser.uid);
            } else {
                comment.likes = [...likes, currentUser.uid];
                await addCoins(currentUser.uid, 1);
            }
            comments[commentIndex] = comment;
            await postRef.update({ comments: comments });
        }
        if (currentView === 'profile') showProfileView(viewedProfileUserId);
        else if (currentView === 'feed') showFeedView();
    }

    async function addComment(postId, text) {
        if (!text.trim()) return;
        const comment = {
            id: Date.now().toString(),
            userId: currentUser.uid,
            userName: `${userData.firstName} ${userData.lastName}`,
            userAvatar: userData.avatarUrl || null,
            userVerified: userData.isVerified || false,
            text: text.trim(),
            likes: [],
            createdAt: new Date().toISOString()
        };
        await db.collection('posts').doc(postId).update({
            comments: firebase.firestore.FieldValue.arrayUnion(comment)
        });
        await addCoins(currentUser.uid, 1);
        if (currentView === 'profile') showProfileView(viewedProfileUserId);
        else if (currentView === 'feed') showFeedView();
    }

    async function loadPosts(userId = null) {
        let query = db.collection('posts').orderBy('createdAt', 'desc');
        if (userId) query = query.where('userId', '==', userId);
        const snapshot = await query.get();
        const posts = [];
        snapshot.forEach(doc => posts.push({ id: doc.id, ...doc.data() }));
        return posts;
    }

    // ========== ЧАТЫ С МОНЕТАМИ И ЗВОНКАМИ ==========
    async function loadChatsList() {
        if(!currentUser) return;
        try {
            const allMessages = await db.collection('messages').where('userId', '==', currentUser.uid).get();
            const messagesTo = await db.collection('messages').where('toUserId', '==', currentUser.uid).get();
            const chatUsers = new Map();
            allMessages.forEach(doc => { const msg = doc.data(); if(msg.toUserId && msg.toUserId !== currentUser.uid && msg.chatType !== 'group') chatUsers.set(msg.toUserId, { lastMsg: msg.text || msg.isSticker ? '📸 Стикер' : '📎 Медиа', lastTime: msg.timestamp }); });
            messagesTo.forEach(doc => { const msg = doc.data(); if(msg.userId && msg.userId !== currentUser.uid && msg.chatType !== 'group') { const existing = chatUsers.get(msg.userId); if(!existing || (msg.timestamp && existing.lastTime?.toDate?.() < msg.timestamp.toDate())) chatUsers.set(msg.userId, { lastMsg: msg.text || msg.isSticker ? '📸 Стикер' : '📎 Медиа', lastTime: msg.timestamp }); } });
            const friendIds = userData.friends || [];
            for(const id of friendIds) { if(!chatUsers.has(id)) { const userDoc = await db.collection('users').doc(id).get(); if(userDoc.exists) chatUsers.set(id, { lastMsg: 'Напишите первым', lastTime: null }); } }
            const privateChats = [];
            for(const [id, data] of chatUsers) {
                const userDoc = await db.collection('users').doc(id).get();
                if(userDoc.exists) { const u = userDoc.data(); privateChats.push({ type: 'private', id, firstName: u.firstName, lastName: u.lastName, avatarUrl: u.avatarUrl || null, isVerified: u.isVerified || false, lastMsg: data.lastMsg || 'Напишите первым', lastTime: data.lastTime, unreadCount: 0 }); }
            }
            const groupsSnapshot = await db.collection('groups').where('members', 'array-contains', currentUser.uid).get();
            const groupChats = [];
            for(const doc of groupsSnapshot.docs) {
                const group = doc.data();
                const lastMsgSnapshot = await db.collection('messages').where('groupId', '==', doc.id).orderBy('timestamp', 'desc').limit(1).get();
                let lastMsg = 'Нет сообщений', lastTime = null;
                if(!lastMsgSnapshot.empty) { const lastMsgData = lastMsgSnapshot.docs[0].data(); lastMsg = lastMsgData.text || lastMsgData.isSticker ? '📸 Стикер' : '📎 Медиа'; lastTime = lastMsgData.timestamp?.toDate?.() || null; }
                groupChats.push({ type: 'group', id: doc.id, name: group.name, members: group.members, createdBy: group.createdBy, lastMsg, lastTime });
            }
            groupChats.sort((a,b) => (b.lastTime?.getTime?.() || 0) - (a.lastTime?.getTime?.() || 0));
            privateChats.sort((a,b) => (b.lastTime?.toDate?.()?.getTime() || 0) - (a.lastTime?.toDate?.()?.getTime() || 0));
            chatsList = { private: privateChats, groups: groupChats };
            renderChatsList();
        } catch(e) { console.error(e); }
    }

        if (isGroup && document.getElementById('groupManageBtn')) document.getElementById('groupManageBtn').onclick = showGroupManage;
        if (!isGroup) { 
            const nameEl = document.querySelector('.chat-header-name'); 
            if (nameEl) nameEl.style.cursor = 'pointer'; 
            nameEl?.addEventListener('click', () => showProfileView(chat.id));
            const callBtn = document.getElementById('callBtn');
            if (callBtn) callBtn.onclick = () => startCall(chat.id, true);
        }
        document.getElementById('sendBtn').onclick = sendTextMessage;
        document.getElementById('plusBtn').onclick = showPlusMenu;
        document.getElementById('plusMenuAttach').onclick = () => { hidePlusMenu(); openFilePicker(); };
        document.getElementById('plusMenuStickers').onclick = () => { hidePlusMenu(); showMyStickersModal(); };
        document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendTextMessage(); };
        loadMessages();
        setTimeout(() => { const ma = document.getElementById('messagesArea'); if(ma) ma.scrollTop = ma.scrollHeight; }, 100);
    }

    async function sendTextMessage() {
        const input = document.getElementById('messageInput');
        if(!input || !currentChat) return;
        const text = input.value.trim();
        if(!text) return;
        input.value = '';
        const messageData = { text: text, mediaUrl: null, userId: currentUser.uid, userName: `${userData.firstName} ${userData.lastName}`, userAvatar: userData.avatarUrl || null, timestamp: firebase.firestore.FieldValue.serverTimestamp(), chatType: currentChat.type, reactions: {} };
        if (currentChat.type === 'private') { messageData.read = false; messageData.chatId = getChatId(currentUser.uid, currentChat.id); messageData.toUserId = currentChat.id; }
        else { messageData.groupId = currentChat.id; await db.collection('groups').doc(currentChat.id).update({ lastMsg: text, lastTime: new Date().toISOString() }).catch(() => {}); }
        await db.collection('messages').add(messageData);
        await addCoins(currentUser.uid, 1);
        scrollToBottom();
        loadChatsList();
    }

    async function markMessagesAsRead(chat) {
        if (!currentUser || chat.type !== 'private') return;
        const chatId = getChatId(currentUser.uid, chat.id);
        const query = db.collection('messages').where('chatId', '==', chatId).where('userId', '!=', currentUser.uid).where('read', '==', false);
        const snapshot = await query.get();
        const batch = db.batch();
        snapshot.forEach(doc => batch.update(doc.ref, { read: true }));
        await batch.commit();
    }

    function loadMessages() {
        if(messagesUnsubscribe) messagesUnsubscribe();
        if(!currentChat) return;
        let query;
        if (currentChat.type === 'private') query = db.collection('messages').where('chatId', '==', getChatId(currentUser.uid, currentChat.id));
        else query = db.collection('messages').where('groupId', '==', currentChat.id);
        messagesUnsubscribe = query.orderBy('timestamp', 'asc').onSnapshot(async (snapshot) => {
            const container = document.getElementById('messagesArea');
            if(!container) return;
            container.innerHTML = '';
            if (currentChat.type === 'private') await markMessagesAsRead(currentChat);
            snapshot.forEach(doc => {
                const msg = doc.data();
                const msgId = doc.id;
                const isMy = msg.userId === currentUser.uid;
                const ts = msg.timestamp?.toDate?.() || new Date();
                const reactions = msg.reactions || {};
                let mediaHtml = '';
                if (msg.mediaUrl) {
                    if (msg.isSticker) {
                        mediaHtml = `<div class="media-container"><img src="${msg.mediaUrl}" class="message-image" style="max-width: 150px; background: transparent;" onclick="window.open('${msg.mediaUrl}', '_blank')" loading="lazy"></div>`;
                    } else if (msg.mediaType === 'image') {
                        mediaHtml = `<div class="media-container"><img src="${msg.mediaUrl}" class="message-image" onclick="window.open('${msg.mediaUrl}', '_blank')" loading="lazy"></div>`;
                    } else if (msg.mediaType === 'video') {
                        mediaHtml = `<div class="media-container"><video src="${msg.mediaUrl}" class="message-video" controls preload="metadata" playsinline></video></div>`;
                    }
                }
                const reactionGroups = {};
                Object.values(reactions).forEach(r => { reactionGroups[r] = (reactionGroups[r] || 0) + 1; });
                const myReactionValue = reactions[currentUser.uid];
                let reactionsHtml = '';
                if (Object.keys(reactionGroups).length > 0) {
                    reactionsHtml = '<div class="reactions-bar">';
                    for (const [emoji, count] of Object.entries(reactionGroups)) reactionsHtml += `<div class="reaction-item ${myReactionValue === emoji ? 'my-reaction' : ''}" data-msg="${msgId}" data-reaction="${emoji}"><span class="reaction-emoji">${emoji}</span>${count > 1 ? `<span class="reaction-count">${count}</span>` : ''}</div>`;
                    reactionsHtml += '</div>';
                }
                let readStatusHtml = '';
                if (isMy && currentChat.type === 'private') readStatusHtml = msg.read ? `<span class="read-status read"><i class="fas fa-check-double"></i></span>` : `<span class="read-status delivered"><i class="fas fa-check"></i></span>`;
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isMy ? 'my' : 'other'}`;
                messageDiv.innerHTML = `${!isMy ? `<div class="message-sender" data-user-id="${msg.userId}"><div class="sender-avatar" style="background-image: url('${msg.userAvatar || ''}'); background-size: cover; background-position: center; ${!msg.userAvatar ? 'background: var(--accent); display: flex; align-items: center; justify-content: center;' : ''}">${!msg.userAvatar ? getInitials(msg.userName?.split(' ')[0], msg.userName?.split(' ')[1] || '') : ''}</div>${escapeHtml(msg.userName || 'Пользователь')}</div>` : ''}${mediaHtml}${msg.text ? `<div class="message-bubble">${escapeHtml(msg.text)}</div>` : ''}<div class="message-footer"><span class="message-time">${ts.toLocaleDateString()} в ${ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>${readStatusHtml}</div>${reactionsHtml}`;
                messageDiv.querySelectorAll('.reaction-item').forEach(el => { el.onclick = (e) => { e.stopPropagation(); addReaction(el.dataset.msg, el.dataset.reaction); }; });
                const clickableElement = messageDiv.querySelector('.message-bubble') || messageDiv.querySelector('.media-container');
                if (clickableElement) {
                    clickableElement.addEventListener('contextmenu', (e) => { e.preventDefault(); showContextMenu(e, msgId, isMy); });
                    let lastTap = 0;
                    clickableElement.addEventListener('touchstart', (e) => { const now = Date.now(); if (now - lastTap < 300) { e.preventDefault(); showContextMenu(e, msgId, isMy); } lastTap = now; });
                }
                const senderEl = messageDiv.querySelector('.message-sender');
                if (senderEl && !isMy) { senderEl.style.cursor = 'pointer'; senderEl.addEventListener('click', () => showProfileView(msg.userId)); }
                container.appendChild(messageDiv);
            });
            scrollToBottom();
        });
    }

    function uploadFileToCloudinary(file, onSuccess, onError) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        if (file.type.startsWith('video/')) formData.append('resource_type', 'video');
        const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${file.type.startsWith('video/') ? 'video' : 'image'}/upload`;
        fetch(url, { method: 'POST', body: formData }).then(res => res.json()).then(data => { if (data.secure_url) onSuccess(data.secure_url, data.resource_type); else onError(data.error?.message || 'Ошибка загрузки'); }).catch(err => onError(err.message));
    }

    function sendMediaFile(file) {
        if (!currentChat) { showModal('Ошибка', 'Сначала выберите чат'); return; }
        if (!file) return;
        const isVideo = file.type.startsWith('video/');
        const fileSizeMB = file.size / (1024 * 1024);
        if (fileSizeMB > 100) { showModal('Ошибка', 'Файл слишком большой. Максимум 100 МБ'); return; }
        showModal('Загрузка', isVideo ? '🎬 Обработка видео...' : '📸 Отправка фото...');
        uploadFileToCloudinary(file, (url, resourceType) => {
            const messageData = { text: '', mediaUrl: url, mediaType: resourceType, userId: currentUser.uid, userName: `${userData.firstName} ${userData.lastName}`, userAvatar: userData.avatarUrl || null, timestamp: firebase.firestore.FieldValue.serverTimestamp(), chatType: currentChat.type, reactions: {} };
            if (currentChat.type === 'private') { messageData.chatId = getChatId(currentUser.uid, currentChat.id); messageData.toUserId = currentChat.id; }
            else messageData.groupId = currentChat.id;
            db.collection('messages').add(messageData).then(() => { document.querySelector('.modal-overlay.active')?.classList.remove('active'); scrollToBottom(); loadChatsList(); }).catch(err => showModal('Ошибка', 'Ошибка отправки: ' + err.message));
        }, (error) => showModal('Ошибка', 'Не удалось загрузить файл: ' + error));
    }

    function openFilePicker() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,video/*';
        input.onchange = (e) => { const file = e.target.files?.[0]; if (file) sendMediaFile(file); };
        input.click();
    }

    async function showGroupManage() {
        if (!currentChat || currentChat.type !== 'group') return;
        const groupDoc = await db.collection('groups').doc(currentChat.id).get();
        const group = groupDoc.data();
        const isCreator = group.createdBy === currentUser.uid;
        const members = [];
        for (const memberId of group.members) { const userDoc = await db.collection('users').doc(memberId).get(); if (userDoc.exists) members.push({ id: memberId, ...userDoc.data() }); }
        const friendIds = userData.friends || [];
        const availableFriends = [];
        for (const id of friendIds) { if (!group.members.includes(id)) { const userDoc = await db.collection('users').doc(id).get(); if (userDoc.exists) availableFriends.push({ id, ...userDoc.data() }); } }
        const modal = document.getElementById('groupManageModal');
        document.getElementById('groupManageTitle').textContent = `Управление: ${group.name}`;
        const membersListDiv = document.getElementById('groupMembersList');
        membersListDiv.innerHTML = '<div style="padding: 12px; font-weight: 600;">Участники:</div>';
        for (const member of members) {
            const isCreatorBadge = group.createdBy === member.id ? ' 👑' : '';
            const avatarStyle = member.avatarUrl ? `background-image: url('${member.avatarUrl}'); background-size: cover; background-position: center;` : '';
            const removeBtn = (isCreator && member.id !== currentUser.uid) ? `<button class="remove-member-btn" data-id="${member.id}">Удалить</button>` : '';
            const div = document.createElement('div');
            div.className = 'group-member-item';
            div.innerHTML = `<div class="group-member-info"><div class="group-member-avatar" style="${avatarStyle}">${!member.avatarUrl ? getInitials(member.firstName, member.lastName) : ''}${member.isVerified ? '<div class="verified-badge" style="width: 14px; height: 14px; font-size: 7px;"><i class="fas fa-check"></i></div>' : ''}</div><div class="group-member-name">${member.firstName} ${member.lastName}${isCreatorBadge}</div></div>${removeBtn}`;
            const removeBtnEl = div.querySelector('.remove-member-btn');
            if (removeBtnEl) removeBtnEl.onclick = () => removeMemberFromGroup(member.id, member.firstName, member.lastName);
            membersListDiv.appendChild(div);
        }
        const selectEl = document.getElementById('addMemberSelect');
        selectEl.innerHTML = '<option value="">Выберите друга</option>';
        for (const friend of availableFriends) selectEl.innerHTML += `<option value="${friend.id}">${friend.firstName} ${friend.lastName}</option>`;
        document.getElementById('addMemberBtn').onclick = async () => { const friendId = selectEl.value; if (!friendId) { showModal('Ошибка', 'Выберите друга'); return; } const friend = availableFriends.find(f => f.id === friendId); await addMemberToGroup(friendId, friend.firstName, friend.lastName); modal.classList.remove('active'); showGroupManage(); };
        document.getElementById('leaveGroupBtn').onclick = () => { showModal('Подтверждение', 'Выйти из беседы?', async () => { await leaveGroup(); modal.classList.remove('active'); showChatsView(); }); };
        const deleteBtn = document.getElementById('deleteGroupBtn');
        if (isCreator) { deleteBtn.style.display = 'block'; deleteBtn.onclick = () => { showModal('Подтверждение', 'Удалить беседу? Это необратимо.', async () => { await deleteGroup(); modal.classList.remove('active'); showChatsView(); }); }; }
        else deleteBtn.style.display = 'none';
        document.getElementById('closeGroupManageBtn').onclick = () => modal.classList.remove('active');
        modal.classList.add('active');
    }

    async function addMemberToGroup(userId, firstName, lastName) {
        try { await db.collection('groups').doc(currentChat.id).update({ members: firebase.firestore.FieldValue.arrayUnion(userId) }); showModal('Успех', `${firstName} ${lastName} добавлен(а) в беседу`); loadChatsList(); } catch(e) { showModal('Ошибка', e.message); }
    }

    async function removeMemberFromGroup(userId, firstName, lastName) {
        showModal('Подтверждение', `Удалить ${firstName} ${lastName} из беседы?`, async () => {
            try { await db.collection('groups').doc(currentChat.id).update({ members: firebase.firestore.FieldValue.arrayRemove(userId) }); showModal('Успех', `${firstName} ${lastName} удалён(а) из беседы`); loadChatsList(); if (currentChat && currentChat.id) showGroupManage(); } catch(e) { showModal('Ошибка', e.message); }
        });
    }

    async function leaveGroup() {
        try { await db.collection('groups').doc(currentChat.id).update({ members: firebase.firestore.FieldValue.arrayRemove(currentUser.uid) }); showModal('Успех', 'Вы вышли из беседы'); currentChat = null; loadChatsList(); } catch(e) { showModal('Ошибка', e.message); }
    }

    async function deleteGroup() {
        try { const messagesSnap = await db.collection('messages').where('groupId', '==', currentChat.id).get(); const batch = db.batch(); messagesSnap.forEach(doc => batch.delete(doc.ref)); await batch.commit(); await db.collection('groups').doc(currentChat.id).delete(); showModal('Успех', 'Беседа удалена'); currentChat = null; loadChatsList(); } catch(e) { showModal('Ошибка', e.message); }
    }

    function showChatsView() {
        currentView = 'chats';

        document.getElementById('createGroupBtn').onclick = showCreateGroupModal;
