<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЧЕБУРЧАТ — Социальная сеть</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; }
        
        /* Auth */
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; padding: 16px; }
        .auth-card { background: white; padding: 32px 24px; border-radius: 28px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .auth-card h1 { color: #ff7b2c; margin-bottom: 24px; font-size: 32px; }
        .auth-card input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e4e6eb; border-radius: 16px; font-size: 16px; background: #f0f2f5; }
        .auth-card button { width: 100%; padding: 14px; background: #ff7b2c; border: none; border-radius: 16px; color: white; font-weight: 600; margin-top: 16px; cursor: pointer; font-size: 16px; }
        .toggle-auth { margin-top: 16px; color: #ff7b2c; cursor: pointer; }
        .verify-msg { background: #fff3cd; color: #856404; padding: 12px; border-radius: 16px; margin: 12px 0; font-size: 14px; }
        .hidden { display: none !important; }
        
        /* App layout */
        .app { display: flex; height: 100vh; background: #f0f2f5; }
        
        /* Sidebar - десктоп */
        .sidebar { width: 280px; background: white; border-right: 1px solid #e4e6eb; display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; }
        .logo { padding: 0 20px 20px; font-size: 24px; font-weight: 800; color: #ff7b2c; border-bottom: 1px solid #e4e6eb; margin-bottom: 20px; }
        .nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: #1a1a1a; font-weight: 500; border-radius: 12px; margin: 0 8px; }
        .nav-item:hover, .nav-item.active { background: #f0f2f5; color: #ff7b2c; }
        .nav-item i { width: 24px; font-size: 20px; }
        .user-info-sidebar { margin-top: auto; padding: 16px 20px; border-top: 1px solid #e4e6eb; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar { width: 44px; height: 44px; background: #ff7b2c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; flex-shrink: 0; }
        .logout-btn { margin: 10px 16px; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Main chat area */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f0f2f5; }
        .chat-header { padding: 16px 20px; background: white; border-bottom: 1px solid #e4e6eb; display: flex; align-items: center; gap: 12px; }
        .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #1a1a1a; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .back-btn:hover { background: #f0f2f5; }
        .friend-avatar { width: 48px; height: 48px; background: #ff7b2c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 20px; flex-shrink: 0; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.my { align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 20px; word-wrap: break-word; }
        .my .message-bubble { background: #ff7b2c; color: white; border-bottom-right-radius: 6px; }
        .other .message-bubble { background: white; color: #1a1a1a; border-bottom-left-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
        .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 4px; margin-left: 6px; color: #65676b; }
        .message-time { font-size: 10px; margin-top: 4px; margin-left: 8px; color: #65676b; }
        .my .message-time { text-align: right; margin-right: 6px; }
        .input-area { padding: 12px 16px; background: white; border-top: 1px solid #e4e6eb; display: flex; gap: 12px; }
        .input-area input { flex: 1; padding: 12px 18px; border: none; background: #f0f2f5; border-radius: 28px; font-size: 16px; outline: none; }
        .input-area button { background: #ff7b2c; border: none; width: 48px; height: 48px; border-radius: 50%; color: white; cursor: pointer; font-size: 18px; flex-shrink: 0; }
        
        /* Right panel - десктоп */
        .right-panel { width: 350px; background: white; border-left: 1px solid #e4e6eb; display: flex; flex-direction: column; overflow-y: auto; }
        .friends-list, .search-results { padding: 16px; }
        .section-title { font-weight: 600; margin-bottom: 12px; font-size: 15px; color: #65676b; display: flex; align-items: center; gap: 8px; }
        .friend-item, .user-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #e4e6eb; cursor: pointer; }
        .friend-item:hover, .user-item:hover { background: #f0f2f5; margin: 0 -8px; padding: 12px 8px; border-radius: 12px; }
        .friend-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .small-avatar { width: 44px; height: 44px; background: #ff7b2c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 16px; flex-shrink: 0; }
        .friend-name { font-weight: 600; font-size: 15px; }
        .action-buttons-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btn-sm { background: none; border: none; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .action-btn-sm.write { background: #ff7b2c; color: white; }
        .action-btn-sm.add { background: #e4e6eb; color: #1a1a1a; }
        .action-btn-sm.remove { background: #dc3545; color: white; }
        .action-btn-sm.pending { background: #ffe4cc; color: #ff7b2c; }
        .pending-badge { font-size: 12px; color: #65676b; background: #f0f2f5; padding: 6px 12px; border-radius: 20px; }
        .empty-state { text-align: center; padding: 40px 20px; color: #65676b; }
        
        /* Search input */
        .search-container { padding: 16px; border-bottom: 1px solid #e4e6eb; background: white; }
        .search-container input { width: 100%; padding: 12px 16px; border: none; background: #f0f2f5; border-radius: 28px; font-size: 16px; outline: none; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 28px; width: 320px; max-width: 90%; text-align: center; overflow: hidden; animation: modalFade 0.2s ease; }
        @keyframes modalFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header { padding: 24px 20px 0; font-size: 18px; font-weight: bold; }
        .modal-body { padding: 20px; color: #65676b; }
        .modal-buttons { display: flex; border-top: 1px solid #e4e6eb; }
        .modal-buttons button { flex: 1; padding: 16px; border: none; background: none; font-size: 16px; font-weight: 600; cursor: pointer; }
        .modal-buttons .confirm { color: #ff7b2c; border-left: 1px solid #e4e6eb; }
        
        /* Mobile bottom navigation */
        .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e4e6eb; padding: 8px 20px 12px; justify-content: space-around; z-index: 100; }
        .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; font-size: 12px; color: #65676b; cursor: pointer; padding: 8px; border-radius: 12px; }
        .mobile-nav-item i { font-size: 24px; }
        .mobile-nav-item.active { color: #ff7b2c; background: #f0f2f5; }
        .mobile-profile-btn { display: flex; align-items: center; gap: 8px; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .right-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; width: 100%; transform: translateX(100%); transition: transform 0.3s ease; }
            .right-panel.open { transform: translateX(0); }
            .mobile-bottom-nav { display: flex; }
            .main { padding-bottom: 70px; }
            .message { max-width: 85%; }
            .back-btn { display: flex; }
            .chat-header { padding: 12px 16px; }
        }
        
        @media (min-width: 769px) {
            .back-btn { display: none; }
            .mobile-bottom-nav { display: none; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<div id="modal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header" id="modalTitle">Уведомление</div>
        <div class="modal-body" id="modalMessage">Сообщение</div>
        <div class="modal-buttons">
            <button class="confirm" id="modalConfirm">OK</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBx_koHusbH0CwiGvVj132nZ0rUpuPyqQw",
        authDomain: "msend-92718.firebaseapp.com",
        projectId: "msend-92718",
        storageBucket: "msend-92718.firebasestorage.app",
        messagingSenderId: "672219125451",
        appId: "1:672219125451:web:84871d4e136d0168076d4e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let userData = null;
    let currentChatUser = null;
    let friendsList = [];
    let allUsersList = [];
    let messagesUnsubscribe = null;
    let isMobile = window.innerWidth <= 768;

    function showModal(title, message, onConfirm = null) {
        const modal = document.getElementById('modal');
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message;
        const confirmBtn = document.getElementById('modalConfirm');
        confirmBtn.onclick = () => {
            modal.classList.remove('active');
            if (onConfirm) onConfirm();
        };
        modal.classList.add('active');
    }

    function getInitials(first, last) { return (first?.[0] || '?') + (last?.[0] || '?'); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)).replace(/\n/g,'<br>'); }
    function scrollToBottom() { const el = document.getElementById('messagesArea'); if(el) setTimeout(() => el.scrollTop = el.scrollHeight, 100); }
    function getChatId(a, b) { return [a, b].sort().join('_'); }

    async function logout() {
        if(messagesUnsubscribe) messagesUnsubscribe();
        await auth.signOut();
        renderAuth();
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        if(!input || !currentChatUser) return;
        const text = input.value.trim();
        if(!text) return;
        input.value = '';
        
        const chatId = getChatId(currentUser.uid, currentChatUser.id);
        try {
            await db.collection('messages').add({
                chatId, text, userId: currentUser.uid,
                userName: `${userData.firstName} ${userData.lastName}`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            scrollToBottom();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    function loadMessages() {
        if(messagesUnsubscribe) messagesUnsubscribe();
        if(!currentChatUser) return;
        const chatId = getChatId(currentUser.uid, currentChatUser.id);
        
        messagesUnsubscribe = db.collection('messages')
            .where('chatId', '==', chatId)
            .onSnapshot(snapshot => {
                const container = document.getElementById('messagesArea');
                if(!container) return;
                const messages = [];
                snapshot.forEach(doc => { messages.push({ id: doc.id, ...doc.data() }); });
                messages.sort((a, b) => {
                    const ta = a.timestamp?.toDate?.()?.getTime() || 0;
                    const tb = b.timestamp?.toDate?.()?.getTime() || 0;
                    return ta - tb;
                });
                container.innerHTML = '';
                messages.forEach(msg => {
                    const isMy = msg.userId === currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `message ${isMy ? 'my' : 'other'}`;
                    const ts = msg.timestamp?.toDate?.() || new Date();
                    div.innerHTML = `
                        ${!isMy ? `<div class="message-sender">${msg.userName || 'Пользователь'}</div>` : ''}
                        <div class="message-bubble">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${ts.toLocaleDateString()} в ${ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    `;
                    container.appendChild(div);
                });
                scrollToBottom();
            });
    }

    function openChat(user) {
        if(messagesUnsubscribe) messagesUnsubscribe();
        currentChatUser = user;
        
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="chat-header">
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                <div class="friend-avatar">${getInitials(user.firstName, user.lastName)}</div>
                <div><strong>${user.firstName} ${user.lastName}</strong></div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        `;
        document.getElementById('backBtn').onclick = () => { currentChatUser = null; showChatsPanel(); };
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        loadMessages();
        
        if(isMobile) {
            document.getElementById('rightPanel').classList.remove('open');
        }
    }

    async function loadAllUsers() {
        const snapshot = await db.collection('users').get();
        allUsersList = [];
        snapshot.forEach(doc => {
            if(doc.id !== currentUser.uid) {
                allUsersList.push({ id: doc.id, ...doc.data() });
            }
        });
        renderAllUsersList();
    }

    function renderAllUsersList() {
        const container = document.getElementById('allUsersContainer');
        if(!container) return;
        if(allUsersList.length === 0) {
            container.innerHTML = '<div class="empty-state">Нет других пользователей</div>';
            return;
        }
        container.innerHTML = '';
        for(const u of allUsersList) {
            const isFriend = friendsList.some(f => f.id === u.id);
            const isSent = userData.friendRequests?.sent?.includes(u.id);
            const isReceived = userData.friendRequests?.received?.includes(u.id);
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `
                <div class="friend-info">
                    <div class="small-avatar">${getInitials(u.firstName, u.lastName)}</div>
                    <div class="friend-name">${u.firstName} ${u.lastName}</div>
                </div>
                <div class="action-buttons-group">
                    <button class="action-btn-sm write" data-chat="${u.id}">💬</button>
                    ${!isFriend && !isSent && !isReceived ? `<button class="action-btn-sm add" data-add="${u.id}">➕</button>` : ''}
                    ${isSent ? '<span class="pending-badge">⏳</span>' : ''}
                    ${isReceived ? `<button class="action-btn-sm add" data-accept="${u.id}" style="background:#28a745">✅</button>` : ''}
                    ${isFriend ? `<button class="action-btn-sm remove" data-remove="${u.id}">🗑️</button>` : ''}
                </div>
            `;
            const writeBtn = div.querySelector('[data-chat]');
            const addBtn = div.querySelector('[data-add]');
            const acceptBtn = div.querySelector('[data-accept]');
            const removeBtn = div.querySelector('[data-remove]');
            if(writeBtn) writeBtn.onclick = () => openChat(u);
            if(addBtn) addBtn.onclick = () => sendFriendRequest(u.id, u.firstName, u.lastName);
            if(acceptBtn) acceptBtn.onclick = () => acceptFriendRequest(u.id);
            if(removeBtn) removeBtn.onclick = () => removeFriend(u.id);
            container.appendChild(div);
        }
    }

    async function removeFriend(friendId) {
        showModal('Подтверждение', 'Удалить пользователя из друзей?', async () => {
            try {
                await db.collection('users').doc(currentUser.uid).update({
                    friends: firebase.firestore.FieldValue.arrayRemove(friendId)
                });
                await db.collection('users').doc(friendId).update({
                    friends: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                });
                showModal('Успех', 'Пользователь удалён из друзей');
                const updated = await db.collection('users').doc(currentUser.uid).get();
                userData = updated.data();
                await loadFriendsList();
                await loadAllUsers();
            } catch(e) { showModal('Ошибка', e.message); }
        });
    }

    async function sendFriendRequest(toId, firstName, lastName) {
        try {
            await db.collection('users').doc(toId).update({ 
                'friendRequests.received': firebase.firestore.FieldValue.arrayUnion(currentUser.uid) 
            });
            await db.collection('users').doc(currentUser.uid).update({ 
                'friendRequests.sent': firebase.firestore.FieldValue.arrayUnion(toId) 
            });
            showModal('Успех', `Запрос отправлен ${firstName} ${lastName}`);
            const updated = await db.collection('users').doc(currentUser.uid).get();
            userData = updated.data();
            await loadFriendsList();
            await loadAllUsers();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function acceptFriendRequest(fromId) {
        try {
            await db.collection('users').doc(currentUser.uid).update({
                friends: firebase.firestore.FieldValue.arrayUnion(fromId),
                'friendRequests.received': firebase.firestore.FieldValue.arrayRemove(fromId)
            });
            await db.collection('users').doc(fromId).update({
                friends: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
                'friendRequests.sent': firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
            });
            showModal('Успех', 'Теперь вы друзья!');
            const updated = await db.collection('users').doc(currentUser.uid).get();
            userData = updated.data();
            await loadFriendsList();
            await loadAllUsers();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function loadFriendsList() {
        if(!userData) return;
        const friendIds = userData.friends || [];
        const friends = [];
        for(const id of friendIds) {
            const doc = await db.collection('users').doc(id).get();
            if(doc.exists) friends.push({ id, ...doc.data() });
        }
        friendsList = friends;
        
        const container = document.getElementById('friendsListContainer');
        if(!container) return;
        if(friends.length === 0) {
            container.innerHTML = '<div class="empty-state">Нет друзей. Добавьте через раздел "Люди"!</div>';
            return;
        }
        container.innerHTML = '';
        for(const f of friends) {
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `
                <div class="friend-info">
                    <div class="small-avatar">${getInitials(f.firstName, f.lastName)}</div>
                    <div class="friend-name">${f.firstName} ${f.lastName}</div>
                </div>
                <div class="action-buttons-group">
                    <button class="action-btn-sm write" data-chat="${f.id}">💬</button>
                    <button class="action-btn-sm remove" data-remove="${f.id}">🗑️</button>
                </div>
            `;
            div.querySelector('[data-chat]').onclick = () => openChat(f);
            div.querySelector('[data-remove]').onclick = () => removeFriend(f.id);
            container.appendChild(div);
        }
    }

    function showChatsPanel() {
        if(isMobile) document.getElementById('rightPanel').classList.remove('open');
        if(!currentChatUser) {
            document.getElementById('mainContent').innerHTML = `
                <div style="display:flex;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px">
                    <div style="color:#65676b">
                        <i class="fas fa-comments" style="font-size:64px;margin-bottom:16px;opacity:0.5"></i>
                        <h3>Выберите чат</h3>
                        <p>Нажмите на друга или найдите людей в разделе "Люди"</p>
                    </div>
                </div>
            `;
        }
        updateMobileNav('chats');
    }

    function showPeoplePanel() {
        if(isMobile) {
            document.getElementById('rightPanel').classList.add('open');
        } else {
            document.getElementById('rightPanel').classList.remove('open');
        }
        loadAllUsers();
        updateMobileNav('people');
    }

    function updateMobileNav(active) {
        const btns = document.querySelectorAll('.mobile-nav-item');
        btns.forEach(btn => {
            if(btn.dataset.nav === active) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function renderApp() {
        if(!currentUser || !userData) return;
        if(!currentUser.emailVerified) {
            renderEmailVerifyScreen();
            return;
        }
        
        document.getElementById('app').innerHTML = `
            <div class="app">
                <div class="sidebar">
                    <div class="logo">ЧЕБУРЧАТ</div>
                    <div class="nav-item active" data-nav="chats"><i class="fas fa-comments"></i> Чаты</div>
                    <div class="nav-item" data-nav="people"><i class="fas fa-users"></i> Люди</div>
                    <div class="user-info-sidebar" id="profileBtn">
                        <div class="avatar">${getInitials(userData.firstName, userData.lastName)}</div>
                        <div><strong>${userData.firstName} ${userData.lastName}</strong></div>
                    </div>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                </div>
                <div class="main" id="mainContent"></div>
                <div class="right-panel" id="rightPanel">
                    <div class="search-container">
                        <input type="text" id="searchInput" placeholder="🔍 Поиск людей...">
                    </div>
                    <div class="friends-list">
                        <div class="section-title"><i class="fas fa-user-friends"></i> Мои друзья</div>
                        <div id="friendsListContainer">Загрузка...</div>
                    </div>
                    <div class="friends-list" style="border-top: 1px solid #e4e6eb; margin-top: 8px;">
                        <div class="section-title"><i class="fas fa-globe"></i> Все пользователи</div>
                        <div id="allUsersContainer">Загрузка...</div>
                    </div>
                </div>
                <div class="mobile-bottom-nav">
                    <button class="mobile-nav-item active" data-nav="chats"><i class="fas fa-comments"></i><span>Чаты</span></button>
                    <button class="mobile-nav-item" data-nav="people"><i class="fas fa-users"></i><span>Люди</span></button>
                    <button class="mobile-nav-item" id="mobileProfileBtn"><i class="fas fa-user"></i><span>Профиль</span></button>
                </div>
            </div>
        `;
        
        loadFriendsList();
        loadAllUsers();
        
        document.querySelectorAll('.nav-item').forEach(el => {
            el.onclick = () => {
                if(el.dataset.nav === 'people') showPeoplePanel();
                else showChatsPanel();
            };
        });
        
        document.querySelectorAll('.mobile-nav-item').forEach(el => {
            el.onclick = () => {
                if(el.dataset.nav === 'people') showPeoplePanel();
                else if(el.dataset.nav === 'chats') showChatsPanel();
            };
        });
        
        document.getElementById('mobileProfileBtn').onclick = () => {
            showModal('Профиль', `${userData.firstName} ${userData.lastName}\n${userData.email}\n✅ Email подтверждён`);
        };
        document.getElementById('profileBtn').onclick = () => {
            showModal('Профиль', `${userData.firstName} ${userData.lastName}\n${userData.email}\n✅ Email подтверждён`);
        };
        document.getElementById('logoutBtn').onclick = logout;
        
        let searchTimer;
        document.getElementById('searchInput').oninput = (e) => {
            clearTimeout(searchTimer);
            const query = e.target.value.trim().toLowerCase();
            searchTimer = setTimeout(() => {
                const container = document.getElementById('allUsersContainer');
                if(!query) {
                    renderAllUsersList();
                    return;
                }
                const filtered = allUsersList.filter(u => 
                    `${u.firstName} ${u.lastName}`.toLowerCase().includes(query)
                );
                if(filtered.length === 0) {
                    container.innerHTML = '<div class="empty-state">Никого не найдено</div>';
                    return;
                }
                container.innerHTML = '';
                for(const u of filtered) {
                    const isFriend = friendsList.some(f => f.id === u.id);
                    const isSent = userData.friendRequests?.sent?.includes(u.id);
                    const isReceived = userData.friendRequests?.received?.includes(u.id);
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <div class="friend-info">
                            <div class="small-avatar">${getInitials(u.firstName, u.lastName)}</div>
                            <div class="friend-name">${u.firstName} ${u.lastName}</div>
                        </div>
                        <div class="action-buttons-group">
                            <button class="action-btn-sm write" data-chat="${u.id}">💬</button>
                            ${!isFriend && !isSent && !isReceived ? `<button class="action-btn-sm add" data-add="${u.id}">➕</button>` : ''}
                            ${isSent ? '<span class="pending-badge">⏳</span>' : ''}
                            ${isReceived ? `<button class="action-btn-sm add" data-accept="${u.id}" style="background:#28a745">✅</button>` : ''}
                            ${isFriend ? `<button class="action-btn-sm remove" data-remove="${u.id}">🗑️</button>` : ''}
                        </div>
                    `;
                    const writeBtn = div.querySelector('[data-chat]');
                    const addBtn = div.querySelector('[data-add]');
                    const acceptBtn = div.querySelector('[data-accept]');
                    const removeBtn = div.querySelector('[data-remove]');
                    if(writeBtn) writeBtn.onclick = () => openChat(u);
                    if(addBtn) addBtn.onclick = () => sendFriendRequest(u.id, u.firstName, u.lastName);
                    if(acceptBtn) acceptBtn.onclick = () => acceptFriendRequest(u.id);
                    if(removeBtn) removeBtn.onclick = () => removeFriend(u.id);
                    container.appendChild(div);
                }
            }, 300);
        };
        
        showChatsPanel();
    }

    function renderEmailVerifyScreen() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h1>ЧЕБУРЧАТ</h1>
                    <div class="verify-msg">
                        <i class="fas fa-envelope"></i> Подтвердите email<br>
                        <small>${currentUser.email}</small>
                    </div>
                    <button id="resendBtn">Отправить повторно</button>
                    <button id="checkBtn" style="background:#28a745">Я подтвердил</button>
                    <button id="logoutVerifyBtn" style="background:#dc3545; margin-top:10px">Выйти</button>
                </div>
            </div>
        `;
        document.getElementById('resendBtn').onclick = async () => {
            await currentUser.sendEmailVerification();
            showModal('Письмо отправлено', 'Проверьте почту');
        };
        document.getElementById('checkBtn').onclick = async () => {
            await currentUser.reload();
            if(currentUser.emailVerified) location.reload();
            else showModal('Ошибка', 'Email не подтверждён');
        };
        document.getElementById('logoutVerifyBtn').onclick = logout;
    }

    async function handleRegister() {
        const firstName = document.getElementById('regFirstName').value.trim();
        const lastName = document.getElementById('regLastName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        if(!firstName || !lastName) { showModal('Ошибка', 'Введите имя и фамилию'); return; }
        if(password.length < 6) { showModal('Ошибка', 'Пароль минимум 6 символов'); return; }
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await cred.user.sendEmailVerification();
            await db.collection('users').doc(cred.user.uid).set({
                firstName, lastName, email, friends: [], friendRequests: { sent: [], received: [] }, createdAt: new Date()
            });
            showModal('Регистрация', 'Письмо с подтверждением отправлено!');
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch(e) { showModal('Ошибка', e.message); }
    }

    function renderAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h1>ЧЕБУРЧАТ</h1>
                    <div id="loginView">
                        <input type="email" id="loginEmail" placeholder="Email">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <button id="doLoginBtn">Войти</button>
                        <div class="toggle-auth" id="showRegisterBtn">Нет аккаунта? Регистрация</div>
                    </div>
                    <div id="registerView" class="hidden">
                        <input type="text" id="regFirstName" placeholder="Имя">
                        <input type="text" id="regLastName" placeholder="Фамилия">
                        <input type="email" id="regEmail" placeholder="Email">
                        <input type="password" id="regPassword" placeholder="Пароль (мин. 6)">
                        <button id="doRegisterBtn">Зарегистрироваться</button>
                        <div class="toggle-auth" id="showLoginBtn">Уже есть аккаунт? Войти</div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('doLoginBtn').onclick = handleLogin;
        document.getElementById('showRegisterBtn').onclick = () => {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('registerView').classList.remove('hidden');
        };
        document.getElementById('showLoginBtn').onclick = () => {
            document.getElementById('registerView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
        };
        document.getElementById('doRegisterBtn').onclick = handleRegister;
    }

    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if(!doc.exists) {
                await db.collection('users').doc(user.uid).set({
                    firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] }
                });
                userData = { firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] } };
            } else {
                userData = doc.data();
                if(!userData.friendRequests) {
                    await db.collection('users').doc(user.uid).update({ friendRequests: { sent: [], received: [] } });
                    userData.friendRequests = { sent: [], received: [] };
                }
            }
            renderApp();
        } else {
            if(messagesUnsubscribe) messagesUnsubscribe();
            currentUser = null;
            userData = null;
            renderAuth();
        }
    });
    
    window.addEventListener('resize', () => { isMobile = window.innerWidth <= 768; });
</script>
</body>
</html>
