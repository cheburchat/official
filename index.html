<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЧЕБУРЧАТ — Социальная сеть</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; }
        
        /* Темы */
        body[data-theme="default"] { --bg-page: #f0f2f5; --bg-surface: white; --bg-element: #f0f2f5; --text: #1a1a1a; --text-secondary: #65676b; --accent: #ff7b2c; --accent-hover: #e6691a; --border: #e4e6eb; --my-msg: #ff7b2c; --my-msg-text: white; --other-msg: white; --other-msg-text: #1a1a1a; --shadow: 0 1px 2px rgba(0,0,0,0.08); --verified: #3b82f6; }
        body[data-theme="dark"] { --bg-page: #18191a; --bg-surface: #242526; --bg-element: #3a3b3c; --text: #e4e6eb; --text-secondary: #b0b3b8; --accent: #ff7b2c; --accent-hover: #e6691a; --border: #3e4042; --my-msg: #ff7b2c; --my-msg-text: white; --other-msg: #3e4042; --other-msg-text: #e4e6eb; --shadow: 0 1px 2px rgba(0,0,0,0.2); --verified: #3b82f6; }
        body[data-theme="purple"] { --bg-page: #f5f0ff; --bg-surface: white; --bg-element: #f0ebf8; --text: #2d1b4e; --text-secondary: #7c6b9e; --accent: #9b59b6; --accent-hover: #8e44ad; --border: #e8dfd5; --my-msg: #9b59b6; --my-msg-text: white; --other-msg: white; --other-msg-text: #2d1b4e; --shadow: 0 1px 2px rgba(155,89,182,0.1); --verified: #3b82f6; }
        body[data-theme="red"] { --bg-page: #1a0f0f; --bg-surface: #2a1a1a; --bg-element: #3d2525; --text: #f0d6d6; --text-secondary: #c4a0a0; --accent: #c0392b; --accent-hover: #e74c3c; --border: #4a2e2e; --my-msg: #c0392b; --my-msg-text: white; --other-msg: #3d2525; --other-msg-text: #f0d6d6; --shadow: 0 1px 2px rgba(0,0,0,0.3); --verified: #3b82f6; }
        body[data-theme="blue"] { --bg-page: #e8f0fe; --bg-surface: white; --bg-element: #e4edf7; --text: #1a3a5c; --text-secondary: #5a7a9e; --accent: #2d88ff; --accent-hover: #1a66cc; --border: #d4e0ec; --my-msg: #2d88ff; --my-msg-text: white; --other-msg: white; --other-msg-text: #1a3a5c; --shadow: 0 1px 2px rgba(45,136,255,0.1); --verified: #fbbf24; }
        body[data-theme="green"] { --bg-page: #eaf7ea; --bg-surface: white; --bg-element: #e2f0e2; --text: #1a4a1a; --text-secondary: #5a8a5a; --accent: #27ae60; --accent-hover: #219a52; --border: #d0e4d0; --my-msg: #27ae60; --my-msg-text: white; --other-msg: white; --other-msg-text: #1a4a1a; --shadow: 0 1px 2px rgba(39,174,96,0.1); --verified: #3b82f6; }
        
        body { background: var(--bg-page); color: var(--text); }
        
        /* Auth */
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-page); padding: 16px; }
        .auth-card { background: var(--bg-surface); padding: 32px 24px; border-radius: 28px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid var(--border); }
        .auth-card h1 { color: var(--accent); margin-bottom: 24px; font-size: 32px; }
        .auth-card input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); border-radius: 16px; font-size: 16px; background: var(--bg-element); color: var(--text); }
        .auth-card button { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 16px; color: white; font-weight: 600; margin-top: 16px; cursor: pointer; font-size: 16px; }
        .auth-card button:hover { background: var(--accent-hover); }
        .toggle-auth { margin-top: 16px; color: var(--accent); cursor: pointer; }
        .verify-msg { background: #fff3cd; color: #856404; padding: 12px; border-radius: 16px; margin: 12px 0; font-size: 14px; }
        .hidden { display: none !important; }
        
        /* App layout */
        .app { display: flex; height: 100vh; background: var(--bg-page); }
        
        /* Sidebar */
        .sidebar { width: 280px; background: var(--bg-surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; }
        .logo { padding: 20px 20px 16px; font-size: 22px; font-weight: 800; color: var(--accent); border-bottom: 1px solid var(--border); }
        .sidebar-section { padding: 16px 0; }
        .nav-item { padding: 10px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); font-weight: 500; border-radius: 10px; margin: 0 8px; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--bg-element); color: var(--accent); }
        .nav-item i { width: 24px; font-size: 20px; }
        .user-info-sidebar { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; flex-shrink: 0; position: relative; }
        .verified-badge { position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; background: var(--verified); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; border: 2px solid var(--bg-surface); }
        .logout-btn { margin: 10px 16px; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Main content */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-page); position: relative; }
        
        /* Список чатов */
        .chats-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); }
        .chats-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .chats-header h2 { font-size: 24px; font-weight: 700; color: var(--text); }
        .chats-search { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .chats-search input { width: 100%; padding: 10px 16px; border: none; background: var(--bg-element); border-radius: 24px; font-size: 15px; outline: none; color: var(--text); }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid var(--border); }
        .chat-item:hover { background: var(--bg-element); }
        .chat-avatar { width: 52px; height: 52px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 20px; flex-shrink: 0; position: relative; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 16px; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .verified-icon { color: var(--verified); font-size: 14px; margin-left: 2px; }
        .chat-last-msg { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
        .empty-chats { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        
        /* Окно чата */
        .chat-window { display: flex; flex-direction: column; height: 100%; background: var(--bg-page); }
        .chat-header { padding: 12px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text); }
        .back-btn:hover { background: var(--bg-element); }
        .chat-header-avatar { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; flex-shrink: 0; position: relative; }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: 600; font-size: 17px; color: var(--text); display: flex; align-items: center; gap: 6px; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.my { align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 18px; word-wrap: break-word; }
        .my .message-bubble { background: var(--my-msg); color: var(--my-msg-text); border-bottom-right-radius: 4px; }
        .other .message-bubble { background: var(--other-msg); color: var(--other-msg-text); border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
        .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 4px; margin-left: 6px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
        .message-time { font-size: 10px; margin-top: 4px; margin-left: 8px; color: var(--text-secondary); }
        .my .message-time { text-align: right; margin-right: 6px; }
        .input-area { padding: 12px 16px; background: var(--bg-surface); border-top: 1px solid var(--border); display: flex; gap: 12px; flex-shrink: 0; }
        .input-area input { flex: 1; padding: 12px 18px; border: none; background: var(--bg-element); border-radius: 28px; font-size: 16px; outline: none; color: var(--text); }
        .input-area input::placeholder { color: var(--text-secondary); }
        .input-area button { background: var(--accent); border: none; width: 48px; height: 48px; border-radius: 50%; color: white; cursor: pointer; font-size: 18px; flex-shrink: 0; }
        .input-area button:hover { background: var(--accent-hover); }
        
        /* Страница людей */
        .people-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); }
        .people-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .people-header h2 { font-size: 24px; font-weight: 700; color: var(--text); }
        .people-search { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .people-search input { width: 100%; padding: 10px 16px; border: none; background: var(--bg-element); border-radius: 24px; font-size: 15px; outline: none; color: var(--text); }
        .people-list { flex: 1; overflow-y: auto; }
        .person-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .person-item:hover { background: var(--bg-element); }
        .person-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .person-avatar { width: 48px; height: 48px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; position: relative; }
        .person-name { font-weight: 600; font-size: 16px; color: var(--text); display: flex; align-items: center; gap: 6px; }
        .action-btns { display: flex; gap: 8px; }
        .action-btn { background: none; border: none; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .action-btn.write { background: var(--accent); color: white; }
        .action-btn.add { background: var(--bg-element); color: var(--text); }
        .action-btn.remove { background: #dc3545; color: white; }
        .action-btn.pending { background: var(--bg-element); color: var(--text-secondary); cursor: default; }
        .action-btn.verify { background: var(--verified); color: white; }
        .action-btn.unverify { background: #6c757d; color: white; }
        
        /* Админ панель */
        .admin-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); }
        .admin-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .admin-header h2 { font-size: 24px; font-weight: 700; color: var(--text); flex: 1; }
        .admin-stats { display: flex; gap: 16px; padding: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .admin-stat-card { background: var(--bg-element); border-radius: 16px; padding: 12px 20px; text-align: center; flex: 1; min-width: 100px; }
        .admin-stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
        .admin-stat-label { font-size: 12px; color: var(--text-secondary); }
        .admin-search { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .admin-search input { width: 100%; padding: 10px 16px; border: none; background: var(--bg-element); border-radius: 24px; font-size: 15px; outline: none; color: var(--text); }
        .admin-list { flex: 1; overflow-y: auto; }
        .admin-user-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .admin-user-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .admin-user-avatar { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 16px; position: relative; }
        .admin-user-details { flex: 1; }
        .admin-user-name { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .admin-user-email { font-size: 12px; color: var(--text-secondary); }
        .admin-user-actions { display: flex; gap: 8px; }
        
        /* Настройки */
        .settings-view { display: flex; flex-direction: column; height: 100%; background: var(--bg-surface); }
        .settings-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .settings-header h2 { font-size: 24px; font-weight: 700; color: var(--text); flex: 1; }
        .settings-list { padding: 16px; }
        .settings-section { margin-bottom: 24px; }
        .settings-section-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
        .theme-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .theme-option { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px; border-radius: 16px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; background: var(--bg-element); }
        .theme-option:hover { transform: scale(1.02); }
        .theme-option.active { border-color: var(--accent); }
        .theme-preview { width: 50px; height: 50px; border-radius: 25px; }
        .theme-preview.default { background: linear-gradient(135deg, #ff7b2c, #e6691a); }
        .theme-preview.dark { background: linear-gradient(135deg, #242526, #3a3b3c); }
        .theme-preview.purple { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .theme-preview.red { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        .theme-preview.blue { background: linear-gradient(135deg, #2d88ff, #1a66cc); }
        .theme-preview.green { background: linear-gradient(135deg, #27ae60, #219a52); }
        .theme-name { font-size: 13px; color: var(--text); }
        
        /* Mobile bottom nav */
        .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-surface); border-top: 1px solid var(--border); padding: 8px 20px 12px; justify-content: space-around; z-index: 100; transition: transform 0.3s ease; }
        .mobile-bottom-nav.hidden { transform: translateY(100%); }
        .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; font-size: 11px; color: var(--text-secondary); cursor: pointer; padding: 8px; border-radius: 12px; }
        .mobile-nav-item i { font-size: 22px; }
        .mobile-nav-item.active { color: var(--accent); background: var(--bg-element); }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-surface); border-radius: 28px; width: 320px; max-width: 90%; text-align: center; overflow: hidden; }
        .modal-header { padding: 24px 20px 0; font-size: 18px; font-weight: bold; color: var(--text); }
        .modal-body { padding: 20px; color: var(--text-secondary); }
        .modal-buttons { display: flex; border-top: 1px solid var(--border); }
        .modal-buttons button { flex: 1; padding: 16px; border: none; background: none; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--text); }
        .modal-buttons .confirm { color: var(--accent); border-left: 1px solid var(--border); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-bottom-nav { display: flex; }
        }
        @media (min-width: 769px) {
            .back-btn { display: flex !important; }
        }
    </style>
</head>
<body data-theme="default">
<div id="app"></div>

<div id="modal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header" id="modalTitle">Уведомление</div>
        <div class="modal-body" id="modalMessage">Сообщение</div>
        <div class="modal-buttons">
            <button class="confirm" id="modalConfirm">OK</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBx_koHusbH0CwiGvVj132nZ0rUpuPyqQw",
        authDomain: "msend-92718.firebaseapp.com",
        projectId: "msend-92718",
        storageBucket: "msend-92718.firebasestorage.app",
        messagingSenderId: "672219125451",
        appId: "1:672219125451:web:84871d4e136d0168076d4e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let userData = null;
    let currentChatUser = null;
    let allUsers = [];
    let chatsList = [];
    let messagesUnsubscribe = null;
    let isMobile = window.innerWidth <= 768;
    let isAdmin = false;

    // Загрузка сохранённой темы
    const savedTheme = localStorage.getItem('cheburchat_theme') || 'default';
    document.body.setAttribute('data-theme', savedTheme);

    function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('cheburchat_theme', theme);
        document.querySelectorAll('.theme-option').forEach(opt => {
            if(opt.dataset.theme === theme) opt.classList.add('active');
            else opt.classList.remove('active');
        });
    }

    function showModal(title, message, onConfirm = null) {
        const modal = document.getElementById('modal');
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message;
        const confirmBtn = document.getElementById('modalConfirm');
        confirmBtn.onclick = () => {
            modal.classList.remove('active');
            if (onConfirm) onConfirm();
        };
        modal.classList.add('active');
    }

    function getInitials(first, last) { return (first?.[0] || '?') + (last?.[0] || '?'); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)).replace(/\n/g,'<br>'); }
    function scrollToBottom() { const el = document.getElementById('messagesArea'); if(el) setTimeout(() => el.scrollTop = el.scrollHeight, 100); }
    function getChatId(a, b) { return [a, b].sort().join('_'); }

    async function logout() {
        if(messagesUnsubscribe) messagesUnsubscribe();
        await auth.signOut();
        renderAuth();
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        if(!input || !currentChatUser) return;
        const text = input.value.trim();
        if(!text) return;
        input.value = '';
        
        const chatId = getChatId(currentUser.uid, currentChatUser.id);
        try {
            await db.collection('messages').add({
                chatId, text, userId: currentUser.uid,
                userName: `${userData.firstName} ${userData.lastName}`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            scrollToBottom();
            loadChatsList();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    function loadMessages() {
        if(messagesUnsubscribe) messagesUnsubscribe();
        if(!currentChatUser) return;
        const chatId = getChatId(currentUser.uid, currentChatUser.id);
        
        messagesUnsubscribe = db.collection('messages')
            .where('chatId', '==', chatId)
            .onSnapshot(snapshot => {
                const container = document.getElementById('messagesArea');
                if(!container) return;
                const messages = [];
                snapshot.forEach(doc => { messages.push({ id: doc.id, ...doc.data() }); });
                messages.sort((a, b) => {
                    const ta = a.timestamp?.toDate?.()?.getTime() || 0;
                    const tb = b.timestamp?.toDate?.()?.getTime() || 0;
                    return ta - tb;
                });
                container.innerHTML = '';
                messages.forEach(msg => {
                    const isMy = msg.userId === currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `message ${isMy ? 'my' : 'other'}`;
                    const ts = msg.timestamp?.toDate?.() || new Date();
                    div.innerHTML = `
                        ${!isMy ? `<div class="message-sender">${msg.userName || 'Пользователь'}</div>` : ''}
                        <div class="message-bubble">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${ts.toLocaleDateString()} в ${ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    `;
                    container.appendChild(div);
                });
                scrollToBottom();
            });
    }

    function openChat(user) {
        if(messagesUnsubscribe) messagesUnsubscribe();
        currentChatUser = user;
        
        if(isMobile) {
            const bottomNav = document.querySelector('.mobile-bottom-nav');
            if(bottomNav) bottomNav.classList.add('hidden');
        }
        
        document.getElementById('mainContent').innerHTML = `
            <div class="chat-window">
                <div class="chat-header">

    async function loadChatsList() {
        if(!currentUser) return;
        const allMessages = await db.collection('messages')
            .where('userId', '==', currentUser.uid)
            .get();
        const messagesTo = await db.collection('messages')
            .where('toUserId', '==', currentUser.uid)
            .get();
        
        const chatUsers = new Map();
        
        allMessages.forEach(doc => {
            const msg = doc.data();
            if(msg.toUserId && msg.toUserId !== currentUser.uid) {
                chatUsers.set(msg.toUserId, { lastMsg: msg.text, lastTime: msg.timestamp });
            }
        });
        messagesTo.forEach(doc => {
            const msg = doc.data();
            if(msg.userId && msg.userId !== currentUser.uid) {
                const existing = chatUsers.get(msg.userId);
                if(!existing || (msg.timestamp && existing.lastTime?.toDate?.() < msg.timestamp.toDate())) {
                    chatUsers.set(msg.userId, { lastMsg: msg.text, lastTime: msg.timestamp });
                }
            }
        });
        
        const friendIds = userData.friends || [];
        for(const id of friendIds) {
            if(!chatUsers.has(id)) {
                const userDoc = await db.collection('users').doc(id).get();
                if(userDoc.exists) {
                    chatUsers.set(id, { lastMsg: 'Напишите первым', lastTime: null });
                }
            }
        }
        
        const chats = [];
        for(const [id, data] of chatUsers) {
            const userDoc = await db.collection('users').doc(id).get();
            if(userDoc.exists) {
                const u = userDoc.data();
                chats.push({
                    id, firstName: u.firstName, lastName: u.lastName,
                    lastMsg: data.lastMsg || 'Напишите первым',
                    lastTime: data.lastTime,
                    isVerified: u.isVerified || false
                });
            }
        }
        chats.sort((a,b) => {
            const ta = a.lastTime?.toDate?.()?.getTime() || 0;
            const tb = b.lastTime?.toDate?.()?.getTime() || 0;
            return tb - ta;
        });
        chatsList = chats;
        renderChatsList();
    }

        }
        if(filtered.length === 0) {
            container.innerHTML = '<div class="empty-chats"><i class="fas fa-comments" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;"></i><p>Нет чатов</p><p style="font-size: 13px;">Найдите людей в разделе "Люди"</p></div>';
            return;

        container.innerHTML = '';

            const div = document.createElement('div');
            div.className = 'chat-item';
            const timeStr = chat.lastTime?.toDate?.() ?

    async function sendFriendRequest(toId, firstName, lastName) {
        try {
            await db.collection('users').doc(toId).update({ 
                'friendRequests.received': firebase.firestore.FieldValue.arrayUnion(currentUser.uid) 
            });
            await db.collection('users').doc(currentUser.uid).update({ 
                'friendRequests.sent': firebase.firestore.FieldValue.arrayUnion(toId) 
            });
            showModal('Успех', `Запрос отправлен ${firstName} ${lastName}`);
            const updated = await db.collection('users').doc(currentUser.uid).get();
            userData = updated.data();
            loadPeopleList();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function acceptFriendRequest(fromId) {
        try {
            await db.collection('users').doc(currentUser.uid).update({
                friends: firebase.firestore.FieldValue.arrayUnion(fromId),
                'friendRequests.received': firebase.firestore.FieldValue.arrayRemove(fromId)
            });
            await db.collection('users').doc(fromId).update({
                friends: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
                'friendRequests.sent': firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
            });
            showModal('Успех', 'Теперь вы друзья!');
            const updated = await db.collection('users').doc(currentUser.uid).get();
            userData = updated.data();
            loadPeopleList();
            loadChatsList();
        } catch(e) { showModal('Ошибка', e.message); }
    }

                    <button id="logoutVerifyBtn" style="background:#dc3545; margin-top:10px">Выйти</button>
                </div>
            </div>
        `;
        document.getElementById('resendBtn').onclick = async () => {
            await currentUser.sendEmailVerification();
            showModal('Письмо отправлено', 'Проверьте почту');
        };
        document.getElementById('checkBtn').onclick = async () => {
            await currentUser.reload();
            if(currentUser.emailVerified) location.reload();
            else showModal('Ошибка', 'Email не подтверждён');
        };
        document.getElementById('logoutVerifyBtn').onclick = logout;
    }

    async function handleRegister() {
        const firstName = document.getElementById('regFirstName').value.trim();
        const lastName = document.getElementById('regLastName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        if(!firstName || !lastName) { showModal('Ошибка', 'Введите имя и фамилию'); return; }
        if(password.length < 6) { showModal('Ошибка', 'Пароль минимум 6 символов'); return; }
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await cred.user.sendEmailVerification();
            await db.collection('users').doc(cred.user.uid).set({
                firstName, lastName, email, friends: [], friendRequests: { sent: [], received: [] }, createdAt: new Date(),
                isVerified: false
            });
            showModal('Регистрация', 'Письмо с подтверждением отправлено!');
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch(e) { showModal('Ошибка', e.message); }
    }

    function renderAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h1>ЧЕБУРЧАТ</h1>
                    <div id="loginView">
                        <input type="email" id="loginEmail" placeholder="Email">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <button id="doLoginBtn">Войти</button>
                        <div class="toggle-auth" id="showRegisterBtn">Нет аккаунта? Регистрация</div>
                    </div>
                    <div id="registerView" class="hidden">
                        <input type="text" id="regFirstName" placeholder="Имя">
                        <input type="text" id="regLastName" placeholder="Фамилия">
                        <input type="email" id="regEmail" placeholder="Email">
                        <input type="password" id="regPassword" placeholder="Пароль (мин. 6)">
                        <button id="doRegisterBtn">Зарегистрироваться</button>
                        <div class="toggle-auth" id="showLoginBtn">Уже есть аккаунт? Войти</div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('doLoginBtn').onclick = handleLogin;
        document.getElementById('showRegisterBtn').onclick = () => {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('registerView').classList.remove('hidden');
        };
        document.getElementById('showLoginBtn').onclick = () => {
            document.getElementById('registerView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
        };
        document.getElementById('doRegisterBtn').onclick = handleRegister;
    }

    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if(!doc.exists) {
                await db.collection('users').doc(user.uid).set({
                    firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] },
                    isVerified: false
                });
                userData = { firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] }, isVerified: false };
            } else {
                userData = doc.data();
                if(!userData.friendRequests) {
                    await db.collection('users').doc(user.uid).update({ friendRequests: { sent: [], received: [] } });
                    userData.friendRequests = { sent: [], received: [] };
                }
                if(userData.isVerified === undefined) {
                    await db.collection('users').doc(user.uid).update({ isVerified: false });
                    userData.isVerified = false;
                }
            }
            renderApp();
        } else {
            if(messagesUnsubscribe) messagesUnsubscribe();
            currentUser = null;
            userData = null;
            renderAuth();
        }
    });
    
    window.addEventListener('resize', () => { isMobile = window.innerWidth <= 768; });
</script>
</body>
</html>
