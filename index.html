<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЧЕБУРЧАТ — Социальная сеть</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; }
        
        /* Auth */
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; padding: 16px; }
        .auth-card { background: white; padding: 32px 24px; border-radius: 28px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .auth-card h1 { color: #ff7b2c; margin-bottom: 24px; font-size: 32px; }
        .auth-card input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e4e6eb; border-radius: 16px; font-size: 16px; background: #f0f2f5; }
        .auth-card button { width: 100%; padding: 14px; background: #ff7b2c; border: none; border-radius: 16px; color: white; font-weight: 600; margin-top: 16px; cursor: pointer; font-size: 16px; }
        .toggle-auth { margin-top: 16px; color: #ff7b2c; cursor: pointer; }
        .verify-msg { background: #fff3cd; color: #856404; padding: 12px; border-radius: 16px; margin: 12px 0; font-size: 14px; }
        .hidden { display: none !important; }
        
        /* App layout */
        .app { display: flex; height: 100vh; background: #f0f2f5; }
        
        /* Sidebar - как в ВК */
        .sidebar { width: 280px; background: white; border-right: 1px solid #e4e6eb; display: flex; flex-direction: column; flex-shrink: 0; height: 100vh; }
        .logo { padding: 20px 20px 16px; font-size: 22px; font-weight: 800; color: #ff7b2c; border-bottom: 1px solid #e4e6eb; }
        .sidebar-section { padding: 16px 0; }
        .nav-item { padding: 10px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: #1a1a1a; font-weight: 500; border-radius: 10px; margin: 0 8px; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: #f0f2f5; color: #ff7b2c; }
        .nav-item i { width: 24px; font-size: 20px; }
        .user-info-sidebar { margin-top: auto; padding: 16px 20px; border-top: 1px solid #e4e6eb; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar { width: 44px; height: 44px; background: #ff7b2c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; flex-shrink: 0; }
        .logout-btn { margin: 10px 16px; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Main content */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f0f2f5; }
        
        /* Список чатов */
        .chats-header { padding: 16px 20px; background: white; border-bottom: 1px solid #e4e6eb; }
        .chats-header h2 { font-size: 24px; font-weight: 700; }
        .chats-search { padding: 12px 16px; background: white; border-bottom: 1px solid #e4e6eb; }
        .chats-search input { width: 100%; padding: 10px 16px; border: none; background: #f0f2f5; border-radius: 24px; font-size: 15px; outline: none; }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #e4e6eb; }
        .chat-item:hover { background: #f0f2f5; }
        .chat-avatar { width: 52px; height: 52px; background: #ff7b2c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 20px; flex-shrink: 0; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .chat-last-msg { font-size: 13px; color: #65676b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: #65676b; flex-shrink: 0; }
        .empty-chats { text-align: center; padding: 60px 20px; color: #65676b; }
        
        /* Окно чата */
        .chat-window { display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        .chat-header { padding: 12px 16px; background: white; border-bottom: 1px solid #e4e6eb; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .back-btn:hover { background: #f0f2f5; }
        .chat-header-avatar { width: 44px; height: 44px; background: #ff7b2c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; }
        .chat-header-info { flex: 1; }
        .chat-header-name { font-weight: 600; font-size: 17px; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.my { align-self: flex-end; }
        .message.other { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 18px; word-wrap: break-word; }
        .my .message-bubble { background: #ff7b2c; color: white; border-bottom-right-radius: 4px; }
        .other .message-bubble { background: white; color: #1a1a1a; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
        .message-sender { font-size: 11px; font-weight: 600; margin-bottom: 4px; margin-left: 6px; color: #65676b; }
        .message-time { font-size: 10px; margin-top: 4px; margin-left: 8px; color: #65676b; }
        .my .message-time { text-align: right; margin-right: 6px; }
        .input-area { padding: 12px 16px; background: white; border-top: 1px solid #e4e6eb; display: flex; gap: 12px; flex-shrink: 0; }
        .input-area input { flex: 1; padding: 12px 18px; border: none; background: #f0f2f5; border-radius: 28px; font-size: 16px; outline: none; }
        .input-area button { background: #ff7b2c; border: none; width: 48px; height: 48px; border-radius: 50%; color: white; cursor: pointer; font-size: 18px; flex-shrink: 0; }
        
        /* Страница людей */
        .people-container { height: 100vh; display: flex; flex-direction: column; background: white; }
        .people-header { padding: 16px 20px; border-bottom: 1px solid #e4e6eb; }
        .people-header h2 { font-size: 24px; font-weight: 700; }
        .people-search { padding: 12px 16px; border-bottom: 1px solid #e4e6eb; }
        .people-search input { width: 100%; padding: 10px 16px; border: none; background: #f0f2f5; border-radius: 24px; font-size: 15px; outline: none; }
        .people-list { flex: 1; overflow-y: auto; }
        .person-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #e4e6eb; cursor: pointer; }
        .person-item:hover { background: #f0f2f5; }
        .person-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .person-avatar { width: 48px; height: 48px; background: #ff7b2c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; }
        .person-name { font-weight: 600; font-size: 16px; }
        .action-btns { display: flex; gap: 8px; }
        .action-btn { background: none; border: none; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .action-btn.write { background: #ff7b2c; color: white; }
        .action-btn.add { background: #e4e6eb; color: #1a1a1a; }
        .action-btn.remove { background: #dc3545; color: white; }
        .action-btn.pending { background: #ffe4cc; color: #ff7b2c; cursor: default; }
        .pending-badge { font-size: 12px; color: #65676b; background: #f0f2f5; padding: 6px 12px; border-radius: 20px; }
        
        /* Mobile bottom nav */
        .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e4e6eb; padding: 8px 20px 12px; justify-content: space-around; z-index: 100; }
        .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; font-size: 11px; color: #65676b; cursor: pointer; padding: 8px; border-radius: 12px; }
        .mobile-nav-item i { font-size: 22px; }
        .mobile-nav-item.active { color: #ff7b2c; background: #f0f2f5; }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 28px; width: 320px; max-width: 90%; text-align: center; overflow: hidden; }
        .modal-header { padding: 24px 20px 0; font-size: 18px; font-weight: bold; }
        .modal-body { padding: 20px; color: #65676b; }
        .modal-buttons { display: flex; border-top: 1px solid #e4e6eb; }
        .modal-buttons button { flex: 1; padding: 16px; border: none; background: none; font-size: 16px; font-weight: 600; cursor: pointer; }
        .modal-buttons .confirm { color: #ff7b2c; border-left: 1px solid #e4e6eb; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-bottom-nav { display: flex; }
            .chat-header { padding: 8px 12px; }
            .chat-header-name { font-size: 16px; }
            .message { max-width: 85%; }
            .back-btn { display: flex; }
        }
        @media (min-width: 769px) {
            .back-btn { display: none; }
            .mobile-bottom-nav { display: none; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<div id="modal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header" id="modalTitle">Уведомление</div>
        <div class="modal-body" id="modalMessage">Сообщение</div>
        <div class="modal-buttons">
            <button class="confirm" id="modalConfirm">OK</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBx_koHusbH0CwiGvVj132nZ0rUpuPyqQw",
        authDomain: "msend-92718.firebaseapp.com",
        projectId: "msend-92718",
        storageBucket: "msend-92718.firebasestorage.app",
        messagingSenderId: "672219125451",
        appId: "1:672219125451:web:84871d4e136d0168076d4e"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let userData = null;
    let currentChatUser = null;
    let allUsers = [];
    let chatsList = [];
    let messagesUnsubscribe = null;
    let isMobile = window.innerWidth <= 768;

    function showModal(title, message, onConfirm = null) {
        const modal = document.getElementById('modal');
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalMessage').textContent = message;
        const confirmBtn = document.getElementById('modalConfirm');
        confirmBtn.onclick = () => {
            modal.classList.remove('active');
            if (onConfirm) onConfirm();
        };
        modal.classList.add('active');
    }

    function getInitials(first, last) { return (first?.[0] || '?') + (last?.[0] || '?'); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)).replace(/\n/g,'<br>'); }
    function scrollToBottom() { const el = document.getElementById('messagesArea'); if(el) setTimeout(() => el.scrollTop = el.scrollHeight, 100); }
    function getChatId(a, b) { return [a, b].sort().join('_'); }

    async function logout() {
        if(messagesUnsubscribe) messagesUnsubscribe();
        await auth.signOut();
        renderAuth();
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        if(!input || !currentChatUser) return;
        const text = input.value.trim();
        if(!text) return;
        input.value = '';
        
        const chatId = getChatId(currentUser.uid, currentChatUser.id);
        try {
            await db.collection('messages').add({
                chatId, text, userId: currentUser.uid,
                userName: `${userData.firstName} ${userData.lastName}`,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            scrollToBottom();
            loadChatsList();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    function loadMessages() {
        if(messagesUnsubscribe) messagesUnsubscribe();
        if(!currentChatUser) return;
        const chatId = getChatId(currentUser.uid, currentChatUser.id);
        
        messagesUnsubscribe = db.collection('messages')
            .where('chatId', '==', chatId)
            .onSnapshot(snapshot => {
                const container = document.getElementById('messagesArea');
                if(!container) return;
                const messages = [];
                snapshot.forEach(doc => { messages.push({ id: doc.id, ...doc.data() }); });
                messages.sort((a, b) => {
                    const ta = a.timestamp?.toDate?.()?.getTime() || 0;
                    const tb = b.timestamp?.toDate?.()?.getTime() || 0;
                    return ta - tb;
                });
                container.innerHTML = '';
                messages.forEach(msg => {
                    const isMy = msg.userId === currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `message ${isMy ? 'my' : 'other'}`;
                    const ts = msg.timestamp?.toDate?.() || new Date();
                    div.innerHTML = `
                        ${!isMy ? `<div class="message-sender">${msg.userName || 'Пользователь'}</div>` : ''}
                        <div class="message-bubble">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${ts.toLocaleDateString()} в ${ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    `;
                    container.appendChild(div);
                });
                scrollToBottom();
            });
    }

    function openChat(user) {
        if(messagesUnsubscribe) messagesUnsubscribe();
        currentChatUser = user;
        document.getElementById('mainContent').innerHTML = `
            <div class="chat-window">
                <div class="chat-header">
                    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="chat-header-avatar">${getInitials(user.firstName, user.lastName)}</div>
                    <div class="chat-header-info">
                        <div class="chat-header-name">${user.firstName} ${user.lastName}</div>
                    </div>
                </div>
                <div class="messages-area" id="messagesArea"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        `;
        document.getElementById('backBtn').onclick = () => { currentChatUser = null; showChatsView(); };
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        loadMessages();
    }

    async function loadChatsList() {
        if(!currentUser) return;
        // Получаем все сообщения пользователя
        const allMessages = await db.collection('messages')
            .where('userId', '==', currentUser.uid)
            .get();
        const messagesTo = await db.collection('messages')
            .where('toUserId', '==', currentUser.uid)
            .get();
        
        const chatUsers = new Map();
        
        allMessages.forEach(doc => {
            const msg = doc.data();
            if(msg.toUserId && msg.toUserId !== currentUser.uid) {
                chatUsers.set(msg.toUserId, { lastMsg: msg.text, lastTime: msg.timestamp });
            }
        });
        messagesTo.forEach(doc => {
            const msg = doc.data();
            if(msg.userId && msg.userId !== currentUser.uid) {
                const existing = chatUsers.get(msg.userId);
                if(!existing || (msg.timestamp && existing.lastTime?.toDate?.() < msg.timestamp.toDate())) {
                    chatUsers.set(msg.userId, { lastMsg: msg.text, lastTime: msg.timestamp });
                }
            }
        });
        
        // Также добавляем друзей с которыми не было чатов (пустые чаты)
        const friendIds = userData.friends || [];
        for(const id of friendIds) {
            if(!chatUsers.has(id)) {
                const userDoc = await db.collection('users').doc(id).get();
                if(userDoc.exists) {
                    chatUsers.set(id, { lastMsg: 'Напишите первым', lastTime: null });
                }
            }
        }
        
        const chats = [];
        for(const [id, data] of chatUsers) {
            const userDoc = await db.collection('users').doc(id).get();
            if(userDoc.exists) {
                const u = userDoc.data();
                chats.push({
                    id, firstName: u.firstName, lastName: u.lastName,
                    lastMsg: data.lastMsg || 'Напишите первым',
                    lastTime: data.lastTime
                });
            }
        }
        chats.sort((a,b) => {
            const ta = a.lastTime?.toDate?.()?.getTime() || 0;
            const tb = b.lastTime?.toDate?.()?.getTime() || 0;
            return tb - ta;
        });
        chatsList = chats;
        renderChatsList();
    }

    function renderChatsList(searchQuery = '') {
        const container = document.getElementById('chatsListContainer');
        if(!container) return;
        let filtered = chatsList;
        if(searchQuery) {
            const q = searchQuery.toLowerCase();
            filtered = chatsList.filter(c => `${c.firstName} ${c.lastName}`.toLowerCase().includes(q));
        }
        if(filtered.length === 0) {
            container.innerHTML = '<div class="empty-chats"><i class="fas fa-comments" style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;"></i><p>Нет чатов</p><p style="font-size: 13px;">Найдите людей в разделе "Люди"</p></div>';
            return;
        }
        container.innerHTML = '';
        filtered.forEach(chat => {
            const div = document.createElement('div');
            div.className = 'chat-item';
            const timeStr = chat.lastTime?.toDate?.() ? 
                new Date(chat.lastTime.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            div.innerHTML = `
                <div class="chat-avatar">${getInitials(chat.firstName, chat.lastName)}</div>
                <div class="chat-info">
                    <div class="chat-name">${chat.firstName} ${chat.lastName}</div>
                    <div class="chat-last-msg">${escapeHtml(chat.lastMsg.substring(0, 50))}</div>
                </div>
                ${timeStr ? `<div class="chat-time">${timeStr}</div>` : ''}
            `;
            div.onclick = () => openChat({ id: chat.id, firstName: chat.firstName, lastName: chat.lastName });
            container.appendChild(div);
        });
    }

    function showChatsView() {
        document.getElementById('mainContent').innerHTML = `
            <div style="display: flex; flex-direction: column; height: 100vh; background: white;">
                <div class="chats-header">
                    <h2>Чаты</h2>
                </div>
                <div class="chats-search">
                    <input type="text" id="chatsSearchInput" placeholder="Поиск по чатам...">
                </div>
                <div class="chats-list" id="chatsListContainer">
                    <div style="text-align: center; padding: 40px;">Загрузка...</div>
                </div>
            </div>
        `;
        loadChatsList();
        document.getElementById('chatsSearchInput').oninput = (e) => renderChatsList(e.target.value.trim());
        if(isMobile) updateMobileNav('chats');
    }

    async function loadPeopleList(searchQuery = '') {
        const snapshot = await db.collection('users').get();
        allUsers = [];
        snapshot.forEach(doc => {
            if(doc.id !== currentUser.uid) {
                allUsers.push({ id: doc.id, ...doc.data() });
            }
        });
        renderPeopleList(searchQuery);
    }

    function renderPeopleList(searchQuery = '') {
        const container = document.getElementById('peopleListContainer');
        if(!container) return;
        let filtered = allUsers;
        if(searchQuery) {
            const q = searchQuery.toLowerCase();
            filtered = allUsers.filter(u => `${u.firstName} ${u.lastName}`.toLowerCase().includes(q));
        }
        if(filtered.length === 0) {
            container.innerHTML = '<div class="empty-chats" style="padding: 40px; text-align: center;">Никого не найдено</div>';
            return;
        }
        container.innerHTML = '';
        filtered.forEach(user => {
            const isFriend = userData.friends?.includes(user.id);
            const isSent = userData.friendRequests?.sent?.includes(user.id);
            const isReceived = userData.friendRequests?.received?.includes(user.id);
            const div = document.createElement('div');
            div.className = 'person-item';
            div.innerHTML = `
                <div class="person-info">
                    <div class="person-avatar">${getInitials(user.firstName, user.lastName)}</div>
                    <div class="person-name">${user.firstName} ${user.lastName}</div>
                </div>
                <div class="action-btns">
                    <button class="action-btn write" data-chat="${user.id}">💬</button>
                    ${!isFriend && !isSent && !isReceived ? `<button class="action-btn add" data-add="${user.id}">➕</button>` : ''}
                    ${isSent ? '<button class="action-btn pending" disabled>⏳ Запрос</button>' : ''}
                    ${isReceived ? `<button class="action-btn add" data-accept="${user.id}" style="background:#28a745">✅ Принять</button>` : ''}
                    ${isFriend ? `<button class="action-btn remove" data-remove="${user.id}">🗑️</button>` : ''}
                </div>
            `;
            const writeBtn = div.querySelector('[data-chat]');
            const addBtn = div.querySelector('[data-add]');
            const acceptBtn = div.querySelector('[data-accept]');
            const removeBtn = div.querySelector('[data-remove]');
            if(writeBtn) writeBtn.onclick = () => openChat(user);
            if(addBtn) addBtn.onclick = () => sendFriendRequest(user.id, user.firstName, user.lastName);
            if(acceptBtn) acceptBtn.onclick = () => acceptFriendRequest(user.id);
            if(removeBtn) removeBtn.onclick = () => removeFriend(user.id);
            container.appendChild(div);
        });
    }

    function showPeopleView() {
        document.getElementById('mainContent').innerHTML = `
            <div class="people-container">
                <div class="people-header">
                    <h2>Люди</h2>
                </div>
                <div class="people-search">
                    <input type="text" id="peopleSearchInput" placeholder="Поиск людей...">
                </div>
                <div class="people-list" id="peopleListContainer">
                    <div style="text-align: center; padding: 40px;">Загрузка...</div>
                </div>
            </div>
        `;
        loadPeopleList();
        document.getElementById('peopleSearchInput').oninput = (e) => renderPeopleList(e.target.value.trim());
        if(isMobile) updateMobileNav('people');
    }

    async function sendFriendRequest(toId, firstName, lastName) {
        try {
            await db.collection('users').doc(toId).update({ 
                'friendRequests.received': firebase.firestore.FieldValue.arrayUnion(currentUser.uid) 
            });
            await db.collection('users').doc(currentUser.uid).update({ 
                'friendRequests.sent': firebase.firestore.FieldValue.arrayUnion(toId) 
            });
            showModal('Успех', `Запрос отправлен ${firstName} ${lastName}`);
            const updated = await db.collection('users').doc(currentUser.uid).get();
            userData = updated.data();
            loadPeopleList();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function acceptFriendRequest(fromId) {
        try {
            await db.collection('users').doc(currentUser.uid).update({
                friends: firebase.firestore.FieldValue.arrayUnion(fromId),
                'friendRequests.received': firebase.firestore.FieldValue.arrayRemove(fromId)
            });
            await db.collection('users').doc(fromId).update({
                friends: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
                'friendRequests.sent': firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
            });
            showModal('Успех', 'Теперь вы друзья!');
            const updated = await db.collection('users').doc(currentUser.uid).get();
            userData = updated.data();
            loadPeopleList();
            loadChatsList();
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function removeFriend(friendId) {
        showModal('Подтверждение', 'Удалить пользователя из друзей?', async () => {
            try {
                await db.collection('users').doc(currentUser.uid).update({
                    friends: firebase.firestore.FieldValue.arrayRemove(friendId)
                });
                await db.collection('users').doc(friendId).update({
                    friends: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                });
                showModal('Успех', 'Пользователь удалён из друзей');
                const updated = await db.collection('users').doc(currentUser.uid).get();
                userData = updated.data();
                loadPeopleList();
                loadChatsList();
            } catch(e) { showModal('Ошибка', e.message); }
        });
    }

    function updateMobileNav(active) {
        document.querySelectorAll('.mobile-nav-item').forEach(btn => {
            if(btn.dataset.nav === active) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function renderApp() {
        if(!currentUser || !userData) return;
        if(!currentUser.emailVerified) {
            renderEmailVerifyScreen();
            return;
        }
        
        document.getElementById('app').innerHTML = `
            <div class="app">
                <div class="sidebar">
                    <div class="logo">ЧЕБУРЧАТ</div>
                    <div class="sidebar-section">
                        <div class="nav-item active" data-nav="chats"><i class="fas fa-comments"></i> Чаты</div>
                        <div class="nav-item" data-nav="people"><i class="fas fa-users"></i> Люди</div>
                    </div>
                    <div class="user-info-sidebar" id="profileBtn">
                        <div class="avatar">${getInitials(userData.firstName, userData.lastName)}</div>
                        <div><strong>${userData.firstName} ${userData.lastName}</strong></div>
                    </div>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                </div>
                <div class="main" id="mainContent"></div>
                <div class="mobile-bottom-nav">
                    <button class="mobile-nav-item active" data-nav="chats"><i class="fas fa-comments"></i><span>Чаты</span></button>
                    <button class="mobile-nav-item" data-nav="people"><i class="fas fa-users"></i><span>Люди</span></button>
                    <button class="mobile-nav-item" id="mobileProfileBtn"><i class="fas fa-user"></i><span>Профиль</span></button>
                </div>
            </div>
        `;
        
        document.querySelectorAll('.nav-item').forEach(el => {
            el.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
                if(el.dataset.nav === 'people') showPeopleView();
                else showChatsView();
            };
        });
        document.querySelectorAll('.mobile-nav-item').forEach(el => {
            if(el.dataset.nav) el.onclick = () => {
                if(el.dataset.nav === 'people') showPeopleView();
                else if(el.dataset.nav === 'chats') showChatsView();
            };
        });
        document.getElementById('mobileProfileBtn').onclick = () => showModal('Профиль', `${userData.firstName} ${userData.lastName}\n${userData.email}\n✅ Email подтверждён`);
        document.getElementById('profileBtn').onclick = () => showModal('Профиль', `${userData.firstName} ${userData.lastName}\n${userData.email}\n✅ Email подтверждён`);
        document.getElementById('logoutBtn').onclick = logout;
        
        showChatsView();
    }

    function renderEmailVerifyScreen() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h1>ЧЕБУРЧАТ</h1>
                    <div class="verify-msg">
                        <i class="fas fa-envelope"></i> Подтвердите email<br>
                        <small>${currentUser.email}</small>
                    </div>
                    <button id="resendBtn">Отправить повторно</button>
                    <button id="checkBtn" style="background:#28a745">Я подтвердил</button>
                    <button id="logoutVerifyBtn" style="background:#dc3545; margin-top:10px">Выйти</button>
                </div>
            </div>
        `;
        document.getElementById('resendBtn').onclick = async () => {
            await currentUser.sendEmailVerification();
            showModal('Письмо отправлено', 'Проверьте почту');
        };
        document.getElementById('checkBtn').onclick = async () => {
            await currentUser.reload();
            if(currentUser.emailVerified) location.reload();
            else showModal('Ошибка', 'Email не подтверждён');
        };
        document.getElementById('logoutVerifyBtn').onclick = logout;
    }

    async function handleRegister() {
        const firstName = document.getElementById('regFirstName').value.trim();
        const lastName = document.getElementById('regLastName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        if(!firstName || !lastName) { showModal('Ошибка', 'Введите имя и фамилию'); return; }
        if(password.length < 6) { showModal('Ошибка', 'Пароль минимум 6 символов'); return; }
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await cred.user.sendEmailVerification();
            await db.collection('users').doc(cred.user.uid).set({
                firstName, lastName, email, friends: [], friendRequests: { sent: [], received: [] }, createdAt: new Date()
            });
            showModal('Регистрация', 'Письмо с подтверждением отправлено!');
        } catch(e) { showModal('Ошибка', e.message); }
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch(e) { showModal('Ошибка', e.message); }
    }

    function renderAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h1>ЧЕБУРЧАТ</h1>
                    <div id="loginView">
                        <input type="email" id="loginEmail" placeholder="Email">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <button id="doLoginBtn">Войти</button>
                        <div class="toggle-auth" id="showRegisterBtn">Нет аккаунта? Регистрация</div>
                    </div>
                    <div id="registerView" class="hidden">
                        <input type="text" id="regFirstName" placeholder="Имя">
                        <input type="text" id="regLastName" placeholder="Фамилия">
                        <input type="email" id="regEmail" placeholder="Email">
                        <input type="password" id="regPassword" placeholder="Пароль (мин. 6)">
                        <button id="doRegisterBtn">Зарегистрироваться</button>
                        <div class="toggle-auth" id="showLoginBtn">Уже есть аккаунт? Войти</div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('doLoginBtn').onclick = handleLogin;
        document.getElementById('showRegisterBtn').onclick = () => {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('registerView').classList.remove('hidden');
        };
        document.getElementById('showLoginBtn').onclick = () => {
            document.getElementById('registerView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
        };
        document.getElementById('doRegisterBtn').onclick = handleRegister;
    }

    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if(!doc.exists) {
                await db.collection('users').doc(user.uid).set({
                    firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] }
                });
                userData = { firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] } };
            } else {
                userData = doc.data();
                if(!userData.friendRequests) {
                    await db.collection('users').doc(user.uid).update({ friendRequests: { sent: [], received: [] } });
                    userData.friendRequests = { sent: [], received: [] };
                }
            }
            renderApp();
        } else {
            if(messagesUnsubscribe) messagesUnsubscribe();
            currentUser = null;
            userData = null;
            renderAuth();
        }
    });
    
    window.addEventListener('resize', () => { isMobile = window.innerWidth <= 768; });
</script>
</body>
</html>
