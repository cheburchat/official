<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЧЕБУРЧАТ — Социальная сеть</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #65676b;
            --accent: #ff7b2c;
            --border: #e4e6eb;
            --my-msg: #ff7b2c;
            --other-msg: #e4e6eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .logo {
            padding: 0 20px 20px;
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .logo span {
            background: var(--accent);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 18px;
        }

        .nav-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text);
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--bg);
            border-left: 3px solid var(--accent);
        }

        .nav-item i {
            width: 24px;
        }

        .user-info-sidebar {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: none;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .friend-avatar {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 20px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.my {
            align-self: flex-end;
        }

        .message.other {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .my .bubble {
            background: var(--my-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .other .bubble {
            background: var(--other-msg);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            margin-left: 8px;
        }

        .input-area {
            padding: 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: var(--bg);
            border-radius: 28px;
            font-size: 15px;
        }

        .input-area button {
            background: var(--accent);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }

        /* Right panel */
        .right-panel {
            width: 320px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .search-box {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: var(--bg);
            border-radius: 24px;
        }

        .friends-list, .search-results {
            padding: 16px;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .friend-item, .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .friend-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .small-avatar {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .add-friend-btn {
            background: var(--accent);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .pending-badge {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Auth */
        .auth-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .auth-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            width: 400px;
            text-align: center;
        }

        .auth-card h1 {
            color: var(--accent);
            margin-bottom: 24px;
        }

        .auth-card input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            font-size: 14px;
        }

        .auth-card button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
        }

        .toggle-auth {
            margin-top: 16px;
            color: var(--accent);
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .sidebar, .right-panel { display: none; }
            .back-btn { display: block; }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ТВОИ ДАННЫЕ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBx_koHusbH0CwiGvVj132nZ0rUpuPyqQw",
        authDomain: "msend-92718.firebaseapp.com",
        projectId: "msend-92718",
        storageBucket: "msend-92718.firebasestorage.app",
        messagingSenderId: "672219125451",
        appId: "1:672219125451:web:84871d4e136d0168076d4e"
    };

    // Инициализация
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let userDoc = null;
    let currentChatUserId = null;
    let friendsList = [];
    let messagesUnsubscribe = null;

    function getInitials(firstName, lastName) {
        return (firstName?.[0] || '?') + (lastName?.[0] || '');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }

    function scrollMessages() {
        const area = document.getElementById('messagesArea');
        if (area) setTimeout(() => area.scrollTop = area.scrollHeight, 100);
    }

    // Отправка сообщения
    async function sendMessage(toUserId) {
        const input = document.getElementById('messageInput');
        if (!input) return;
        const text = input.value.trim();
        if (!text) return;
        input.value = '';

        const chatId = [currentUser.uid, toUserId].sort().join('_');
        try {
            await db.collection('messages').add({
                chatId,
                from: currentUser.uid,
                to: toUserId,
                text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                read: false
            });
        } catch(e) { console.error(e); alert('Ошибка: ' + e.message); }
        scrollMessages();
    }

    // Загрузка сообщений
    async function loadMessages(friendId) {
        if (messagesUnsubscribe) messagesUnsubscribe();
        const chatId = [currentUser.uid, friendId].sort().join('_');
        
        messagesUnsubscribe = db.collection('messages')
            .where('chatId', '==', chatId)
            .orderBy('timestamp', 'asc')
            .onSnapshot(snapshot => {
                const container = document.getElementById('messagesArea');
                if (!container) return;
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isMy = msg.from === currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `message ${isMy ? 'my' : 'other'}`;
                    const time = msg.timestamp?.toDate?.() ? 
                        new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
                    div.innerHTML = `
                        <div class="bubble">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${time}</div>
                    `;
                    container.appendChild(div);
                });
                scrollMessages();
            }, error => {
                console.error("Ошибка загрузки сообщений:", error);
            });
    }

    // Открыть чат
    function openChat(userId, firstName, lastName) {
        if (messagesUnsubscribe) messagesUnsubscribe();
        currentChatUserId = userId;
        
        const mainEl = document.getElementById('mainContent');
        mainEl.innerHTML = `
            <div class="chat-header">
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                <div class="friend-avatar">${getInitials(firstName, lastName)}</div>
                <div class="friend-info">
                    <h3>${firstName} ${lastName}</h3>
                </div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        `;
        
        document.getElementById('backBtn').onclick = () => {
            currentChatUserId = null;
            showChatsPanel();
        };
        document.getElementById('sendMsgBtn').onclick = () => sendMessage(userId);
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage(userId);
        };
        
        loadMessages(userId);
        
        if (window.innerWidth <= 768) {
            document.getElementById('rightPanel').classList.add('hidden');
        }
    }

    // Поиск пользователей
    async function searchUsers(query) {
        if (!query || query.length < 2) return;
        
        const results = [];
        const usersRef = db.collection('users');
        
        try {
            const firstNameSnap = await usersRef.where('firstNameLower', '>=', query.toLowerCase())
                .where('firstNameLower', '<=', query.toLowerCase() + '\uf8ff').limit(10).get();
            const lastNameSnap = await usersRef.where('lastNameLower', '>=', query.toLowerCase())
                .where('lastNameLower', '<=', query.toLowerCase() + '\uf8ff').limit(10).get();
            
            const ids = new Set();
            firstNameSnap.forEach(doc => { if (doc.id !== currentUser.uid) { ids.add(doc.id); results.push({id: doc.id, ...doc.data()}); } });
            lastNameSnap.forEach(doc => { if (doc.id !== currentUser.uid && !ids.has(doc.id)) { results.push({id: doc.id, ...doc.data()}); } });
            
            const container = document.getElementById('searchResults');
            const searchContainer = document.getElementById('searchResultsContainer');
            
            if (results.length === 0) {
                container.innerHTML = '<div class="empty-state">Никого не найдено</div>';
            } else {
                container.innerHTML = '';
                for (const user of results) {
                    const isFriend = friendsList.some(f => f.id === user.id);
                    const isPending = userDoc.friendRequests?.sent?.includes(user.id);
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <div class="friend-info">
                            <div class="small-avatar">${getInitials(user.firstName, user.lastName)}</div>
                            <div><strong>${user.firstName} ${user.lastName}</strong></div>
                        </div>
                        ${!isFriend && !isPending ? `<button class="add-friend-btn" data-id="${user.id}">➕ Добавить</button>` : 
                          isPending ? '<span class="pending-badge">⏳ Запрос отправлен</span>' : '<span class="pending-badge">✅ Друг</span>'}
                    `;
                    const btn = div.querySelector('.add-friend-btn');
                    if (btn) btn.onclick = (e) => { e.stopPropagation(); sendFriendRequest(user.id); };
                    container.appendChild(div);
                }
            }
            searchContainer.classList.remove('hidden');
        } catch(e) { console.error(e); }
    }

    // Отправить заявку в друзья
    async function sendFriendRequest(toUserId) {
        try {
            await db.collection('users').doc(toUserId).update({
                [`friendRequests.received`]: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
            });
            await db.collection('users').doc(currentUser.uid).update({
                [`friendRequests.sent`]: firebase.firestore.FieldValue.arrayUnion(toUserId)
            });
            alert('Запрос отправлен!');
            loadFriendsList();
        } catch(e) { console.error(e); alert('Ошибка: ' + e.message); }
    }

    // Принять заявку
    async function acceptFriendRequest(fromUserId) {
        try {
            await db.collection('users').doc(currentUser.uid).update({
                friends: firebase.firestore.FieldValue.arrayUnion(fromUserId),
                [`friendRequests.received`]: firebase.firestore.FieldValue.arrayRemove(fromUserId)
            });
            await db.collection('users').doc(fromUserId).update({
                friends: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
                [`friendRequests.sent`]: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
            });
            alert('Вы теперь друзья!');
            loadFriendsList();
            showChatsPanel();
        } catch(e) { console.error(e); }
    }

    // Загрузить список друзей
    async function loadFriendsList() {
        if (!userDoc) return;
        const friendsIds = userDoc.friends || [];
        const friends = [];
        for (const id of friendsIds) {
            const doc = await db.collection('users').doc(id).get();
            if (doc.exists) friends.push({ id, ...doc.data() });
        }
        friendsList = friends;
        
        const container = document.getElementById('friendsListContainer');
        if (!container) return;
        if (friends.length === 0) {
            container.innerHTML = '<div class="empty-state">Нет друзей. Добавьте через поиск!</div>';
            return;
        }
        container.innerHTML = '';
        for (const f of friends) {
            const div = document.createElement('div');
            div.className = 'friend-item';
            div.innerHTML = `
                <div class="friend-info">
                    <div class="small-avatar">${getInitials(f.firstName, f.lastName)}</div>
                    <div><strong>${f.firstName} ${f.lastName}</strong></div>
                </div>
                <button class="add-friend-btn" style="background:#65676b" data-chat="${f.id}">💬</button>
            `;
            div.querySelector('button').onclick = (e) => {
                e.stopPropagation();
                openChat(f.id, f.firstName, f.lastName);
            };
            container.appendChild(div);
        }
    }

    // Показать чаты
    function showChatsPanel() {
        const rightPanel = document.getElementById('rightPanel');
        if (rightPanel) rightPanel.classList.remove('hidden');
        
        if (currentChatUserId) {
            // уже в чате
        } else {
            document.getElementById('mainContent').innerHTML = `
                <div style="display:flex;align-items:center;justify-content:center;height:100%">
                    <div style="text-align:center;color:var(--text-secondary)">
                        <i class="fas fa-comments" style="font-size:48px;margin-bottom:16px"></i>
                        <h3>Выберите чат</h3>
                        <p>Нажмите на друга справа</p>
                    </div>
                </div>
            `;
        }
    }

    // Показать друзей
    function showFriendsPanel() {
        const rightPanel = document.getElementById('rightPanel');
        if (rightPanel) rightPanel.classList.add('hidden');
        
        document.getElementById('mainContent').innerHTML = `
            <div style="padding:20px; overflow-y:auto; height:100%">
                <h2>Мои друзья</h2>
                <div id="friendsFullList"></div>
                <div style="margin-top:30px">
                    <h3>Заявки в друзья</h3>
                    <div id="friendRequestsList"></div>
                </div>
            </div>
        `;
        
        renderFriendsFullList();
        renderFriendRequests();
    }

    async function renderFriendsFullList() {
        const container = document.getElementById('friendsFullList');
        if (!container) return;
        const friendsIds = userDoc.friends || [];
        if (friendsIds.length === 0) {
            container.innerHTML = '<div class="empty-state">Нет друзей</div>';
            return;
        }
        container.innerHTML = '';
        for (const id of friendsIds) {
            const doc = await db.collection('users').doc(id).get();
            if (doc.exists) {
                const f = doc.data();
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.innerHTML = `
                    <div class="friend-info">
                        <div class="small-avatar">${getInitials(f.firstName, f.lastName)}</div>
                        <div><strong>${f.firstName} ${f.lastName}</strong></div>
                    </div>
                    <button class="add-friend-btn" data-chat="${id}">💬 Написать</button>
                `;
                div.querySelector('button').onclick = () => openChat(id, f.firstName, f.lastName);
                container.appendChild(div);
            }
        }
    }

    async function renderFriendRequests() {
        const container = document.getElementById('friendRequestsList');
        if (!container) return;
        const received = userDoc.friendRequests?.received || [];
        if (received.length === 0) {
            container.innerHTML = '<div class="empty-state">Нет входящих заявок</div>';
            return;
        }
        container.innerHTML = '';
        for (const id of received) {
            const doc = await db.collection('users').doc(id).get();
            if (doc.exists) {
                const u = doc.data();
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.innerHTML = `
                    <div class="friend-info">
                        <div class="small-avatar">${getInitials(u.firstName, u.lastName)}</div>
                        <div><strong>${u.firstName} ${u.lastName}</strong></div>
                    </div>
                    <button class="add-friend-btn" data-accept="${id}" style="background:#31a24c">✅ Принять</button>
                `;
                div.querySelector('button').onclick = () => acceptFriendRequest(id);
                container.appendChild(div);
            }
        }
    }

    // Рендер главного приложения
    function renderApp() {
        const container = document.getElementById('app');
        if (!currentUser || !userDoc) return;
        
        container.innerHTML = `
            <div class="app">
                <div class="sidebar">
                    <div class="logo">🐻 <span>ЧЕБУРЧАТ</span></div>
                    <div class="nav-item active" data-nav="chats">
                        <i class="fas fa-comments"></i> Чаты
                    </div>
                    <div class="nav-item" data-nav="friends">
                        <i class="fas fa-user-friends"></i> Друзья
                    </div>
                    <div class="user-info-sidebar" id="sidebarProfileBtn">
                        <div class="avatar">${getInitials(userDoc.firstName, userDoc.lastName)}</div>
                        <div><strong>${userDoc.firstName} ${userDoc.lastName}</strong><br><span style="font-size:12px">${userDoc.email}</span></div>
                    </div>
                </div>
                <div class="main" id="mainContent"></div>
                <div class="right-panel" id="rightPanel">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Поиск по имени...">
                    </div>
                    <div class="friends-list">
                        <div class="section-title">👥 Мои друзья</div>
                        <div id="friendsListContainer">Загрузка...</div>
                    </div>
                    <div id="searchResultsContainer" class="search-results hidden">
                        <div class="section-title">🔍 Результаты</div>
                        <div id="searchResults"></div>
                    </div>
                </div>
            </div>
        `;
        
        loadFriendsList();
        
        document.querySelectorAll('.nav-item').forEach(el => {
            el.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
                if (el.dataset.nav === 'friends') showFriendsPanel();
                else showChatsPanel();
            };
        });
        
        document.getElementById('sidebarProfileBtn').onclick = () => {
            alert(`Профиль:\n${userDoc.firstName} ${userDoc.lastName}\n${userDoc.email}`);
        };
        
        const searchInput = document.getElementById('searchInput');
        let debounceTimer;
        searchInput.oninput = (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => searchUsers(e.target.value.trim()), 300);
        };
        
        showChatsPanel();
    }

    // Регистрация
    async function handleRegister() {
        const firstName = document.getElementById('regFirstName').value.trim();
        const lastName = document.getElementById('regLastName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        
        if (!firstName || !lastName) { alert('Введите имя и фамилию'); return; }
        if (password.length < 6) { alert('Пароль минимум 6 символов'); return; }
        
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection('users').doc(cred.user.uid).set({
                firstName, lastName,
                firstNameLower: firstName.toLowerCase(),
                lastNameLower: lastName.toLowerCase(),
                email,
                friends: [],
                friendRequests: { sent: [], received: [] },
                online: true,
                createdAt: new Date()
            });
        } catch(e) { alert('Ошибка: ' + e.message); }
    }

    // Вход
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch(e) { alert('Ошибка: ' + e.message); }
    }

    // Экран авторизации
    function renderAuth() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h1>🐻 ЧЕБУРЧАТ</h1>
                    <div id="loginView">
                        <input type="email" id="loginEmail" placeholder="Email">
                        <input type="password" id="loginPassword" placeholder="Пароль">
                        <button id="doLoginBtn">Войти</button>
                        <div class="toggle-auth" id="showRegisterBtn">Нет аккаунта? Регистрация</div>
                    </div>
                    <div id="registerView" class="hidden">
                        <input type="text" id="regFirstName" placeholder="Имя">
                        <input type="text" id="regLastName" placeholder="Фамилия">
                        <input type="email" id="regEmail" placeholder="Email">
                        <input type="password" id="regPassword" placeholder="Пароль (мин. 6)">
                        <button id="doRegisterBtn">Зарегистрироваться</button>
                        <div class="toggle-auth" id="showLoginBtn">Уже есть аккаунт? Войти</div>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('doLoginBtn').onclick = handleLogin;
        document.getElementById('showRegisterBtn').onclick = () => {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('registerView').classList.remove('hidden');
        };
        document.getElementById('showLoginBtn').onclick = () => {
            document.getElementById('registerView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
        };
        document.getElementById('doRegisterBtn').onclick = handleRegister;
        
        // Enter key
        ['loginEmail','loginPassword','regFirstName','regLastName','regEmail','regPassword'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.onkeypress = (e) => { if (e.key === 'Enter') {
                if (id.includes('login')) handleLogin();
                else handleRegister();
            }};
        });
    }

    // Слушатель авторизации
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if (!doc.exists) {
                // fallback
                await db.collection('users').doc(user.uid).set({
                    firstName: user.email.split('@')[0], lastName: 'User',
                    firstNameLower: user.email.split('@')[0].toLowerCase(), lastNameLower: 'user',
                    email: user.email, friends: [], friendRequests: { sent: [], received: [] }, online: true
                });
                userDoc = { firstName: user.email.split('@')[0], lastName: 'User', email: user.email, friends: [], friendRequests: { sent: [], received: [] } };
            } else {
                userDoc = doc.data();
            }
            renderApp();
        } else {
            currentUser = null;
            userDoc = null;
            if (messagesUnsubscribe) messagesUnsubscribe();
            renderAuth();
        }
    });
</script>
</body>
</html>
