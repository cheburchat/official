<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЧЕБУРЧАТ FULL</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
body{margin:0;font-family:sans-serif;background:#f0f2f5}
.app{display:flex;height:100vh}
.sidebar{width:280px;background:#fff;border-right:1px solid #ddd;overflow:auto}
.chat-item{padding:12px;border-bottom:1px solid #eee;cursor:pointer}
.chat-item:hover{background:#f5f5f5}
.main{flex:1;display:flex;flex-direction:column}
.messages{flex:1;overflow:auto;padding:20px}
.msg{max-width:60%;margin:8px 0;padding:10px;border-radius:10px}
.my{margin-left:auto;background:#ff7b2c;color:#fff}
.other{background:#e4e6eb}
.input{display:flex;padding:10px;background:#fff}
input{flex:1;padding:10px}
button{padding:10px 15px;background:#ff7b2c;color:#fff;border:none}
</style>
</head>
<body>
<div id="app"></div>
<script>

const firebaseConfig = {
apiKey: "AIzaSyBx_koHusbH0CwiGvVj132nZ0rUpuPyqQw",
authDomain: "msend-92718.firebaseapp.com",
projectId: "msend-92718"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let user=null, currentChat=null, unsub=null;

function renderAuth(){
document.getElementById('app').innerHTML=`
<div style="display:flex;justify-content:center;align-items:center;height:100vh">
<div>
<input id="email" placeholder="email"><br>
<input id="pass" type="password" placeholder="password"><br>
<button onclick="login()">Войти</button>
<button onclick="register()">Регистрация</button>
</div></div>`;
}

async function register(){
const e=email.value,p=pass.value;
const cred=await auth.createUserWithEmailAndPassword(e,p);
await db.collection('users').doc(cred.user.uid).set({email:e,friends:[]});
}

async function login(){
await auth.signInWithEmailAndPassword(email.value,pass.value);
}

function renderApp(){
document.getElementById('app').innerHTML=`
<div class="app">
<div class="sidebar" id="chatList"></div>
<div class="main">
<div class="messages" id="messages"></div>
<div class="input">
<input id="msg">
<button onclick="send()">➤</button>
</div>
</div>
</div>`;
loadChats();
}

function chatId(a,b){return[a,b].sort().join('_')}

async function send(){
if(!currentChat)return;
const text=msg.value.trim();
if(!text)return;
msg.value='';
const id=chatId(user.uid,currentChat);

await db.collection('messages').add({
chatId:id,
from:user.uid,
text,
time:firebase.firestore.FieldValue.serverTimestamp()
});

await db.collection('chats').doc(id).set({
users:[user.uid,currentChat],
lastMessage:text,
lastTime:firebase.firestore.FieldValue.serverTimestamp()
},{merge:true});
}

function loadChats(){
db.collection('chats')
.where('users','array-contains',user.uid)
.orderBy('lastTime','desc')
.onSnapshot(async snap=>{
chatList.innerHTML='';
for(const d of snap.docs){
const c=d.data();
const other=c.users.find(u=>u!==user.uid);
const el=document.createElement('div');
el.className='chat-item';
el.innerHTML=`${other}<br><small>${c.lastMessage||''}</small>`;
el.onclick=()=>openChat(other);
chatList.appendChild(el);
}
});
}

function openChat(uid){
currentChat=uid;
if(unsub)unsub();
const id=chatId(user.uid,uid);

unsub=db.collection('messages')
.where('chatId','==',id)
.orderBy('time')
.onSnapshot(s=>{
messages.innerHTML='';
s.forEach(d=>{
const m=d.data();
const div=document.createElement('div');
div.className='msg '+(m.from===user.uid?'my':'other');
div.innerText=m.text;
messages.appendChild(div);
});
});
}

auth.onAuthStateChanged(u=>{
if(u){user=u;renderApp()}else renderAuth();
});

</script>
</body>
</html>
